<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 820"
     font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
<defs>
  <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <polygon points="0 0,8 3,0 6" fill="#4B5563"/>
  </marker>
  <marker id="arr-l" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <polygon points="0 0,8 3,0 6" fill="#9CA3AF"/>
  </marker>
  <marker id="arr-b" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <polygon points="0 0,8 3,0 6" fill="#2563EB"/>
  </marker>
</defs>

<rect width="620" height="820" fill="#FAFAFA"/>

<!-- Title -->
<text x="310" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1E40AF">Feature Lifecycle</text>
<text x="310" y="48" text-anchor="middle" font-size="11" fill="#6B7280">Drive (single agent) and Fleet (multi-agent competition)</text>

<!-- ═══ INBOX ═══ -->
<rect x="200" y="68" width="220" height="48" rx="7" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1.5"/>
<text x="310" y="86" text-anchor="middle" font-size="14" font-weight="600" fill="#1E40AF">Inbox</text>
<text x="310" y="101" text-anchor="middle" font-size="10" fill="#3B82F6" font-style="italic">feature-create</text>

<!-- Arrow -->
<line x1="310" y1="116" x2="310" y2="148" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="320" y="138" font-size="10" fill="#6B7280">feature-prioritise</text>

<!-- ═══ BACKLOG ═══ -->
<rect x="200" y="150" width="220" height="48" rx="7" fill="#FFE4E6" stroke="#FDA4AF" stroke-width="1.5"/>
<text x="310" y="168" text-anchor="middle" font-size="14" font-weight="600" fill="#9F1239">Backlog</text>
<text x="310" y="183" text-anchor="middle" font-size="10" fill="#E11D48" font-style="italic">ID assigned</text>

<!-- Arrow -->
<line x1="310" y1="198" x2="310" y2="230" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="320" y="220" font-size="10" fill="#6B7280">feature-setup</text>

<!-- ═══ IN-PROGRESS ═══ -->
<rect x="200" y="232" width="220" height="48" rx="7" fill="#E0E7FF" stroke="#A5B4FC" stroke-width="1.5"/>
<text x="310" y="250" text-anchor="middle" font-size="14" font-weight="600" fill="#3730A3">In Progress</text>
<text x="310" y="265" text-anchor="middle" font-size="10" fill="#6366F1" font-style="italic">feature-do</text>

<!-- ═══ MODE FORK ═══ -->
<!-- Drive label left, Fleet label right -->
<line x1="310" y1="280" x2="310" y2="310" stroke="#4B5563" stroke-width="1.5"/>

<!-- Fork point -->
<circle cx="310" cy="310" r="4" fill="#4B5563"/>

<!-- ═══ DRIVE PATH (left) ═══ -->
<line x1="310" y1="310" x2="160" y2="360" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="190" y="328" font-size="11" font-weight="600" fill="#374151">Drive</text>
<text x="190" y="340" font-size="9" fill="#6B7280">single agent</text>

<!-- Single agent box -->
<rect x="70" y="362" width="180" height="72" rx="7" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1.5"/>
<text x="160" y="382" text-anchor="middle" font-size="12" font-weight="600" fill="#92400E">Agent implements</text>
<text x="160" y="398" text-anchor="middle" font-size="10" fill="#B45309">feature-do</text>
<text x="160" y="414" text-anchor="middle" font-size="10" fill="#B45309">feature-review (optional)</text>
<text x="160" y="428" text-anchor="middle" font-size="10" fill="#B45309">feature-submit</text>

<!-- Drive → Done -->
<line x1="160" y1="434" x2="160" y2="468" stroke="#4B5563" stroke-width="1.5"/>
<path d="M 160 468 C 160 500 310 500 310 520" fill="none" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="170" y="462" font-size="10" fill="#6B7280">feature-close</text>

<!-- ═══ FLEET PATH (right) ═══ -->
<line x1="310" y1="310" x2="460" y2="360" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arr-b)"/>
<text x="420" y="328" font-size="11" font-weight="600" fill="#1E40AF">Fleet</text>
<text x="420" y="340" font-size="9" fill="#3B82F6">multi-agent</text>

<!-- Parallel agents panel -->
<rect x="350" y="362" width="250" height="130" rx="7" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5"/>
<text x="475" y="380" text-anchor="middle" font-size="11" font-weight="600" fill="#1E40AF">Parallel Worktrees</text>

<!-- Three parallel agent boxes -->
<rect x="362" y="392" width="68" height="50" rx="5" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1"/>
<text x="396" y="410" text-anchor="middle" font-size="10" font-weight="600" fill="#1E40AF">cc</text>
<text x="396" y="424" text-anchor="middle" font-size="8" fill="#3B82F6">Claude</text>
<text x="396" y="435" text-anchor="middle" font-size="8" fill="#6B7280">feature-do</text>

<rect x="440" y="392" width="68" height="50" rx="5" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1"/>
<text x="474" y="410" text-anchor="middle" font-size="10" font-weight="600" fill="#5B21B6">gg</text>
<text x="474" y="424" text-anchor="middle" font-size="8" fill="#7C3AED">Gemini</text>
<text x="474" y="435" text-anchor="middle" font-size="8" fill="#6B7280">feature-do</text>

<rect x="518" y="392" width="68" height="50" rx="5" fill="#FEF3C7" stroke="#D97706" stroke-width="1"/>
<text x="552" y="410" text-anchor="middle" font-size="10" font-weight="600" fill="#92400E">cx</text>
<text x="552" y="424" text-anchor="middle" font-size="8" fill="#D97706">Codex</text>
<text x="552" y="435" text-anchor="middle" font-size="8" fill="#6B7280">feature-do</text>

<!-- Submitted badges -->
<text x="396" y="456" text-anchor="middle" font-size="8" fill="#059669">submitted</text>
<text x="474" y="456" text-anchor="middle" font-size="8" fill="#059669">submitted</text>
<text x="552" y="456" text-anchor="middle" font-size="8" fill="#059669">submitted</text>

<!-- Converge lines from agents -->
<line x1="396" y1="462" x2="475" y2="470" stroke="#6B7280" stroke-width="0.8"/>
<line x1="474" y1="462" x2="475" y2="470" stroke="#6B7280" stroke-width="0.8"/>
<line x1="552" y1="462" x2="475" y2="470" stroke="#6B7280" stroke-width="0.8"/>
<text x="475" y="482" text-anchor="middle" font-size="9" fill="#6B7280" font-style="italic">all submitted</text>

<!-- Fleet → Evaluate -->
<line x1="475" y1="492" x2="475" y2="530" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arr-b)"/>

<!-- ═══ IN-EVALUATION ═══ -->
<rect x="375" y="532" width="200" height="48" rx="7" fill="#E0E7FF" stroke="#A5B4FC" stroke-width="1.5"/>
<text x="475" y="550" text-anchor="middle" font-size="13" font-weight="600" fill="#3730A3">In Evaluation</text>
<text x="475" y="565" text-anchor="middle" font-size="10" fill="#6366F1" font-style="italic">feature-eval</text>

<!-- Evaluate → pick winner → merge -->
<path d="M 475 580 C 475 610 310 610 310 620" fill="none" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="410" y="604" font-size="10" fill="#6B7280">feature-close [winner]</text>

<!-- ═══ DONE ═══ -->
<rect x="220" y="622" width="180" height="48" rx="7" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1.5"/>
<text x="310" y="640" text-anchor="middle" font-size="14" font-weight="600" fill="#166534">Done</text>
<text x="310" y="655" text-anchor="middle" font-size="10" fill="#16A34A" font-style="italic">merged to main</text>

<!-- ═══ CLEANUP (Fleet only) ═══ -->
<path d="M 400 646 C 500 646 500 698 475 698" fill="none" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-l)"/>
<rect x="375" y="688" width="200" height="32" rx="5" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1"/>
<text x="475" y="704" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#6B7280">feature-cleanup (losers)</text>

<!-- ═══ FEEDBACK LOOPS ═══ -->
<!-- feature-review self-loop on In Progress -->
<path d="M 200 248 C 160 248 160 268 200 268" fill="none" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-l)"/>
<text x="134" y="261" font-size="9" fill="#9CA3AF">feature-review</text>

<!-- ═══ FAST TRACK (shortcut) ═══ -->
<rect x="30" y="68" width="140" height="32" rx="5" fill="#FEF9C3" stroke="#FCD34D" stroke-width="1"/>
<text x="100" y="84" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="600" fill="#92400E">feature-now</text>
<path d="M 100 100 C 100 160 160 232 200 256" fill="none" stroke="#B45309" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
<text x="82" y="170" font-size="9" fill="#B45309" font-style="italic">fast-track</text>
<text x="82" y="181" font-size="9" fill="#B45309" font-style="italic">skips inbox</text>

<!-- ═══ LEGEND ═══ -->
<rect x="30" y="750" width="560" height="56" rx="6" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
<line x1="50" y1="770" x2="88" y2="770" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="96" y="770" dominant-baseline="central" font-size="10" fill="#374151">transition</text>
<line x1="180" y1="770" x2="218" y2="770" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-l)"/>
<text x="226" y="770" dominant-baseline="central" font-size="10" fill="#374151">optional / feedback</text>
<line x1="360" y1="770" x2="398" y2="770" stroke="#2563EB" stroke-width="1.5" marker-end="url(#arr-b)"/>
<text x="406" y="770" dominant-baseline="central" font-size="10" fill="#374151">Fleet-only path</text>
<text x="50" y="793" font-size="10" fill="#6B7280" font-style="italic">Drive = single agent on a branch  /  Fleet = multiple agents in isolated worktrees competing in parallel</text>

</svg>
