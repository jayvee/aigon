<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 620"
     font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
<defs>
  <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <polygon points="0 0,8 3,0 6" fill="#4B5563"/>
  </marker>
  <marker id="arr-g" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <polygon points="0 0,8 3,0 6" fill="#059669"/>
  </marker>
  <marker id="arr-l" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <polygon points="0 0,8 3,0 6" fill="#9CA3AF"/>
  </marker>
</defs>

<rect width="540" height="620" fill="#FAFAFA"/>

<!-- Title -->
<text x="270" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#065F46">Feedback Lifecycle</text>
<text x="270" y="48" text-anchor="middle" font-size="11" fill="#6B7280">External signal routed into product workflow</text>

<!-- ═══ INBOX ═══ -->
<rect x="170" y="68" width="200" height="48" rx="7" fill="#D1FAE5" stroke="#6EE7B7" stroke-width="1.5"/>
<text x="270" y="86" text-anchor="middle" font-size="14" font-weight="600" fill="#065F46">Inbox</text>
<text x="270" y="101" text-anchor="middle" font-size="10" fill="#059669" font-style="italic">feedback-create</text>

<!-- Arrow -->
<line x1="270" y1="116" x2="270" y2="148" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="280" y="138" font-size="10" fill="#6B7280">feedback-triage</text>

<!-- ═══ TRIAGED ═══ -->
<rect x="170" y="150" width="200" height="48" rx="7" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1.5"/>
<text x="270" y="168" text-anchor="middle" font-size="14" font-weight="600" fill="#92400E">Triaged</text>
<text x="270" y="183" text-anchor="middle" font-size="10" fill="#B45309" font-style="italic">AI-assisted classification</text>

<!-- ═══ THREE-WAY FORK ═══ -->
<line x1="270" y1="198" x2="270" y2="230" stroke="#4B5563" stroke-width="1.5"/>
<circle cx="270" cy="230" r="4" fill="#4B5563"/>

<!-- ═══ LEFT: Actionable ═══ -->
<line x1="270" y1="230" x2="110" y2="280" stroke="#059669" stroke-width="1.5" marker-end="url(#arr-g)"/>
<text x="140" y="252" font-size="10" fill="#059669">feedback-promote</text>

<rect x="40" y="282" width="140" height="48" rx="7" fill="#D1FAE5" stroke="#6EE7B7" stroke-width="1.5"/>
<text x="110" y="300" text-anchor="middle" font-size="13" font-weight="600" fill="#065F46">Actionable</text>
<text x="110" y="315" text-anchor="middle" font-size="10" fill="#059669" font-style="italic">ready to promote</text>

<!-- Actionable → Done -->
<line x1="110" y1="330" x2="110" y2="380" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="120" y="362" font-size="10" fill="#6B7280">feedback-close</text>

<rect x="40" y="382" width="140" height="48" rx="7" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1.5"/>
<text x="110" y="400" text-anchor="middle" font-size="14" font-weight="600" fill="#166534">Done</text>
<text x="110" y="415" text-anchor="middle" font-size="10" fill="#16A34A" font-style="italic">fed into features</text>

<!-- Feedback loop: Actionable → features/research -->
<path d="M 40 400 C 10 400 10 480 40 480" fill="none" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-l)"/>
<rect x="30" y="470" width="140" height="36" rx="5" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
<text x="100" y="483" text-anchor="middle" font-size="10" fill="#6B7280">Creates feature or</text>
<text x="100" y="496" text-anchor="middle" font-size="10" fill="#6B7280">research topic</text>

<!-- ═══ CENTER: Won't Fix ═══ -->
<line x1="270" y1="230" x2="270" y2="280" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="280" y="260" font-size="10" fill="#6B7280">feedback-wont-fix</text>

<rect x="200" y="282" width="140" height="48" rx="7" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1.5"/>
<text x="270" y="300" text-anchor="middle" font-size="13" font-weight="600" fill="#B91C1C">Won't Fix</text>
<text x="270" y="315" text-anchor="middle" font-size="10" fill="#DC2626" font-style="italic">closed with reason</text>

<!-- ═══ RIGHT: Duplicate ═══ -->
<line x1="270" y1="230" x2="430" y2="280" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="386" y="252" font-size="10" fill="#6B7280">feedback-duplicate</text>

<rect x="360" y="282" width="140" height="48" rx="7" fill="#FEF9C3" stroke="#FCD34D" stroke-width="1.5"/>
<text x="430" y="300" text-anchor="middle" font-size="13" font-weight="600" fill="#854D0E">Duplicate</text>
<text x="430" y="315" text-anchor="middle" font-size="10" fill="#CA8A04" font-style="italic">linked to canonical</text>

<!-- ═══ LEGEND ═══ -->
<rect x="30" y="560" width="480" height="46" rx="6" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
<line x1="50" y1="580" x2="88" y2="580" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="96" y="580" dominant-baseline="central" font-size="10" fill="#374151">transition</text>
<line x1="190" y1="580" x2="228" y2="580" stroke="#059669" stroke-width="1.5" marker-end="url(#arr-g)"/>
<text x="236" y="580" dominant-baseline="central" font-size="10" fill="#374151">promote path</text>
<line x1="340" y1="580" x2="378" y2="580" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-l)"/>
<text x="386" y="580" dominant-baseline="central" font-size="10" fill="#374151">feeds back into workflow</text>
<text x="50" y="596" font-size="10" fill="#6B7280" font-style="italic">AI triage suggests type, severity, tags, and duplicates  /  Actionable items become features or research</text>

</svg>
