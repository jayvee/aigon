<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 720"
     font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
<defs>
  <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <polygon points="0 0,8 3,0 6" fill="#4B5563"/>
  </marker>
  <marker id="arrow-light" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <polygon points="0 0,8 3,0 6" fill="#9CA3AF"/>
  </marker>
</defs>

<!-- Background -->
<rect width="540" height="720" fill="#FAFAFA"/>

<!-- ════════════════════════════════════════════════ -->
<!-- Strategic Pillars                                -->
<!-- ════════════════════════════════════════════════ -->
<rect x="170" y="30" width="200" height="50" rx="6" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1.5"/>
<text x="270" y="55" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="600" fill="#166534">Strategic Pillars</text>

<!-- Arrow: Strategic Pillars → Quarter Goals -->
<line x1="270" y1="80" x2="270" y2="130" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- ════════════════════════════════════════════════ -->
<!-- Quarter Goals                                    -->
<!-- ════════════════════════════════════════════════ -->
<rect x="170" y="132" width="200" height="50" rx="6" fill="#FFE4E6" stroke="#FDA4AF" stroke-width="1.5"/>
<text x="270" y="157" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="600" fill="#9F1239">Quarter Goals</text>

<!-- Feedback: Quarter Goals ⤴ Strategic Pillars (dotted, right side) -->
<path d="M 370 147 C 420 147 420 55 370 55" fill="none" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-light)"/>

<!-- Arrow: Quarter Goals → Week Priorities -->
<line x1="270" y1="182" x2="270" y2="232" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- ════════════════════════════════════════════════ -->
<!-- Week Priorities                                  -->
<!-- ════════════════════════════════════════════════ -->
<rect x="170" y="234" width="200" height="50" rx="6" fill="#E0E7FF" stroke="#A5B4FC" stroke-width="1.5"/>
<text x="270" y="259" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="600" fill="#3730A3">Week Priorities</text>

<!-- Feedback: Week Priorities ⤴ Quarter Goals (dotted, right side) -->
<path d="M 370 249 C 430 249 430 157 370 157" fill="none" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-light)"/>

<!-- Arrow: Week Priorities → Daily Plan -->
<line x1="270" y1="284" x2="270" y2="432" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Arrow: Week Priorities → Tasks.md (angled right) -->
<path d="M 340 284 C 340 320 400 340 400 370" fill="none" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- ════════════════════════════════════════════════ -->
<!-- Tasks.md                                         -->
<!-- ════════════════════════════════════════════════ -->
<rect x="340" y="372" width="150" height="50" rx="6" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1.5"/>
<text x="415" y="397" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="600" fill="#374151">Tasks.md</text>

<!-- Arrow: Tasks.md → Daily Plan (angled left) -->
<path d="M 370 422 C 370 445 310 445 310 432" fill="none" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Feedback: Tasks.md ⤴ Week Priorities (dotted) -->
<path d="M 415 372 C 415 320 370 290 370 284" fill="none" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-light)"/>

<!-- ════════════════════════════════════════════════ -->
<!-- Daily Plan                                       -->
<!-- ════════════════════════════════════════════════ -->
<rect x="170" y="434" width="200" height="50" rx="6" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1.5"/>
<text x="270" y="459" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="600" fill="#92400E">Daily Plan</text>

<!-- Feedback: Daily Plan ⤴ Week Priorities (dotted, left side) -->
<path d="M 170 449 C 110 449 110 259 170 259" fill="none" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-light)"/>

<!-- Arrow: Daily Plan → Daily Review -->
<line x1="270" y1="484" x2="270" y2="570" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- "Tomorrow" label on the line -->
<text x="290" y="535" font-size="13" fill="#6B7280" font-style="italic">Tomorrow</text>

<!-- ════════════════════════════════════════════════ -->
<!-- Daily Review                                     -->
<!-- ════════════════════════════════════════════════ -->
<rect x="170" y="572" width="200" height="50" rx="6" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1.5"/>
<text x="270" y="597" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="600" fill="#374151">Daily Review</text>

<!-- Feedback: Daily Review ⤴ Daily Plan (dotted, right side loop) -->
<path d="M 370 587 C 440 587 440 459 370 459" fill="none" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-light)"/>

<!-- ════════════════════════════════════════════════ -->
<!-- Legend                                            -->
<!-- ════════════════════════════════════════════════ -->
<rect x="40" y="660" width="460" height="40" rx="6" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
<line x1="60" y1="680" x2="100" y2="680" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="110" y="680" dominant-baseline="central" font-size="11" fill="#374151">cascades down</text>
<line x1="260" y1="680" x2="300" y2="680" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-light)"/>
<text x="310" y="680" dominant-baseline="central" font-size="11" fill="#374151">feeds back up</text>

</svg>
