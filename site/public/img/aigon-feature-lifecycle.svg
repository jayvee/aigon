<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="220" viewBox="0 0 1200 220" role="img" aria-label="Feature lifecycle">
  <defs>
    <style>
      .t { font: 14px sans-serif; fill: #0f172a; }
      .h { font: 16px sans-serif; font-weight: 700; fill: #0f172a; }
      .box { fill: #eef2ff; stroke: #4338ca; stroke-width: 2; rx: 10; }
      .line { stroke: #475569; stroke-width: 2; marker-end: url(#a); }
    </style>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569" />
    </marker>
  </defs>
  <text x="24" y="34" class="h">Feature Lifecycle</text>
  <rect x="24" y="70" width="150" height="54" class="box" /><text x="47" y="102" class="t">feature-create</text>
  <rect x="210" y="70" width="170" height="54" class="box" /><text x="236" y="102" class="t">feature-prioritise</text>
  <rect x="420" y="70" width="130" height="54" class="box" /><text x="448" y="102" class="t">feature-start</text>
  <rect x="590" y="70" width="110" height="54" class="box" /><text x="623" y="102" class="t">feature-do</text>
  <rect x="740" y="70" width="150" height="54" class="box" /><text x="760" y="102" class="t">feature-submit</text>
  <rect x="930" y="70" width="120" height="54" class="box" /><text x="959" y="102" class="t">feature-eval</text>
  <rect x="1080" y="70" width="100" height="54" class="box" /><text x="1104" y="102" class="t">feature-close</text>
  <line x1="174" y1="97" x2="206" y2="97" class="line" />
  <line x1="380" y1="97" x2="416" y2="97" class="line" />
  <line x1="550" y1="97" x2="586" y2="97" class="line" />
  <line x1="700" y1="97" x2="736" y2="97" class="line" />
  <line x1="890" y1="97" x2="926" y2="97" class="line" />
  <line x1="1050" y1="97" x2="1076" y2="97" class="line" />
</svg>
