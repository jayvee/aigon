<svg viewBox="0 0 800 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Aigon lifecycle: Research and Feedback feed into Features, which flow through Build, Evaluate, and Ship, then loop back as user feedback">
  <!-- Research -->
  <rect x="16" y="20" width="120" height="52" rx="12" fill="#0f7775" fill-opacity="0.12" stroke="#0f7775" stroke-width="1.5"/>
  <text x="76" y="42" text-anchor="middle" fill="#0f7775" font-family="IBM Plex Mono, monospace" font-size="12" font-weight="600">Research</text>
  <text x="76" y="58" text-anchor="middle" fill="#5d584f" font-family="Manrope, sans-serif" font-size="9">Investigate options</text>

  <!-- Feedback -->
  <rect x="16" y="100" width="120" height="52" rx="12" fill="#1f4f8a" fill-opacity="0.12" stroke="#1f4f8a" stroke-width="1.5"/>
  <!-- Person icon -->
  <circle cx="42" cy="118" r="5" fill="none" stroke="#1f4f8a" stroke-width="1.2"/>
  <path d="M34 134 a8 6 0 0 1 16 0" fill="none" stroke="#1f4f8a" stroke-width="1.2"/>
  <text x="84" y="122" text-anchor="middle" fill="#1f4f8a" font-family="IBM Plex Mono, monospace" font-size="12" font-weight="600">Feedback</text>
  <text x="84" y="138" text-anchor="middle" fill="#5d584f" font-family="Manrope, sans-serif" font-size="9">From real users</text>

  <!-- Arrows: Research → Features -->
  <path d="M136 46 L192 76" stroke="#0f7775" stroke-width="1.5" marker-end="url(#loop-arrow)"/>
  <!-- Arrows: Feedback → Features -->
  <path d="M136 126 L192 96" stroke="#1f4f8a" stroke-width="1.5" marker-end="url(#loop-arrow)"/>

  <!-- Features -->
  <rect x="196" y="60" width="120" height="52" rx="12" fill="#d55f2a" fill-opacity="0.12" stroke="#d55f2a" stroke-width="1.5"/>
  <text x="256" y="82" text-anchor="middle" fill="#d55f2a" font-family="IBM Plex Mono, monospace" font-size="12" font-weight="600">Features</text>
  <text x="256" y="98" text-anchor="middle" fill="#5d584f" font-family="Manrope, sans-serif" font-size="9">Spec-driven tasks</text>

  <!-- Arrow: Features → Build -->
  <path d="M316 86 L372 86" stroke="rgba(27,23,17,0.3)" stroke-width="1.5" marker-end="url(#loop-arrow-muted)"/>

  <!-- Build -->
  <rect x="376" y="60" width="120" height="52" rx="12" fill="rgba(27,23,17,0.06)" stroke="rgba(27,23,17,0.18)" stroke-width="1.5"/>
  <text x="436" y="82" text-anchor="middle" fill="#1b1711" font-family="IBM Plex Mono, monospace" font-size="12" font-weight="600">Build</text>
  <text x="436" y="98" text-anchor="middle" fill="#5d584f" font-family="Manrope, sans-serif" font-size="9">Agents implement</text>

  <!-- Arrow: Build → Evaluate -->
  <path d="M496 86 L552 86" stroke="rgba(27,23,17,0.3)" stroke-width="1.5" marker-end="url(#loop-arrow-muted)"/>

  <!-- Evaluate -->
  <rect x="556" y="60" width="120" height="52" rx="12" fill="rgba(27,23,17,0.06)" stroke="rgba(27,23,17,0.18)" stroke-width="1.5"/>
  <text x="616" y="82" text-anchor="middle" fill="#1b1711" font-family="IBM Plex Mono, monospace" font-size="12" font-weight="600">Evaluate</text>
  <text x="616" y="98" text-anchor="middle" fill="#5d584f" font-family="Manrope, sans-serif" font-size="9">Compare &amp; merge</text>

  <!-- Arrow: Evaluate → Ship -->
  <path d="M676 86 L722 86" stroke="rgba(27,23,17,0.3)" stroke-width="1.5" marker-end="url(#loop-arrow-muted)"/>

  <!-- Ship -->
  <rect x="726" y="60" width="58" height="52" rx="12" fill="#0f7775" fill-opacity="0.08" stroke="#0f7775" stroke-width="1.5"/>
  <text x="755" y="90" text-anchor="middle" fill="#0f7775" font-family="IBM Plex Mono, monospace" font-size="12" font-weight="600">Ship</text>

  <!-- Return arrow: Ship → Feedback (curves down and back) -->
  <path d="M755 112 L755 160 Q755 170 745 170 L76 170 Q66 170 66 160 L66 152" stroke="#1f4f8a" stroke-width="1.5" stroke-dasharray="6 3" fill="none" marker-end="url(#loop-arrow-blue)"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="loop-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#0f7775"/>
    </marker>
    <marker id="loop-arrow-muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="rgba(27,23,17,0.3)"/>
    </marker>
    <marker id="loop-arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#1f4f8a"/>
    </marker>
  </defs>
</svg>
