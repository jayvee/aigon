# --- Aigon Configuration Start ---
# See: https://developers.openai.com/codex/local-config/

# Codex subagents inherit the parent session's approval and sandbox policy.
# There is no separate awaiter approval key to set.
approval_policy = "never"

# Pair with danger-full-access for autonomous shell/git work inside trusted
# Aigon worktrees. Aigon also registers each worktree path under
# ~/.codex/config.toml [projects."<path>"] trust_level = "trusted" so this
# project config applies in child worktrees too.
sandbox_mode = "danger-full-access"

[sandbox_workspace_write]
# Allow network access for git operations (push, pull, fetch)
network_access = true

[mcp_servers.playwright]
command = "npx"
args = ["-y", "@playwright/mcp@latest"]
# Auto-approve all Playwright MCP tool calls — no per-call prompts.
# approval_policy = "never" does NOT cover MCP tool calls; this key does.
default_tools_approval_mode = "approve"

[_aigon]
note = "Configuration added by Aigon"
tools = ["aigon"]
# --- Aigon Configuration End ---
