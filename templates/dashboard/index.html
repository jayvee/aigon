  <script>
    // ── JS SECTIONS ──────────────────────────────────────────────────────────
    // State & constants                           ~508
    // Utilities (relTime, escHtml, showToast)     ~524
    // API helpers (requestRefresh, requestAction) ~583
    // Session execution (executeNextAction)       ~665
    // Terminal panel                              ~713
    // AI session picker                           ~938
    // Agent picker                                ~1001
    // Repo sidebar                                ~1028
    // Spec drawer                                 ~1186
    // Shared render helpers                       ~1480
    // Monitor view                                ~1515
    // Pipeline / Kanban view                      ~1842
    // Settings view                               ~2315
    // Statistics view                             ~2431
    // Logs view                                   ~2909
    // Main render dispatch                        ~3418
    // Init (polling, event listeners)             ~3649
    // ─────────────────────────────────────────────────────────────────────────
    const POLL_MS = 10000;
    const TS_MS = 30000;
    const INITIAL_DATA = ${INITIAL_DATA};
    const INSTANCE_NAME = ${INSTANCE_NAME};
    function lsKey(k) { return 'aigon-' + INSTANCE_NAME + '-' + k; }
    // _rawState is the plain JS object; state becomes the Alpine proxy after init
    const _rawState = {
      data: INITIAL_DATA,
      failures: 0,
      lastStatuses: new Map(),
      collapsed: JSON.parse(localStorage.getItem(lsKey('collapsed')) || '{}'),
      filter: localStorage.getItem(lsKey('filter')) || 'all',
      view: localStorage.getItem(lsKey('view')) || 'monitor',
      selectedRepo: localStorage.getItem(lsKey('selectedRepo')) || 'all',
      pipelineType: localStorage.getItem(lsKey('pipelineType')) || 'features',
      monitorType: localStorage.getItem(lsKey('monitorType')) || 'all',
      pendingActions: new Set()
    };
    let state = _rawState;

    // ── Alpine store — initialised from state so mutations trigger re-renders ─
    document.addEventListener('alpine:init', () => {
      Alpine.store('dashboard', _rawState);
      state = Alpine.store('dashboard'); // all future writes go through the proxy
    });

    // ── Utilities ─────────────────────────────────────────────────────────────

    function relTime(iso) {
      const diff = Math.max(0, Math.floor((Date.now() - new Date(iso).getTime()) / 1000));
      if (diff < 10) return 'just now';
      if (diff < 60) return diff + 's ago';
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      return Math.floor(diff / 3600) + 'h ago';
    }

    function logsDateFmt(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      const diff = Math.max(0, Date.now() - d.getTime());
      if (diff < 86400000) return relTime(iso); // < 1 day → "2h ago"
      if (diff < 604800000) { // < 7 days → "Mon 14, 2:30pm"
        const day = d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
        const time = d.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
        return day + ', ' + time;
      }
      return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' }); // "Mar 8, 2025"
    }

    function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function statusRank(s){ return s === 'waiting' ? 0 : s === 'implementing' ? 1 : s === 'error' ? 2 : 3; }
    function featureRank(feature){ return feature.agents && feature.agents.length > 0 ? Math.min(...feature.agents.map(a => statusRank(a.status))) : 99; }

    function showToast(text, actionLabel, actionFn, opts){
      const wrap = document.getElementById('toasts');
      const n = document.createElement('div');
      const isError = opts && opts.error;
      n.className = 'toast' + (isError ? ' toast-error' : '');
      const span = document.createElement('span');
      span.textContent = text;
      n.appendChild(span);
      if (actionLabel && actionFn) {
        const b = document.createElement('button');
        b.textContent = actionLabel;
        b.onclick = actionFn;
        n.appendChild(b);
      }
      const dismiss = document.createElement('button');
      dismiss.className = 'toast-dismiss';
      dismiss.innerHTML = '&times;';
      dismiss.onclick = () => n.remove();
      n.appendChild(dismiss);
      wrap.prepend(n);
      while (wrap.children.length > 5) wrap.removeChild(wrap.lastChild);
      const timeout = isError ? 20000 : 10000;
      setTimeout(() => n.remove(), timeout);
    }

    async function copyText(text){
      try { await navigator.clipboard.writeText(text); return true; } catch (e) {}
      const ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta); ta.select();
      const ok = document.execCommand('copy'); ta.remove(); return ok;
    }

    // ── API helpers ───────────────────────────────────────────────────────────

    async function requestAttach(repoPath, featureId, agentId, tmuxSession){
      try {
        const res = await fetch('/api/attach', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ repoPath, featureId, agentId, tmuxSession })
        });
        const payload = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(payload.error || ('HTTP ' + res.status));
        showToast(payload.message || 'Attach opened in terminal');
      } catch (e) {
        showToast('Attach failed: ' + e.message, null, null, {error:true});
      }
    }

    async function requestRefresh() {
      const btn = document.getElementById('refresh-btn');
      if (btn) btn.disabled = true;
      try {
        const res = await fetch('/api/refresh', { method: 'POST', cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const next = await res.json();
        state.failures = 0;
        state.data = next;
        render();
      } catch (e) {
        state.failures += 1;
        setHealth();
        showToast('Refresh failed: ' + e.message, null, null, {error:true});
      } finally {
        if (btn) btn.disabled = false;
      }
    }

    async function requestAction(action, args, repoPath, btn) {
      const key = action + ':' + (args || []).join(':');
      if (state.pendingActions.has(key)) return;
      state.pendingActions.add(key);
      if (btn) { btn.disabled = true; btn.textContent = '...'; }
      try {
        const body = { action, args: args || [] };
        if (repoPath) body.repoPath = repoPath;
        let res;
        try {
          res = await fetch('/api/action', {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify(body)
          });
        } catch (netErr) {
          throw new Error('Cannot reach dashboard server — is it still running? (' + netErr.message + ')');
        }
        let payload = {};
        const rawText = await res.text();
        try { payload = JSON.parse(rawText); } catch (_) { payload = { error: rawText }; }
        if (!res.ok) throw new Error(payload.error || ('HTTP ' + res.status + (rawText ? ': ' + rawText.slice(0, 120) : '')));
        showToast('Done: ' + (payload.command || action));
        await requestRefresh();
      } catch (e) {
        showToast('Action failed: ' + e.message, null, null, {error:true});
        if (btn) { btn.disabled = false; btn.textContent = btn._origText || action; }
      } finally {
        state.pendingActions.delete(key);
      }
    }

    async function requestFeatureOpen(featureId, agentId, repoPath, btn, pType) {
      if (btn) { btn.disabled = true; btn.textContent = '...'; }
      try {
        const body = { featureId, agentId };
        if (repoPath) body.repoPath = repoPath;
        if (pType) body.pipelineType = pType;
        const res = await fetch('/api/feature-open', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify(body)
        });
        const payload = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(payload.error || ('HTTP ' + res.status));
        showToast(payload.message || 'Agent started');
      } catch (e) {
        showToast('Start agent failed: ' + e.message, null, null, {error:true});
      } finally {
        if (btn) { btn.disabled = false; btn.textContent = btn._origText || 'Start'; }
      }
    }

    // ── Session execution ─────────────────────────────────────────────────────

    async function executeNextAction(command, mode, repoPath, btn) {
      if (!command) return;
      const origText = btn ? btn.textContent : '';
      if (btn) {
        btn.disabled = true;
        btn.innerHTML = '<span class="run-next-spinner"></span>' + escHtml(origText);
      }
      try {
        if (mode === 'fire-and-forget') {
          const res = await fetch('/api/session/run', {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify({ command, cwd: repoPath || '' })
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok || data.exitCode !== 0) {
            showToast('Failed: ' + command.split(' ').slice(0, 3).join(' '));
            if (data.stdout || data.stderr) {
              openTerminalPanel(command.split(' ').slice(0, 3).join(' '), command, null, (data.stdout || '') + (data.stderr ? '\r\n\x1b[31m' + data.stderr + '\x1b[0m' : ''));
            }
          } else {
            showToast('Done: ' + command.split(' ').slice(0, 3).join(' '));
            await requestRefresh();
          }
        } else if (mode === 'terminal') {
          // terminal mode — open a native terminal window via server-side openTerminalAppWithCommand
          const res = await fetch('/api/open-terminal', {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify({ command, cwd: repoPath || '' })
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            showToast('Failed to open terminal: ' + (data.error || 'Unknown error'));
          } else {
            openTerminalPanel(command.split(' ').slice(0, 4).join(' '), command, null, null);
          }
        } else {
          // agent mode — run synchronously and show output in panel
          const res = await fetch('/api/session/run', {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify({ command, cwd: repoPath || '' })
          });
          const data = await res.json().catch(() => ({}));
          const output = (data.stdout || '') + (data.stderr ? '\n' + data.stderr : '');
          openTerminalPanel(command.split(' ').slice(0, 4).join(' '), command, null, output || 'Done.');
          if (res.ok) await requestRefresh();
        }
      } catch (e) {
        showToast('Error: ' + e.message);
      } finally {
        if (btn) { btn.disabled = false; btn.textContent = origText; }
      }
    }

    // ── Terminal panel ────────────────────────────────────────────────────────

    const termState = {
      sessionName: null, startedAt: null,
      elapsedTimer: null,
      specPath: null, specTitle: null, specStage: null,
      specPoller: null, specContentHash: null
    };

    function openTerminalPanel(label, command, sessionName, staticContent, specContext) {
      const panelOverlay = document.getElementById('terminal-panel-overlay');
      const panel = document.getElementById('terminal-panel');
      const container = document.getElementById('terminal-container');

      document.getElementById('panel-title').textContent = label || 'Terminal';
      document.getElementById('panel-session-name').textContent = sessionName || '';
      const dot = document.getElementById('panel-status-dot');
      dot.className = 'panel-status-dot ' + (sessionName ? 'running' : '');

      clearInterval(termState.elapsedTimer);

      termState.sessionName = sessionName || null;
      termState.startedAt = Date.now();
      termState.specPath = specContext ? specContext.path : null;
      termState.specTitle = specContext ? specContext.title : null;
      termState.specStage = specContext ? specContext.stage : null;
      container.innerHTML = '';

      // Show "View Spec" button only when launched with a spec context
      const viewSpecBtn = document.getElementById('panel-view-spec');
      if (viewSpecBtn) viewSpecBtn.style.display = termState.specPath ? '' : 'none';

      // Stop any previous spec poller
      if (termState.specPoller) { clearInterval(termState.specPoller); termState.specPoller = null; }
      termState.specContentHash = null;

      // Show panel
      panelOverlay.style.display = '';
      panelOverlay.classList.add('open');
      panel.classList.add('open');
      document.body.style.overflow = 'hidden';

      // Split-view: if spec drawer is already open alongside, position panels side by side
      if (document.getElementById('spec-drawer').classList.contains('open')) {
        document.body.classList.add('split-view');
      }

      // Start stale poller: detect when AI edits the spec so user knows to refresh
      if (termState.specPath) {
        termState.specPoller = setInterval(async () => {
          if (!document.getElementById('spec-drawer').classList.contains('open')) return;
          if (drawerState.path !== termState.specPath) return;
          try {
            const r = await fetch('/api/spec?path=' + encodeURIComponent(termState.specPath));
            const data = await r.json();
            if (data.error) return;
            const hash = data.content.length + '|' + data.content.slice(-200);
            if (termState.specContentHash === null) { termState.specContentHash = hash; return; }
            if (hash !== termState.specContentHash) {
              termState.specContentHash = hash;
              const refreshBtn = document.getElementById('drawer-refresh');
              if (refreshBtn && !refreshBtn.classList.contains('stale')) refreshBtn.classList.add('stale');
            }
          } catch (e) {}
        }, 3000);
      }

      if (staticContent) {
        // Show command output as preformatted text
        const pre = document.createElement('pre');
        pre.style.cssText = 'color:#ededef;padding:12px;font-family:var(--mono);font-size:12px;margin:0;overflow:auto;height:100%;background:#0a0a0b';
        pre.textContent = staticContent;
        container.appendChild(pre);
      } else {
        // Session opened in terminal app
        container.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#888;font-size:13px;font-family:var(--mono)">Session opened in your terminal</div>';
        dot.className = 'panel-status-dot';
      }

      // Elapsed timer
      termState.elapsedTimer = setInterval(() => {
        const elapsed = Math.floor((Date.now() - termState.startedAt) / 1000);
        const el = document.getElementById('panel-elapsed');
        if (el) el.textContent = elapsed < 60 ? elapsed + 's' : Math.floor(elapsed / 60) + 'm ' + (elapsed % 60) + 's';
      }, 1000);
    }

    function closeTerminalPanel() {
      const panelOverlay = document.getElementById('terminal-panel-overlay');
      const panel = document.getElementById('terminal-panel');
      panelOverlay.classList.remove('open');
      panel.classList.remove('open');
      document.body.classList.remove('split-view');
      hideStopConfirm();
      // Restore overflow only if spec drawer is also closed
      if (!document.getElementById('spec-drawer').classList.contains('open')) {
        document.body.style.overflow = '';
      }
      if (termState.specPoller) { clearInterval(termState.specPoller); termState.specPoller = null; }
      clearInterval(termState.elapsedTimer);
    }

    function showStopConfirm() {
      const sessionName = termState.sessionName;
      if (!sessionName) { closeTerminalPanel(); return; }
      const shortName = sessionName.length > 32 ? '…' + sessionName.slice(-29) : sessionName;
      document.getElementById('panel-kill-label').textContent = 'Kill ' + shortName + '?';
      document.getElementById('panel-actions-normal').style.display = 'none';
      document.getElementById('panel-actions-confirm').style.display = '';
    }
    function hideStopConfirm() {
      document.getElementById('panel-actions-normal').style.display = '';
      document.getElementById('panel-actions-confirm').style.display = 'none';
    }

    async function stopTerminalSession() {
      const sessionName = termState.sessionName;
      if (!sessionName) { closeTerminalPanel(); return; }
      hideStopConfirm();
      try {
        await fetch('/api/session/stop', {
          method: 'POST', headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ sessionName })
        });
        showToast('Session killed: ' + sessionName);
      } catch (e) {
        showToast('Stop failed: ' + e.message);
      }
      closeTerminalPanel();
    }

    function toggleTerminalFullscreen() {
      const panel = document.getElementById('terminal-panel');
      panel.classList.toggle('fullscreen');
      const btn = document.getElementById('panel-fullscreen');
      if (btn) btn.textContent = panel.classList.contains('fullscreen') ? '⤡' : '⤢';
    }

    document.getElementById('panel-close').onclick = () => { hideStopConfirm(); closeTerminalPanel(); };
    document.getElementById('panel-back').onclick = () => { hideStopConfirm(); closeDrawer(); closeTerminalPanel(); };
    document.getElementById('panel-stop').onclick = () => showStopConfirm();
    document.getElementById('panel-stop-cancel').onclick = () => hideStopConfirm();
    document.getElementById('panel-stop-kill').onclick = () => stopTerminalSession();
    document.getElementById('panel-fullscreen').onclick = () => toggleTerminalFullscreen();
    document.getElementById('panel-view-spec').onclick = () => {
      if (termState.specPath) {
        openDrawer(termState.specPath, termState.specTitle || 'Spec', termState.specStage || 'inbox');
      }
    };
    document.getElementById('terminal-panel-overlay').onclick = () => closeTerminalPanel();

    // Keyboard shortcut: Escape closes panels
    document.addEventListener('keydown', (e) => {
      const panel = document.getElementById('terminal-panel');
      if (!panel.classList.contains('open')) return;
      if (e.key === 'Escape') {
        if (document.body.classList.contains('split-view')) {
          // In split-view: ESC closes both panels at once → back to dashboard
          closeDrawer(); closeTerminalPanel();
        } else if (!document.getElementById('spec-drawer').classList.contains('open')) {
          closeTerminalPanel();
        }
        return;
      }
      if ((e.metaKey || e.ctrlKey) && e.shiftKey && e.key === 'f') {
        e.preventDefault();
        toggleTerminalFullscreen();
      }
    }, true);

    // ── AI session picker ──────────────────────────────────────────────────────

    // ── Ask-agent helpers ─────────────────────────────────────────────────────

    const ASK_AGENTS = [
      { id: 'cc', name: 'Claude Code' },
      { id: 'gg', name: 'Gemini' },
      { id: 'cx', name: 'Codex' },
      { id: 'cu', name: 'Cursor' }
    ];

    function getAskAgent() { return localStorage.getItem(lsKey('askAgent')) || 'cc'; }
    function setAskAgent(id) { localStorage.setItem(lsKey('askAgent'), id); }

    function buildAskAgentHtml(repoPath) {
      const agentId = getAskAgent();
      const others = ASK_AGENTS.filter(a => a.id !== agentId);
      const escapedRepo = escHtml(repoPath);
      const otherItems = others.map(a =>
        '<button class="ask-agent-option" data-ask-agent="' + a.id + '" data-ask-repo="' + escapedRepo + '">' +
        escHtml(a.id) + ' · ' + escHtml(a.name) + '</button>'
      ).join('');
      return '<span class="ask-agent-group">' +
        '<button class="btn ask-agent-primary" data-ask-run="' + escHtml(agentId) + '" data-ask-repo="' + escapedRepo + '">Ask ' + escHtml(agentId) + '</button>' +
        '<button class="btn ask-agent-chevron" data-ask-toggle data-ask-repo="' + escapedRepo + '">▾</button>' +
        '<div class="ask-agent-dropdown">' + otherItems + '</div>' +
        '</span>';
    }

    async function runAskAgent(repoPath, agentId) {
      const res = await fetch('/api/session/ask', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ repoPath, agentId })
      }).catch(() => null);
      if (!res || !res.ok) {
        const data = res ? await res.json().catch(() => ({})) : {};
        showToast('Failed to start session: ' + (data.error || 'Unknown'), null, null, { error: true });
      }
    }

    // Event delegation for ask-agent buttons (rendered via innerHTML)
    document.addEventListener('click', (e) => {
      // Close open dropdowns when clicking outside
      const group = e.target.closest('.ask-agent-group');
      if (!group) {
        document.querySelectorAll('.ask-agent-dropdown.open').forEach(d => d.classList.remove('open'));
        return;
      }
      if (e.target.closest('[data-ask-run]')) {
        const btn = e.target.closest('[data-ask-run]');
        runAskAgent(btn.dataset.askRepo, btn.dataset.askRun);
        return;
      }
      if (e.target.closest('[data-ask-toggle]')) {
        const dropdown = group.querySelector('.ask-agent-dropdown');
        document.querySelectorAll('.ask-agent-dropdown.open').forEach(d => { if (d !== dropdown) d.classList.remove('open'); });
        dropdown && dropdown.classList.toggle('open');
        return;
      }
      if (e.target.closest('[data-ask-agent]')) {
        const btn = e.target.closest('[data-ask-agent]');
        setAskAgent(btn.dataset.askAgent);
        runAskAgent(btn.dataset.askRepo, btn.dataset.askAgent);
        document.querySelectorAll('.ask-agent-dropdown.open').forEach(d => d.classList.remove('open'));
      }
    });

    // ── Agent picker ──────────────────────────────────────────────────────────

    let pickerResolve = null;

    function showAgentPicker(featureId, featureName) {
      return new Promise((resolve) => {
        pickerResolve = resolve;
        document.getElementById('agent-picker-desc').textContent = '#' + featureId + ' ' + featureName;
        document.querySelectorAll('#agent-picker input[type=checkbox]').forEach(cb => { cb.checked = false; });
        document.getElementById('agent-picker').style.display = 'flex';
        document.getElementById('agent-picker-submit').focus();
      });
    }

    function hideAgentPicker(result) {
      document.getElementById('agent-picker').style.display = 'none';
      if (pickerResolve) { pickerResolve(result); pickerResolve = null; }
    }

    document.getElementById('agent-picker-cancel').onclick = () => hideAgentPicker(null);
    document.getElementById('agent-picker').onclick = (e) => { if (e.target === e.currentTarget) hideAgentPicker(null); };
    document.getElementById('agent-picker-submit').onclick = () => {
      const selected = [...document.querySelectorAll('#agent-picker input[type=checkbox]:checked')].map(cb => cb.value);
      if (selected.length === 0) { showToast('Select at least one agent'); return; }
      hideAgentPicker(selected);
    };

    // ── Repo sidebar ──────────────────────────────────────────────────────────

    function selectRepo(repoPath) {
      state.selectedRepo = repoPath;
      localStorage.setItem(lsKey('selectedRepo'), repoPath);
      // Sync mobile dropdown
      const mobile = document.getElementById('repo-select-mobile');
      if (mobile) mobile.value = repoPath;
      render();
    }

    function getRepoStats(repo) {
      const allItems = [...(repo.features || []), ...(repo.research || []), ...(repo.feedback || [])];
      const activeItems = allItems.filter(f => f.stage !== 'done');
      const totalItems = activeItems.length;
      const hasWaiting = allItems.some(f => (f.agents || []).some(a => a.status === 'waiting'));
      const hasError = allItems.some(f => (f.agents || []).some(a => a.status === 'error'));
      const featureCount = (repo.features || []).filter(f => f.stage !== 'done').length;
      const researchCount = (repo.research || []).filter(f => f.stage !== 'done').length;
      const feedbackCount = (repo.feedback || []).filter(f => f.stage !== 'done').length;
      const waitingCount = allItems.filter(f => (f.agents || []).some(a => a.status === 'waiting')).length;
      const errorCount = allItems.filter(f => (f.agents || []).some(a => a.status === 'error')).length;
      return { totalItems, featureCount, researchCount, feedbackCount, hasWaiting, hasError, waitingCount, errorCount };
    }

    function renderSidebar(repos) {
      const sidebar = document.getElementById('repo-sidebar');
      const mobile = document.getElementById('repo-select-mobile');
      const hadFocus = sidebar.contains(document.activeElement);
      sidebar.innerHTML = '';
      mobile.innerHTML = '';

      // Sort repos: active agents first, then by most recent activity
      const sorted = [...(repos || [])].sort((a, b) => {
        const aItems = [...(a.features || []), ...(a.research || [])];
        const bItems = [...(b.features || []), ...(b.research || [])];
        const aRunning = aItems.some(f => (f.agents || []).some(ag => ag.status === 'implementing'));
        const bRunning = bItems.some(f => (f.agents || []).some(ag => ag.status === 'implementing'));
        if (aRunning !== bRunning) return aRunning ? -1 : 1;
        const aActive = aItems.filter(f => f.stage === 'in-progress' || f.stage === 'in-evaluation').length;
        const bActive = bItems.filter(f => f.stage === 'in-progress' || f.stage === 'in-evaluation').length;
        if (aActive !== bActive) return bActive - aActive;
        const latestTime = items => Math.max(0, ...items.flatMap(f => (f.agents || []).map(ag => new Date(ag.updatedAt || 0).getTime())));
        return latestTime(bItems) - latestTime(aItems);
      });

      // "All" option
      const allBtn = document.createElement('button');
      allBtn.className = 'sidebar-item' + (state.selectedRepo === 'all' ? ' active' : '');
      allBtn.setAttribute('role', 'option');
      allBtn.setAttribute('aria-selected', state.selectedRepo === 'all' ? 'true' : 'false');
      allBtn.setAttribute('tabindex', state.selectedRepo === 'all' ? '0' : '-1');
      allBtn.innerHTML = '<span class="sidebar-name">All Repos</span>';
      allBtn.onclick = () => selectRepo('all');
      sidebar.appendChild(allBtn);

      const allOpt = document.createElement('option');
      allOpt.value = 'all';
      allOpt.textContent = 'All Repos';
      mobile.appendChild(allOpt);

      // Per-repo items
      sorted.forEach(repo => {
        const stats = getRepoStats(repo);
        const isActive = state.selectedRepo === repo.path;

        const btn = document.createElement('button');
        btn.className = 'sidebar-item' + (isActive ? ' active' : '');
        btn.setAttribute('role', 'option');
        btn.setAttribute('aria-selected', isActive ? 'true' : 'false');
        btn.setAttribute('tabindex', isActive ? '0' : '-1');
        btn.title = repo.displayPath;

        let indicatorsHtml = '';
        if (stats.hasError) indicatorsHtml += '<span class="sidebar-dot error"></span>';
        else if (stats.hasWaiting) indicatorsHtml += '<span class="sidebar-dot waiting"></span>';
        if (stats.totalItems > 0) indicatorsHtml += '<span class="sidebar-badge">' + stats.totalItems + '</span>';

        btn.innerHTML = '<span class="sidebar-name">' + escHtml(repo.displayPath) + '</span>' +
          (indicatorsHtml ? '<span class="sidebar-indicators">' + indicatorsHtml + '</span>' : '');
        btn.onclick = () => selectRepo(repo.path);
        sidebar.appendChild(btn);

        const opt = document.createElement('option');
        opt.value = repo.path;
        opt.textContent = repo.displayPath + (stats.totalItems ? ' (' + stats.totalItems + ')' : '');
        mobile.appendChild(opt);
      });

      mobile.value = state.selectedRepo;

      // Validate: if selectedRepo no longer exists, reset to 'all'
      if (state.selectedRepo !== 'all' && !(repos || []).some(r => r.path === state.selectedRepo)) {
        selectRepo('all');
      }

      // Restore focus if sidebar had focus before re-render
      if (hadFocus) {
        const activeBtn = sidebar.querySelector('.sidebar-item[tabindex="0"]');
        if (activeBtn) activeBtn.focus();
      }
    }

    function renderRepoHeader(repo) {
      const header = document.getElementById('repo-header');
      if (!repo || state.selectedRepo === 'all') {
        header.style.display = 'none';
        return;
      }
      const stats = getRepoStats(repo);
      const parts = [];
      if (stats.featureCount > 0) parts.push(stats.featureCount + ' feature' + (stats.featureCount === 1 ? '' : 's'));
      if (stats.researchCount > 0) parts.push(stats.researchCount + ' research');
      let metaText = parts.join(', ') || 'No items';
      if (stats.waitingCount > 0) metaText += ' · ' + stats.waitingCount + ' waiting';
      if (stats.errorCount > 0) metaText += ' · ' + stats.errorCount + ' error';

      header.style.display = '';
      header.innerHTML = '<h2 class="repo-header-name">' + escHtml(repo.displayPath) + '</h2>' +
        '<span class="repo-header-meta">' + escHtml(metaText) + '</span>' +
        buildAskAgentHtml(repo.path);
    }

    // Keyboard navigation for sidebar
    document.getElementById('repo-sidebar').addEventListener('keydown', (e) => {
      const items = [...document.querySelectorAll('.sidebar-item')];
      const focusedIdx = items.indexOf(document.activeElement);
      if (focusedIdx === -1) return;

      let nextIdx = -1;
      if (e.key === 'ArrowDown') {
        nextIdx = Math.min(focusedIdx + 1, items.length - 1);
      } else if (e.key === 'ArrowUp') {
        nextIdx = Math.max(focusedIdx - 1, 0);
      } else if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        items[focusedIdx].click();
        return;
      } else if (e.key === 'Home') {
        nextIdx = 0;
      } else if (e.key === 'End') {
        nextIdx = items.length - 1;
      } else {
        return;
      }

      e.preventDefault();
      if (nextIdx >= 0 && nextIdx < items.length) {
        items.forEach(it => it.setAttribute('tabindex', '-1'));
        items[nextIdx].setAttribute('tabindex', '0');
        items[nextIdx].focus();
      }
    });

    // Mobile dropdown handler
    document.getElementById('repo-select-mobile').addEventListener('change', (e) => {
      selectRepo(e.target.value);
    });

    // ── Spec drawer ──────────────────────────────────────────────────────────

    const drawerState = {
      path: null, content: '', savedContent: '', mode: 'read', dirty: false,
      title: '', stage: '',
      fontSize: Number(localStorage.getItem(lsKey('drawerFontSize')) || '13'),
      undoStack: [], redoStack: []
    };
    const drawerOverlay = document.getElementById('drawer-overlay');
    const drawerEl = document.getElementById('spec-drawer');
    const drawerTitle = document.getElementById('drawer-title');
    const drawerStage = document.getElementById('drawer-stage');
    const drawerPreview = document.getElementById('drawer-preview');
    const drawerEditor = document.getElementById('drawer-editor');
    const drawerSaveBtn = document.getElementById('drawer-save');
    const drawerSaveStatus = document.getElementById('drawer-save-status');
    const drawerUndoBtn = document.getElementById('drawer-undo');
    const drawerRedoBtn = document.getElementById('drawer-redo');
    const drawerFontSizeLabel = document.getElementById('drawer-font-size');

    function applyDrawerFontSize() {
      const sz = drawerState.fontSize + 'px';
      drawerPreview.style.fontSize = sz;
      drawerEditor.style.fontSize = sz;
      drawerFontSizeLabel.textContent = drawerState.fontSize;
      localStorage.setItem(lsKey('drawerFontSize'), String(drawerState.fontSize));
    }

    function renderMarkdownPreview(md) {
      if (typeof marked !== 'undefined') {
        drawerPreview.innerHTML = marked.parse(md);
        drawerPreview.querySelectorAll('input[type="checkbox"]').forEach(cb => { cb.disabled = true; });
      } else {
        drawerPreview.textContent = md;
      }
    }

    function updateDrawerButtons() {
      drawerSaveBtn.disabled = !drawerState.dirty;
      drawerUndoBtn.disabled = drawerState.undoStack.length === 0;
      drawerRedoBtn.disabled = drawerState.redoStack.length === 0;
    }

    function pushUndo() {
      const current = drawerEditor.value;
      const last = drawerState.undoStack[drawerState.undoStack.length - 1];
      if (last === current) return;
      drawerState.undoStack.push(current);
      if (drawerState.undoStack.length > 100) drawerState.undoStack.shift();
      drawerState.redoStack = [];
      updateDrawerButtons();
    }

    function openDrawer(specPath, title, stage) {
      if (!specPath) return;
      drawerState.path = specPath;
      drawerState.title = title;
      drawerState.stage = stage;
      drawerState.mode = 'read';
      drawerState.dirty = false;
      drawerState.undoStack = [];
      drawerState.redoStack = [];
      drawerTitle.textContent = title;
      drawerStage.textContent = stage;
      drawerPreview.innerHTML = '<span style="color:var(--text-tertiary)">Loading…</span>';
      drawerEditor.value = '';
      drawerEditor.style.display = 'none';
      drawerPreview.style.display = '';
      drawerSaveStatus.textContent = '';
      updateDrawerModeButtons();
      updateDrawerButtons();
      applyDrawerFontSize();
      drawerOverlay.classList.add('open');
      drawerEl.classList.add('open');
      document.body.style.overflow = 'hidden';
      // If terminal panel is also open, enter split-view so both headers are accessible
      if (document.getElementById('terminal-panel').classList.contains('open')) {
        document.body.classList.add('split-view');
      }

      fetch('/api/spec?path=' + encodeURIComponent(specPath))
        .then(r => r.json())
        .then(data => {
          if (data.error) { drawerPreview.textContent = 'Error: ' + data.error; return; }
          drawerState.content = data.content;
          drawerState.savedContent = data.content;
          drawerEditor.value = data.content;
          renderMarkdownPreview(data.content);
        })
        .catch(e => { drawerPreview.textContent = 'Failed to load: ' + e.message; });
    }

    function closeDrawer() {
      if (drawerState.dirty && !confirm('You have unsaved changes. Discard?')) return;
      drawerOverlay.classList.remove('open');
      drawerEl.classList.remove('open');
      document.body.classList.remove('split-view');
      if (!document.getElementById('terminal-panel').classList.contains('open')) {
        document.body.style.overflow = '';
      }
      drawerState.path = null;
      drawerState.dirty = false;
      // Refit terminal after spec drawer closes (terminal panel goes back to right side)
      setTimeout(() => { if (termState.fitAddon) try { termState.fitAddon.fit(); } catch (e) {} }, 300);
    }

    function setDrawerMode(mode) {
      drawerState.mode = mode;
      updateDrawerModeButtons();
      if (mode === 'read') {
        drawerEditor.style.display = 'none';
        drawerPreview.style.display = '';
        drawerState.content = drawerEditor.value;
        renderMarkdownPreview(drawerState.content);
      } else {
        drawerEditor.value = drawerState.content;
        drawerPreview.style.display = 'none';
        drawerEditor.style.display = '';
        drawerEditor.focus();
      }
    }

    function updateDrawerModeButtons() {
      drawerEl.querySelectorAll('.drawer-mode-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mode === drawerState.mode);
      });
    }

    async function saveDrawer() {
      if (!drawerState.dirty) return;
      drawerSaveBtn.disabled = true;
      drawerSaveStatus.textContent = 'Saving…';
      try {
        const content = drawerState.mode === 'edit' ? drawerEditor.value : drawerState.content;
        const res = await fetch('/api/spec', {
          method: 'PUT',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ path: drawerState.path, content })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed');
        drawerState.content = content;
        drawerState.savedContent = content;
        drawerState.dirty = false;
        drawerSaveStatus.textContent = 'Saved';
        renderMarkdownPreview(drawerState.content);
        updateDrawerButtons();
      } catch (e) {
        drawerSaveStatus.textContent = 'Error: ' + e.message;
      } finally {
        drawerSaveBtn.disabled = !drawerState.dirty;
      }
    }

    // Event listeners
    drawerOverlay.onclick = closeDrawer;
    document.getElementById('drawer-close').onclick = closeDrawer;
    drawerEl.querySelectorAll('.drawer-mode-btn').forEach(btn => {
      btn.onclick = () => setDrawerMode(btn.dataset.mode);
    });

    // Track edits for dirty state — use a debounced undo snapshot
    let undoTimer = null;
    drawerEditor.addEventListener('input', () => {
      drawerState.dirty = drawerEditor.value !== drawerState.savedContent;
      drawerSaveStatus.textContent = '';
      updateDrawerButtons();
      // Snapshot for undo after 500ms pause in typing
      clearTimeout(undoTimer);
      undoTimer = setTimeout(() => pushUndo(), 500);
    });

    // Before first edit in a session, snapshot the original
    drawerEditor.addEventListener('focus', () => {
      if (drawerState.undoStack.length === 0 && drawerEditor.value) {
        drawerState.undoStack.push(drawerEditor.value);
      }
    });

    drawerSaveBtn.onclick = saveDrawer;

    drawerUndoBtn.onclick = () => {
      if (drawerState.undoStack.length === 0) return;
      drawerState.redoStack.push(drawerEditor.value);
      const prev = drawerState.undoStack.pop();
      drawerEditor.value = prev;
      drawerState.content = prev;
      drawerState.dirty = prev !== drawerState.savedContent;
      drawerSaveStatus.textContent = '';
      updateDrawerButtons();
    };

    drawerRedoBtn.onclick = () => {
      if (drawerState.redoStack.length === 0) return;
      drawerState.undoStack.push(drawerEditor.value);
      const next = drawerState.redoStack.pop();
      drawerEditor.value = next;
      drawerState.content = next;
      drawerState.dirty = next !== drawerState.savedContent;
      drawerSaveStatus.textContent = '';
      updateDrawerButtons();
    };

    // Font size controls
    document.getElementById('drawer-font-down').onclick = () => {
      drawerState.fontSize = Math.max(10, drawerState.fontSize - 1);
      applyDrawerFontSize();
    };
    document.getElementById('drawer-font-up').onclick = () => {
      drawerState.fontSize = Math.min(24, drawerState.fontSize + 1);
      applyDrawerFontSize();
    };

    document.getElementById('drawer-refresh').onclick = async () => {
      if (!drawerState.path) return;
      if (drawerState.dirty && !confirm('You have unsaved changes. Reload and discard them?')) return;
      const btn = document.getElementById('drawer-refresh');
      btn.classList.remove('stale');
      termState.specContentHash = null; // reset so next poll re-baselines
      btn.textContent = '↺…';
      btn.disabled = true;
      const scrollTop = document.getElementById('drawer-body').scrollTop;
      try {
        const res = await fetch('/api/spec?path=' + encodeURIComponent(drawerState.path));
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        drawerState.content = data.content;
        drawerState.savedContent = data.content;
        drawerState.dirty = false;
        drawerEditor.value = data.content;
        renderMarkdownPreview(data.content);
        updateDrawerButtons();
        drawerSaveStatus.textContent = 'Refreshed';
        setTimeout(() => { if (drawerSaveStatus.textContent === 'Refreshed') drawerSaveStatus.textContent = ''; }, 2000);
        requestAnimationFrame(() => { document.getElementById('drawer-body').scrollTop = scrollTop; });
      } catch (e) {
        showToast('Refresh failed: ' + e.message);
      } finally {
        btn.textContent = '↺ Refresh';
        btn.disabled = false;
      }
    };

    document.getElementById('drawer-open-editor').onclick = async () => {
      try {
        await fetch('/api/open-in-editor', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ path: drawerState.path })
        });
      } catch (e) {
        showToast('Could not open editor: ' + e.message, null, null, {error:true});
      }
    };

    // Fullscreen toggle
    function toggleDrawerFullscreen() {
      drawerEl.classList.toggle('fullscreen');
      const btn = document.getElementById('drawer-fullscreen');
      btn.textContent = drawerEl.classList.contains('fullscreen') ? '⤡' : '⤢';
    }
    document.getElementById('drawer-fullscreen').onclick = toggleDrawerFullscreen;

    // Keyboard shortcuts for drawer
    document.addEventListener('keydown', (e) => {
      if (!drawerEl.classList.contains('open')) return;
      if (e.key === 'Escape') { closeDrawer(); return; }
      // Cmd+S to save
      if ((e.metaKey || e.ctrlKey) && e.key === 's') {
        e.preventDefault();
        saveDrawer();
        return;
      }
      // Cmd+Shift+E to toggle read/edit mode
      if ((e.metaKey || e.ctrlKey) && e.shiftKey && e.key === 'e') {
        e.preventDefault();
        setDrawerMode(drawerState.mode === 'read' ? 'edit' : 'read');
        return;
      }
      // Cmd+Shift+F to toggle fullscreen
      if ((e.metaKey || e.ctrlKey) && e.shiftKey && e.key === 'f') {
        e.preventDefault();
        toggleDrawerFullscreen();
      }
    });

    // ── Shared render helpers ─────────────────────────────────────────────────

    function updateTitleAndFavicon(waiting){
      document.title = waiting > 0 ? '(' + waiting + ') Aigon Dashboard' : 'Aigon Dashboard';
      const link = document.querySelector('link[rel="icon"]') || (() => { const x = document.createElement('link'); x.rel = 'icon'; document.head.appendChild(x); return x; })();
      if (!waiting) { link.href = 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2232%22 height=%2232%22></svg>'; return; }
      const c = document.createElement('canvas'); c.width = 32; c.height = 32;
      const ctx = c.getContext('2d');
      ctx.fillStyle = '#111113'; ctx.fillRect(0,0,32,32);
      ctx.fillStyle = '#f59e0b'; ctx.beginPath(); ctx.arc(16,16,13,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff'; ctx.font = 'bold 16px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(String(waiting > 99 ? '99+' : waiting), 16, 16);
      link.href = c.toDataURL('image/png');
    }

    // Helper: builds the "run next" button group HTML for a feature card (used via x-html)
    function buildNextActionHtml(feature, repoPath) {
      const nextActions = feature.nextActions && feature.nextActions.length > 0
        ? feature.nextActions
        : (feature.nextAction && feature.nextAction.command ? [{ command: feature.nextAction.command, label: 'Run', reason: feature.nextAction.reason || '', mode: 'fire-and-forget' }] : []);
      if (nextActions.length === 0) return '';
      const primary = nextActions[0];
      const extras = nextActions.slice(1);
      const dropdownHtml = extras.length > 0
        ? '<button class="btn btn-primary run-next-chevron" aria-haspopup="true" title="More actions">▾</button>' +
          '<div class="run-next-dropdown" role="menu">' +
          extras.map(a => '<button class="dropdown-item" data-command="' + escHtml(a.command) + '" data-mode="' + escHtml(a.mode) + '">' +
            '<span class="item-label">' + escHtml(a.label) + '</span>' +
            '<code class="item-command">' + escHtml(a.command) + '</code>' +
            '<span class="item-reason">' + escHtml(a.reason) + '</span>' +
            '</button>').join('') + '</div>'
        : '';
      // Remap raw state-machine labels ("Focus cc", "View cc") to clean button text.
      // Works from the first word so it doesn't depend on action metadata from the server.
      const NEXT_ACTION_FIRST_WORD_MAP = { Focus: 'View', Attach: 'View' };
      const firstWord = primary.label.split(' ')[0];
      const primaryLabel = NEXT_ACTION_FIRST_WORD_MAP[firstWord] || firstWord;
      return '<span class="run-next-group">' +
        '<button class="btn btn-primary run-next-primary" data-command="' + escHtml(primary.command) + '" data-mode="' + escHtml(primary.mode) + '" data-repo="' + escHtml(repoPath) + '" title="' + escHtml(primary.command) + ' — ' + escHtml(primary.reason) + '">' + escHtml(primaryLabel) + '</button>' +
        dropdownHtml + '</span>';
    }

    function monitorView() {
      return {
        monitorTypeOpts: [
          { key: 'all', label: 'All' },
          { key: 'features', label: 'Features' },
          { key: 'research', label: 'Research' },
          { key: 'feedback', label: 'Feedback' }
        ],
        get visibleRepos() { return getVisibleRepos(Alpine.store('dashboard').data || { repos: [] }); },
        get computedSummary() {
          const s = Alpine.store('dashboard');
          const data = s.data || { repos: [], summary: { implementing: 0, waiting: 0, submitted: 0, error: 0 } };
          if (s.selectedRepo === 'all') return data.summary || { implementing: 0, waiting: 0, submitted: 0, error: 0 };
          const summary = { implementing: 0, waiting: 0, submitted: 0, error: 0 };
          const monitorType = s.monitorType || 'all';
          const itemTypes = monitorType === 'all' ? ['features', 'research', 'feedback'] : [monitorType];
          this.visibleRepos.forEach(repo => {
            itemTypes.forEach(t => { (repo[t] || []).forEach(item => { (item.agents || []).forEach(a => { if (summary[a.status] !== undefined) summary[a.status]++; }); }); });
          });
          return summary;
        },
        get emptyMessage() {
          const s = Alpine.store('dashboard');
          if (this.visibleRepos.length === 0) return s.selectedRepo === 'all' ? 'No repos registered. Run: aigon conductor add' : 'No data for selected repo.';
          const hasItems = this.visibleRepos.some(r => this.getFeatures(r).length > 0 || this.getResearch(r).length > 0 || this.getFeedback(r).length > 0);
          if (hasItems) return '';
          return s.filter === 'all' ? 'No items in progress.' : 'No items match filter: ' + s.filter;
        },
        isCollapsed(path) { return !!(Alpine.store('dashboard').collapsed || {})[path]; },
        toggleCollapse(path) {
          const s = Alpine.store('dashboard');
          s.collapsed[path] = !s.collapsed[path];
          localStorage.setItem(lsKey('collapsed'), JSON.stringify(s.collapsed));
        },
        setFilter(f) { Alpine.store('dashboard').filter = f; localStorage.setItem(lsKey('filter'), f); },
        setMonitorType(t) { Alpine.store('dashboard').monitorType = t; localStorage.setItem(lsKey('monitorType'), t); },
        getFeatures(repo) {
          const s = Alpine.store('dashboard');
          const mt = s.monitorType || 'all';
          if (mt !== 'all' && mt !== 'features') return [];
          const raw = [...(repo.features || [])].filter(f => f.stage === 'in-progress' || f.stage === 'in-evaluation').sort((a, b) => featureRank(a) - featureRank(b) || Number(a.id) - Number(b.id));
          return s.filter === 'all' ? raw : raw.filter(f => f.agents.some(a => a.status === s.filter));
        },
        getResearch(repo) {
          const s = Alpine.store('dashboard');
          const mt = s.monitorType || 'all';
          if (mt !== 'all' && mt !== 'research') return [];
          const raw = [...(repo.research || [])].filter(r => r.stage === 'in-progress').sort((a, b) => featureRank(a) - featureRank(b) || Number(a.id) - Number(b.id));
          return s.filter === 'all' ? raw : raw.filter(r => r.agents.some(a => a.status === s.filter));
        },
        getFeedback(repo) {
          const s = Alpine.store('dashboard');
          const mt = s.monitorType || 'all';
          if (mt !== 'all' && mt !== 'feedback') return [];
          const raw = [...(repo.feedback || [])].filter(f => f.stage === 'in-progress').sort((a, b) => featureRank(a) - featureRank(b) || Number(a.id) - Number(b.id));
          return s.filter === 'all' ? raw : raw.filter(f => (f.agents || []).some(a => a.status === s.filter));
        },
        getTotalItems(repo) { return this.getFeatures(repo).length + this.getResearch(repo).length + this.getFeedback(repo).length; },
        sortedAgents(agents) { return [...(agents || [])].sort((a, b) => statusRank(a.status) - statusRank(b.status) || a.id.localeCompare(b.id)); },
        relTimeProxy(iso) { return relTime(iso); },

          return (feature.id ? '#' + escHtml(feature.id) + ' ' : '') + escHtml(feature.name) + evalBadge;
        },
        researchTitle(item) {

          const badge = allSubmitted ? '<span class="research-badge all-submitted">ready to synthesize</span>' : '<span class="research-badge">research</span>';
          return (item.id ? 'R#' + escHtml(item.id) + ' ' : '') + escHtml(item.name) + badge;
        },
        feedbackTitle(item) { return (item.id ? 'FB#' + escHtml(item.id) + ' ' : '') + escHtml(item.name) + '<span class="research-badge">feedback</span>'; },
        researchSynthBtn(item) {
          if (!(item.agents.length > 0 && item.agents.every(a => a.status === 'submitted'))) return '';
          const synthCmd = '/ars ' + String(item.id).padStart(2, '0');
          return '<button class="copy btn btn-primary next-copy" data-copy="' + escHtml(synthCmd) + '" title="All agents submitted — synthesize findings">Copy next</button>';
        },
        buildNextActionHtml(feature, repoPath) { return buildNextActionHtml(feature, repoPath); },
        buildAskAgentHtml(repoPath) { return buildAskAgentHtml(repoPath); },
        handleAskClick(e) {
          const btn = e.target.closest('[data-ask-run]');
          if (btn) { runAskAgent(btn.dataset.askRepo, btn.dataset.askRun); return; }
          const tog = e.target.closest('[data-ask-toggle]');
          if (tog) {
            const group = tog.closest('.ask-agent-group');
            const dd = group && group.querySelector('.ask-agent-dropdown');
            document.querySelectorAll('.ask-agent-dropdown.open').forEach(d => { if (d !== dd) d.classList.remove('open'); });
            dd && dd.classList.toggle('open');

          }

          if (opt) {

        repoSummaryText(repo) {
          const features = this.getFeatures(repo), research = this.getResearch(repo), feedback = this.getFeedback(repo);
          const parts = [];
          if (features.length > 0) parts.push(features.length + ' feature' + (features.length === 1 ? '' : 's'));
          if (research.length > 0) parts.push(research.length + ' research');
          if (feedback.length > 0) parts.push(feedback.length + ' feedback');
          const waitingCards = features.filter(f => f.agents.some(a => a.status === 'waiting')).length
            + research.filter(r => r.agents.some(a => a.status === 'waiting')).length
            + feedback.filter(f => (f.agents || []).some(a => a.status === 'waiting')).length;
          const collapsed = this.isCollapsed(repo.path);
          return (parts.join(', ') || '0 items') + (waitingCards ? ' • ' + waitingCards + ' waiting' : '') + ' <span aria-label="Toggle">' + (collapsed ? '[+]' : '[-]') + '</span>';

        attachAgent(repoPath, featureId, agentId, tmuxSession) { requestAttach(repoPath, featureId, agentId, tmuxSession); },
        // Event delegation for x-html injected buttons (run-next group, synth copy btn)
        handleMonitorClick(e) {

          if (!btn) return;

            const text = btn.getAttribute('data-copy') || '';

            e.stopPropagation();
            executeNextAction(btn.getAttribute('data-command') || '', btn.getAttribute('data-mode') || 'fire-and-forget', btn.getAttribute('data-repo') || '', btn);

            const dropdown = group && group.querySelector('.run-next-dropdown');

            const isOpen = dropdown.classList.contains('open');

    // ── Pipeline / Kanban view ─────────────────────────────────────────────────

    const STAGE_ORDER = ['inbox', 'backlog', 'in-progress', 'in-evaluation', 'done'];
    const STAGE_LABELS = { inbox: 'Inbox', backlog: 'Backlog', 'in-progress': 'In-Progress', 'in-evaluation': 'Evaluation', done: 'Done', paused: 'Paused', triaged: 'Triaged', actionable: 'Actionable', 'wont-fix': "Won't Fix", duplicate: 'Duplicate' };
    const PIPELINE_STAGES = {
      features: ['inbox', 'backlog', 'in-progress', 'in-evaluation', 'done'],
      research: ['inbox', 'backlog', 'in-progress', 'paused', 'done'],
      feedback: ['inbox', 'triaged', 'actionable', 'done', 'wont-fix']
    };
    // ALLOWED_TRANSITIONS removed — transitions are now validated server-side via
    // validActions in the /api/status response. Drag-drop uses validTargetStages
    // computed from validActions on the card's dragstart event.

    let dragState = null;

    function pipelineCommand(pipelineType, action) {
      const prefix = pipelineType === 'research' ? 'research' : pipelineType === 'feedback' ? 'feedback' : 'feature';
      return prefix + '-' + action;
    }

    function buildAgentBadgesHtml(agents) {
      if (!agents || agents.length === 0) return '';
      return agents.map(a => '<span class="agent-badge ' + escHtml(a.status || '') + '">' + escHtml(a.id) + '</span>').join('');
    }

    const AGENT_DISPLAY_NAMES = { cc: 'Claude Code', gg: 'Gemini', cx: 'Codex', cu: 'Cursor', solo: 'Agent' };

    function buildAgentStatusHtml(agent) {
      const status = agent.status || 'idle';
      const tmuxRunning = agent.tmuxRunning || false;
      let icon, label, cls;
      if (status === 'implementing' && tmuxRunning) {
        icon = '●'; label = 'Running'; cls = 'status-running';
      } else if (status === 'implementing' && !tmuxRunning) {
        icon = '○'; label = 'Session ended'; cls = 'status-ended';
      } else if (status === 'waiting') {
        icon = '⏳'; label = 'Needs input'; cls = 'status-waiting';
      } else if (status === 'submitted') {
        icon = '✓'; label = 'Submitted'; cls = 'status-submitted';
      } else {
        icon = '○'; label = 'Not started'; cls = 'status-idle';
      }
      return '<span class="kcard-agent-status ' + cls + '">' + icon + ' ' + label + '</span>';
    }

    // Remap state machine action labels to clean, agent-ID-free button text.
    const AGENT_ACTION_LABELS = {
      'feature-attach':  'View',
      'feature-focus':   'View',
      'feature-open':    (va, agent) => (agent.status === 'implementing') ? 'Restart' : 'Start',
      'research-attach': 'View',
      'research-open':   'Start'
    };

    function buildAgentSectionHtml(agent, agentValidActions) {
      const displayName = AGENT_DISPLAY_NAMES[agent.id] || agent.id;
      const statusHtml = buildAgentStatusHtml(agent);
      const primaryActions = agentValidActions.filter(va => va.action !== 'feature-stop' && va.action !== 'research-stop');
      const overflowActions = agentValidActions.filter(va => va.action === 'feature-stop' || va.action === 'research-stop');
      let actionsHtml = '';
      if (primaryActions.length > 0) {
        const va = primaryActions[0];
        const btnCls = (va.priority === 'high') ? 'btn btn-primary' : 'btn btn-secondary';
        const labelOverride = AGENT_ACTION_LABELS[va.action];
        const label = typeof labelOverride === 'function' ? labelOverride(va, agent) : (labelOverride || va.label);
        actionsHtml += '<button class="' + btnCls + ' kcard-va-btn" data-va-action="' + escHtml(va.action) + '" data-agent="' + escHtml(agent.id) + '">' + escHtml(label) + '</button>';
      }
      if (overflowActions.length > 0) {
        const items = overflowActions.map(va =>
          '<button class="kcard-overflow-item kcard-va-btn" data-va-action="' + escHtml(va.action) + '" data-agent="' + escHtml(agent.id) + '">End Session</button>'
        ).join('');
        actionsHtml += '<div class="kcard-overflow"><button class="btn btn-overflow kcard-overflow-toggle" type="button">⋯</button><div class="kcard-overflow-menu">' + items + '</div></div>';
      }
      return '<div class="kcard-agent agent-' + escHtml(agent.id) + '">' +
        '<div class="kcard-agent-header"><span class="kcard-agent-name">' + escHtml(displayName) + '</span>' + statusHtml + '</div>' +
        (actionsHtml ? '<div class="kcard-agent-actions">' + actionsHtml + '</div>' : '') +
        '</div>';
    }

    // Maps validActions to button CSS classes using priority as the primary signal.
    // priority:'high' → primary (prominent, recommended next step)
    // feature-stop → danger (destructive)
    // everything else → secondary (subdued, available but not competing)
    function validActionBtnClass(action, priority) {
      if (priority === 'high') return 'btn btn-primary';
      if (action === 'feature-stop') return 'btn btn-danger';
      return 'btn btn-secondary';
    }

    // Builds button HTML from server-provided validActions.
    // Returns only action buttons — status badges are handled separately in buildKanbanCard.
    // Transitions are used for drag-drop only (not rendered as buttons) —
    // except specific transitions that should appear as buttons (prioritise, close, triage).
    function buildValidActionsHtml(validActions) {
      if (!validActions || validActions.length === 0) return '';
      // Filter: show in-state actions as buttons, plus specific transitions that need buttons
      const transitionsAsButtons = ['feature-prioritise', 'research-prioritise', 'feature-close', 'research-close', 'feedback-triage'];
      const buttonsToRender = validActions.filter(va => {
        if (va.type === 'action') return true;
        // Only render transition as button if it's in the explicit list
        return va.type === 'transition' && transitionsAsButtons.includes(va.action);
      });
      // Deduplicate: if a transition and an action have the same action name, keep only the action
      const seen = new Set();
      const deduped = [];
      // Actions first (preferred), then transitions
      const sorted = [...buttonsToRender.filter(v => v.type === 'action'), ...buttonsToRender.filter(v => v.type === 'transition')];
      for (const va of sorted) {
        const key = va.action + (va.agentId || '');
        if (!seen.has(key)) { seen.add(key); deduped.push(va); }
      }
      // Sort: high-priority (primary) first, then normal, then stop/danger last
      deduped.sort((a, b) => {
        const rank = v => v.priority === 'high' ? 0 : v.action === 'feature-stop' ? 2 : 1;
        return rank(a) - rank(b);
      });
      return deduped.map(va => {
        const cls = validActionBtnClass(va.action, va.priority);
        const agentAttr = va.agentId ? ' data-agent="' + escHtml(va.agentId) + '"' : '';
        return '<button class="' + cls + ' kcard-va-btn" data-va-action="' + escHtml(va.action) + '"' + agentAttr + '>' + escHtml(va.label) + '</button>';
      }).join('');
    }

    // Dispatches a validAction click to the appropriate API endpoint
    async function handleValidAction(va, feature, repoPath, btn, pipelineType) {
      const id = feature.id;
      const agentId = va.agentId || null;
      switch (va.action) {
        case 'feature-open':
        case 'feature-attach':
        case 'feature-focus':
        case 'research-open':
        case 'research-attach':
          await requestFeatureOpen(id, agentId, repoPath, btn, pipelineType);
          break;
        case 'feature-setup':
        case 'research-setup': {
          const agents = await showAgentPicker(id, feature.name);
          if (!agents) return;
          await requestAction(pipelineCommand(pipelineType, 'setup'), [id, ...agents], repoPath, btn);
          for (const agent of agents) {
            await requestFeatureOpen(id, agent, repoPath, null, pipelineType);
          }
          break;
        }
        case 'feature-prioritise':
        case 'research-prioritise':
          await requestAction(pipelineCommand(pipelineType, 'prioritise'), [feature.name], repoPath, btn);
          break;
        case 'feature-stop':
          await requestAction('feature-stop', [id, ...(agentId ? [agentId] : [])], repoPath, btn);
          break;
        default:
          await requestAction(va.action, [id, ...(agentId ? [agentId] : [])], repoPath, btn);
      }
    }

    function buildKanbanCard(feature, repoPath, pipelineType) {
      const card = document.createElement('div');
      card.className = 'kcard';
      card.draggable = true;
      card.dataset.featureId = feature.id;
      card.dataset.featureName = feature.name;
      card.dataset.stage = feature.stage;
      card.dataset.repoPath = repoPath || '';

      const agents = feature.agents || [];
      const validActions = feature.validActions || [];
      const hasAgentSections = agents.length > 0;

      let innerHtml =
        (feature.id ? '<div class="kcard-id">#' + escHtml(feature.id) + '</div>' : '') +
        '<div class="kcard-name">' + escHtml(feature.name.replace(/-/g, ' ')) + '</div>';

      if (hasAgentSections) {
        // New agent section layout: one visual block per agent
        // Eval status badge (for in-evaluation cards)
        if (feature.evalStatus) {
          innerHtml += '<div class="kcard-status"><span class="kcard-status-label">Status</span><span class="eval-badge' + (feature.evalStatus === 'pick winner' ? ' pick-winner' : '') + '">' + escHtml(feature.evalStatus) + '</span></div>';
        }
        // Agent sections
        agents.forEach(agent => {
          const agentActions = validActions.filter(va => va.agentId === agent.id);
          innerHtml += buildAgentSectionHtml(agent, agentActions);
        });
        // Card-level actions (non-per-agent: close, eval, review, etc.)
        const cardLevelActions = validActions.filter(va => !va.agentId);
        if (cardLevelActions.length > 0) {
          const cardActionsHtml = cardLevelActions.map(va => {
            const btnCls = (va.priority === 'high') ? 'btn btn-primary' : 'btn btn-secondary';
            return '<button class="' + btnCls + ' kcard-va-btn" data-va-action="' + escHtml(va.action) + '">' + escHtml(va.label) + '</button>';
          }).join('');
          innerHtml += '<div class="kcard-transitions">' + cardActionsHtml + '</div>';
        }
      } else {
        // Legacy layout for cards without active agents (inbox, backlog, done, research, feedback)
        const agentBadgesHtml = buildAgentBadgesHtml(agents);
        const actionsHtml = buildValidActionsHtml(validActions);
        const evalStatusHtml = feature.evalStatus
          ? '<span class="kcard-status-label">Status</span><span class="eval-badge' + (feature.evalStatus === 'pick winner' ? ' pick-winner' : '') + '">' + escHtml(feature.evalStatus) + '</span>'
          : '';
        innerHtml +=
          (agentBadgesHtml ? '<div class="kcard-agents">' + agentBadgesHtml + '</div>' : '') +
          (evalStatusHtml ? '<div class="kcard-status">' + evalStatusHtml + '</div>' : '') +
          (actionsHtml ? '<div class="kcard-actions">' + actionsHtml + '</div>' : '');
      }

      card.innerHTML = innerHtml;

      // Wire overflow menu toggles
      card.querySelectorAll('.kcard-overflow-toggle').forEach(toggle => {
        toggle.onclick = (e) => {
          e.stopPropagation();
          const menu = toggle.parentElement.querySelector('.kcard-overflow-menu');
          const isOpen = menu && menu.classList.contains('open');
          card.querySelectorAll('.kcard-overflow-menu').forEach(m => m.classList.remove('open'));
          if (!isOpen && menu) menu.classList.add('open');
        };
      });

      let wasDragged = false;
      card.addEventListener('dragstart', (e) => {
        wasDragged = true;
        card.classList.add('dragging');
        // Valid target stages come from state machine validActions (transitions only)
        const validTargetStages = (feature.validActions || [])
          .filter(a => a.type === 'transition')
          .map(a => a.to);
        dragState = { featureId: feature.id, featureName: feature.name, fromStage: feature.stage, repoPath, pipelineType, validTargetStages };
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', feature.id);
        // Create tilted drag image
        const ghost = card.cloneNode(true);
        ghost.style.cssText = 'position:fixed;top:-1000px;left:-1000px;width:' + card.offsetWidth + 'px;transform:rotate(6deg);opacity:0.85;box-shadow:0 8px 24px rgba(0,0,0,.4);pointer-events:none;z-index:9999';
        document.body.appendChild(ghost);
        e.dataTransfer.setDragImage(ghost, card.offsetWidth / 2, card.offsetHeight / 2);
        requestAnimationFrame(() => requestAnimationFrame(() => ghost.remove()));
      });
      card.addEventListener('dragend', () => {
        card.classList.remove('dragging');
        dragState = null;
        document.querySelectorAll('.kanban-col').forEach(col => col.classList.remove('drag-over', 'drag-blocked'));
      });

      // Click to open spec drawer — skip if drag occurred or button clicked
      card.style.cursor = 'pointer';
      card.addEventListener('click', (e) => {
        if (wasDragged) { wasDragged = false; return; }
        // Close overflow menus when clicking outside them
        if (!e.target.closest('.kcard-overflow-toggle') && !e.target.closest('.kcard-overflow-menu')) {
          card.querySelectorAll('.kcard-overflow-menu.open').forEach(m => m.classList.remove('open'));
        }
        if (e.target.closest('button') || e.target.closest('.btn')) return;
        if (feature.specPath) {
          const displayName = (feature.id ? '#' + feature.id + ' ' : '') + feature.name.replace(/-/g, ' ');
          openDrawer(feature.specPath, displayName, feature.stage);
        }
      });

      // Wire validActions buttons (state machine-driven)
      card.querySelectorAll('.kcard-va-btn').forEach(btn => {
        const vaAction = btn.getAttribute('data-va-action');
        const vaAgentId = btn.getAttribute('data-agent') || null;
        const va = (feature.validActions || []).find(a => a.action === vaAction && (a.agentId || null) === vaAgentId);
        if (!va) return;
        btn._origText = btn.textContent;
        btn.onclick = async (e) => {
          e.stopPropagation();
          await handleValidAction(va, feature, repoPath, btn, pipelineType);
        };
      });

      return card;
    }

    // ── Pipeline view — Alpine component ─────────────────────────────────────

    // Renders kanban cards into a col-body element (called via x-effect for reactivity)
    function renderKanbanColCards(colBody, repo, stage) {
      const s = Alpine.store('dashboard');
      const pType = s.pipelineType || 'features';
      const items = repo[pType] || [];
      const byStage = {};
      items.forEach(f => { if (!byStage[f.stage]) byStage[f.stage] = []; byStage[f.stage].push(f); });
      const cards = byStage[stage] || [];

      colBody.innerHTML = '';
      if (cards.length === 0) {
        const emp = document.createElement('div');
        emp.className = 'col-empty';
        emp.textContent = 'Empty';
        colBody.appendChild(emp);
        return;
      }
      const DONE_CAP = 6;
      const displayCards = (stage === 'done' && cards.length > DONE_CAP) ? cards.slice(0, DONE_CAP) : cards;
      displayCards.forEach(feature => colBody.appendChild(buildKanbanCard(feature, repo.path, pType)));
      if (stage === 'done' && cards.length > DONE_CAP) {
        const doneTotalKey = pType === 'research' ? 'researchDoneTotal' : pType === 'feedback' ? 'feedbackDoneTotal' : 'doneTotal';
        const totalDone = repo[doneTotalKey] || cards.length;
        const moreBtn = document.createElement('button');
        moreBtn.className = 'btn';
        moreBtn.style.cssText = 'width:100%;margin-top:4px;font-size:11px;padding:6px';
        moreBtn.textContent = (totalDone - DONE_CAP) + ' more — open in Finder';
        moreBtn.onclick = async () => {
          const donePath = (repo.path || '') + '/docs/specs/features/05-done';
          try {
            const res = await fetch('/api/open-path', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ path: donePath }) });
            if (!res.ok) throw new Error('HTTP ' + res.status);
          } catch (e) { showToast('Could not open Finder: ' + e.message, null, null, { error: true }); }
        };
        colBody.appendChild(moreBtn);
      }
      // Wire up valid-action button clicks on newly rendered cards
      colBody.querySelectorAll('.kcard-va-btn').forEach(btn => {
        btn.onclick = (e) => {
          e.stopPropagation();
          const action = btn.getAttribute('data-va-action') || '';
          const agentId = btn.getAttribute('data-agent') || null;
          const card = btn.closest('.kcard');
          const featureId = card ? card.dataset.featureId : '';
          const featureName = card ? card.dataset.featureName : '';
          const feature = (repo[pType] || []).find(f => String(f.id) === String(featureId)) || { id: featureId, name: featureName, stage: card ? card.dataset.stage : '' };
          handleValidAction({ action, agentId, label: btn.textContent }, feature, repo.path, btn, pType);
        };
      });
    }

    function pipelineView() {
      return {
        pipelineTypeOpts: [
          { key: 'features', label: 'Features' },
          { key: 'research', label: 'Research' },
          { key: 'feedback', label: 'Feedback' }
        ],
        get currentStages() { return PIPELINE_STAGES[Alpine.store('dashboard').pipelineType || 'features'] || STAGE_ORDER; },
        get visibleRepos() { return getVisibleRepos(Alpine.store('dashboard').data || { repos: [] }); },
        get emptyMessage() {
          return (Alpine.store('dashboard').selectedRepo === 'all')
            ? 'No repos registered. Run: aigon conductor add'
            : 'No data for selected repo.';
        },
        setPipelineType(t) { Alpine.store('dashboard').pipelineType = t; localStorage.setItem(lsKey('pipelineType'), t); },
        getStageDisplayCount(repo, stage) {
          const s = Alpine.store('dashboard');
          const pType = s.pipelineType || 'features';
          const items = repo[pType] || [];
          const stageItems = items.filter(f => f.stage === stage);
          if (stage === 'done') {
            const doneTotalKey = pType === 'research' ? 'researchDoneTotal' : pType === 'feedback' ? 'feedbackDoneTotal' : 'doneTotal';
            return repo[doneTotalKey] || stageItems.length;
          }
          return stageItems.length;
        },
        renderKanbanColCards(colBody, repo, stage) { renderKanbanColCards(colBody, repo, stage); },
        createNewSpec() { createNewSpec(); },
        onDragOver(e, stage) {
          if (!dragState) return;
          const allowed = dragState.validTargetStages ? dragState.validTargetStages.includes(stage) : false;
          e.dataTransfer.dropEffect = allowed ? 'move' : 'none';
          const col = e.currentTarget;
          document.querySelectorAll('.kanban-col').forEach(c => c.classList.remove('drag-over', 'drag-blocked'));
          col.classList.add(allowed ? 'drag-over' : 'drag-blocked');
        },
        onDragLeave(e) {
          const col = e.currentTarget;
          if (!col.contains(e.relatedTarget)) col.classList.remove('drag-over', 'drag-blocked');
        },
        async onDrop(e, stage, repoPath) {
          const col = e.currentTarget;
          col.classList.remove('drag-over', 'drag-blocked');
          if (!dragState) return;
          const { featureId, featureName, fromStage, repoPath: dragRepo, pipelineType: dragPType, validTargetStages } = dragState;
          dragState = null;
          if (!(validTargetStages && validTargetStages.includes(stage))) return;
          const effectiveRepo = dragRepo || repoPath;
          if (fromStage === 'inbox' && stage === 'backlog') {
            await requestAction(pipelineCommand(dragPType, 'prioritise'), [featureName], effectiveRepo);
          } else if (fromStage === 'backlog' && stage === 'in-progress') {
            const agents = await showAgentPicker(featureId, featureName);
            if (!agents) return;
            await requestAction(pipelineCommand(dragPType, 'setup'), [featureId, ...agents], effectiveRepo);
            for (const agent of agents) {
              await requestFeatureOpen(featureId, agent, effectiveRepo, null, dragPType);
            }
          } else if (fromStage === 'in-progress' && stage === 'in-evaluation') {
            await requestAction(pipelineCommand(dragPType, 'eval'), [featureId], effectiveRepo);
          } else if (fromStage === 'in-evaluation' && stage === 'done') {
            await requestAction(pipelineCommand(dragPType, 'close'), [featureId], effectiveRepo);
          }
        }
      };
    }

    function renderSettings() {

      const empty = document.getElementById('empty');

      reposRoot.innerHTML = '';
      empty.style.display = 'none';

      const area = document.createElement('div');
      area.className = 'settings-area';

      // Repos section
      const section = document.createElement('div');
      section.className = 'settings-section';
      section.innerHTML = '<h3>Registered Repositories</h3><p>Repos monitored by the Aigon dashboard. Add any repo that uses the Aigon workflow.</p>';

      const repos = readConductorReposFromGlobalConfig_client();
      const list = document.createElement('div');
      list.className = 'repo-list';

      if (repos.length === 0) {
        list.innerHTML = '<div class="settings-empty">No repos registered.</div>';
      } else {
        repos.forEach(repoPath => {
          const item = document.createElement('div');
          item.className = 'repo-list-item';
          const displayPath = repoPath.replace(/^\/Users\/[^/]+\//, '~/');
          item.innerHTML = '<span class="repo-list-path" title="' + escHtml(repoPath) + '">' + escHtml(displayPath) + '</span>';
          const removeBtn = document.createElement('button');
          removeBtn.className = 'repo-list-remove';
          removeBtn.title = 'Remove repo';
          removeBtn.textContent = '\u00d7';
          removeBtn.onclick = async () => {
            if (!confirm('Remove ' + displayPath + ' from the dashboard?')) return;
            removeBtn.disabled = true;
            try {
              const res = await fetch('/api/repos/remove', {
                method: 'POST',
                headers: { 'content-type': 'application/json' },
                body: JSON.stringify({ path: repoPath })
              });
              const payload = await res.json().catch(() => ({}));
              if (!res.ok) throw new Error(payload.error || 'Failed');
              showToast('Removed: ' + displayPath);
              await requestRefresh();
            } catch (e) {
              showToast('Remove failed: ' + e.message, null, null, {error:true});
              removeBtn.disabled = false;
            }
          };
          item.appendChild(removeBtn);
          list.appendChild(item);
        });
      }
      section.appendChild(list);

      // Add repo form
      const form = document.createElement('div');
      form.className = 'add-repo-form';
      const input = document.createElement('input');
      input.className = 'add-repo-input';
      input.type = 'text';
      input.placeholder = '/path/to/repo or ~/src/my-project';
      const addBtn = document.createElement('button');
      addBtn.className = 'btn btn-primary';
      addBtn.textContent = 'Add';
      addBtn.style.padding = '7px 16px';

      async function addRepo() {
        const val = input.value.trim();
        if (!val) return;
        addBtn.disabled = true;
        input.disabled = true;
        try {
          const res = await fetch('/api/repos/add', {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify({ path: val })
          });
          const payload = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(payload.error || 'Failed');
          input.value = '';
          showToast('Added: ' + val);
          await requestRefresh();
        } catch (e) {
          showToast('Add failed: ' + e.message, null, null, {error:true});
        } finally {
          addBtn.disabled = false;
          input.disabled = false;
          input.focus();
        }
      }

      addBtn.onclick = addRepo;
