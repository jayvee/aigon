<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aigon Dashboard</title>
  <style>
    :root{color-scheme:dark;-webkit-font-smoothing:antialiased;--bg-root:#0a0a0b;--bg-surface:#111113;--bg-elevated:#1a1a1f;--bg-hover:#222228;--border-subtle:rgba(255,255,255,.06);--border-default:rgba(255,255,255,.1);--text-primary:#ededef;--text-secondary:#a0a0a8;--text-tertiary:#6b6b76;--accent:#3b82f6;--success:#22c55e;--warning:#f59e0b;--error:#ef4444;--radius:12px;--mono:"SF Mono","Cascadia Code",ui-monospace,monospace}
    *{box-sizing:border-box}html,body{margin:0;background:var(--bg-root);color:var(--text-primary);font:13px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
    body{padding:0;overflow:hidden;height:100vh}
    .wrap{display:flex;flex-direction:column;height:100vh;max-width:1400px;margin:0 auto;padding:0 16px}
    .top{display:flex;justify-content:space-between;align-items:flex-end;gap:12px;padding:16px 0 8px;flex-shrink:0}
    h1{margin:0;font-size:24px;letter-spacing:-.02em}
    .meta{display:flex;gap:10px;color:var(--text-secondary)}
    .health{display:flex;align-items:center;gap:6px}
    /* View tabs */
    .view-tabs{display:flex;gap:4px;border-bottom:1px solid var(--border-subtle);padding-bottom:0;flex-shrink:0}
    .view-tab{background:transparent;border:none;border-bottom:2px solid transparent;color:var(--text-secondary);padding:8px 16px;cursor:pointer;font-size:13px;margin-bottom:-1px;transition:color .12s ease,border-color .12s ease}
    .view-tab:hover{color:var(--text-primary)}
    .view-tab.active{color:var(--text-primary);border-bottom-color:var(--accent)}
    /* Dashboard body: sidebar + detail */
    .dashboard-body{display:flex;flex:1;min-height:0;margin-top:8px}
    /* Repo sidebar */
    .repo-sidebar{width:200px;flex-shrink:0;overflow-y:auto;border-right:1px solid var(--border-subtle);padding:6px 0;display:flex;flex-direction:column;gap:1px}
    .sidebar-item{display:flex;align-items:center;gap:8px;width:100%;padding:8px 12px;background:none;border:none;border-left:3px solid transparent;color:var(--text-secondary);cursor:pointer;font:inherit;font-size:13px;text-align:left;transition:background .12s ease,color .12s ease}
    .sidebar-item:hover{background:var(--bg-hover);color:var(--text-primary)}
    .sidebar-item.active{border-left-color:var(--accent);background:var(--bg-elevated);color:var(--text-primary)}
    .sidebar-item:focus-visible{outline:2px solid var(--accent);outline-offset:-2px;border-radius:4px}
    .sidebar-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .sidebar-indicators{display:flex;align-items:center;gap:5px;flex-shrink:0}
    .sidebar-badge{font-size:11px;min-width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;border-radius:999px;background:var(--bg-elevated);border:1px solid var(--border-subtle);color:var(--text-tertiary);padding:0 5px;line-height:1}
    .sidebar-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
    .sidebar-dot.waiting{background:var(--warning);box-shadow:0 0 6px rgba(245,158,11,.4)}
    .sidebar-dot.error{background:var(--error);box-shadow:0 0 6px rgba(239,68,68,.35)}
    /* Mobile repo dropdown (hidden by default) */
    .repo-select-mobile{display:none;width:100%;padding:8px 12px;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:8px;color:var(--text-primary);font:inherit;font-size:13px;margin-bottom:8px;flex-shrink:0}
    /* Detail area */
    .detail-area{flex:1;overflow-y:auto;padding:0 0 28px 16px;min-width:0}
    /* Repo header bar */
    .repo-header-bar{position:sticky;top:0;z-index:10;display:flex;align-items:baseline;gap:12px;padding:10px 0 10px;margin-bottom:4px;border-bottom:1px solid var(--border-subtle);background:var(--bg-root)}
    .repo-header-name{margin:0;font-size:18px;font-weight:600;letter-spacing:-.02em}
    .repo-header-meta{color:var(--text-secondary);font-size:13px}
    /* Monitor view */
    .summary{display:flex;gap:8px;margin:0 0 14px;flex-wrap:wrap}
    .pill{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:999px;padding:5px 10px}
    .pill.waiting{border-color:rgba(245,158,11,.4);color:#f8c060}
    .pill-filter{cursor:pointer;transition:border-color .12s ease,background .12s ease,color .12s ease}
    .pill-filter:hover{border-color:var(--border-default);background:var(--bg-elevated)}
    .pill-filter.active{border-color:rgba(59,130,246,.7);background:rgba(59,130,246,.15);color:#dbeafe}
    .pill-filter.waiting.active{border-color:rgba(245,158,11,.55);background:rgba(245,158,11,.15);color:#f8c060}
    .repos{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    .repos.single-repo{grid-template-columns:1fr}
    @media (max-width: 1120px){.repos{grid-template-columns:1fr}}
    .repo{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius);overflow:hidden}
    .repo-h{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-bottom:1px solid var(--border-subtle);cursor:pointer}
    .repo-h strong{font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--text-secondary)}
    .repo-b{padding:10px;display:grid;gap:10px}
    .card{border:1px solid var(--border-subtle);border-radius:10px;background:rgba(255,255,255,.01);transition:background .12s ease,border-color .12s ease}
    .card:hover{background:var(--bg-elevated);border-color:var(--border-default)}
    .card.waiting{border-left:2px solid var(--warning)}
    .card.evaluating{border-left:2px solid #a78bfa}
    .card.research{border-left:2px solid #06b6d4}
    .research-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:999px;background:rgba(6,182,212,.12);border:1px solid rgba(6,182,212,.35);color:#67e8f9;margin-left:6px;flex-shrink:0}
    .research-badge.all-submitted{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.35);color:#86efac}
    .eval-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:999px;background:rgba(167,139,250,.15);border:1px solid rgba(167,139,250,.35);color:#c4b5fd;margin-left:6px;flex-shrink:0}
    .eval-badge.pick-winner{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.35);color:#86efac}
    .card-h{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:10px 10px 6px}
    .card-h .feature{letter-spacing:-.02em;font-weight:600;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .head-actions{display:flex;align-items:center;justify-content:flex-end;flex:0 0 auto}
    .rows{padding:0 8px 8px;display:grid;gap:6px}
    .row{display:grid;grid-template-columns:56px minmax(130px,1fr) 90px auto;align-items:center;gap:10px;padding:6px 4px;border-radius:8px}
    .agent,.cmd{font-family:var(--mono)}
    .stamp{color:var(--text-tertiary);white-space:nowrap}
    .status{display:inline-flex;align-items:center;gap:8px}
    .dot{width:8px;height:8px;border-radius:50%}
    .implementing .dot{background:var(--accent);box-shadow:0 0 0 0 rgba(59,130,246,.6);animation:pulse 1.5s infinite}
    .waiting .dot{background:var(--warning);box-shadow:0 0 8px rgba(245,158,11,.5)}
    .submitted .dot{background:transparent;position:relative}
    .submitted .dot::before{content:"";position:absolute;left:1px;top:0;width:6px;height:10px;border:solid var(--success);border-width:0 2px 2px 0;transform:rotate(45deg)}
    .error .dot{background:var(--error);box-shadow:0 0 8px rgba(239,68,68,.45)}
    .btn{background:transparent;border:1px solid var(--border-default);border-radius:8px;color:var(--text-secondary);padding:4px 10px;cursor:pointer;line-height:1;font-size:12px;white-space:nowrap}
    .btn:hover{color:var(--text-primary);border-color:var(--accent)}
    .btn:disabled{opacity:.45;cursor:not-allowed;pointer-events:none}
    .btn-primary{background:rgba(59,130,246,.14);border-color:rgba(59,130,246,.45);color:#bdd7ff}
    .btn-primary:hover{background:rgba(59,130,246,.2);border-color:rgba(59,130,246,.7);color:#e2eeff}
    .btn-success{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.4);color:#86efac}
    .btn-success:hover{background:rgba(34,197,94,.18);border-color:rgba(34,197,94,.65);color:#bbf7d0}
    .btn-warn{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.4);color:#fcd34d}
    .btn-warn:hover{background:rgba(245,158,11,.18);border-color:rgba(245,158,11,.65);color:#fde68a}
    .next-copy{font-size:11px}
    .row-actions{display:flex;align-items:center;justify-content:flex-end;gap:6px;flex-wrap:nowrap;min-width:0}
    .empty{padding:18px;color:var(--text-secondary);background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius)}
    .toast-wrap{position:fixed;left:50%;top:12px;transform:translateX(-50%);display:grid;gap:8px;z-index:50}
    .toast{background:var(--bg-surface);border:1px solid var(--border-default);padding:10px 12px;border-radius:10px;min-width:300px;display:flex;align-items:center;justify-content:space-between;gap:8px;animation:toast-in .3s ease-out}
    .toast.toast-error{border-color:rgba(239,68,68,.4);background:rgba(239,68,68,.08)}
    .toast .toast-dismiss{margin-left:auto;background:transparent;border:none;color:var(--text-secondary);cursor:pointer;font-size:16px;padding:0 4px;line-height:1;flex-shrink:0}
    .toast .toast-dismiss:hover{color:var(--text-primary)}
    .toast button:not(.toast-dismiss){margin-left:8px;background:transparent;border:1px solid var(--border-default);border-radius:6px;color:var(--text-primary)}
    @keyframes toast-in{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
    .repo.collapsed .repo-b{display:none}
    @keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(2.2);opacity:.05}}
    @media (max-width:1200px){.kanban{grid-template-columns:1fr}}
    @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
    /* Pipeline toolbar */
    .pipeline-toolbar{display:flex;align-items:center;gap:12px;margin:8px 0 12px}
    .pipeline-type-toggle{display:flex;gap:0;border:1px solid var(--border-subtle);border-radius:var(--radius);overflow:hidden;width:fit-content}
    .toggle-btn{padding:5px 14px;font-size:12px;font-weight:500;background:var(--bg-surface);color:var(--text-secondary);border:none;cursor:pointer;transition:background .12s,color .12s}
    .toggle-btn:not(:last-child){border-right:1px solid var(--border-subtle)}
    .toggle-btn:hover{background:var(--bg-hover);color:var(--text-primary)}
    .toggle-btn.active{background:var(--accent);color:#fff}
    /* Pipeline / Kanban */
    .kanban{display:grid;grid-template-columns:repeat(5,minmax(200px,1fr));gap:10px;align-items:start;overflow-x:auto;padding-bottom:8px}
    .kanban-col{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius);overflow:hidden;min-height:120px}
    .kanban-col.drag-over{border-color:rgba(59,130,246,.6);background:rgba(59,130,246,.06)}
    .kanban-col.drag-blocked{border-color:rgba(239,68,68,.4)}
    .col-h{padding:9px 12px;border-bottom:1px solid var(--border-subtle);display:flex;justify-content:space-between;align-items:center}
    .col-title{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--text-secondary)}
    .col-count{font-size:11px;color:var(--text-tertiary)}
    .col-body{padding:8px;display:grid;gap:6px;min-height:60px}
    .kcard{border:1px solid var(--border-subtle);border-radius:8px;background:rgba(255,255,255,.01);padding:8px 10px;cursor:grab;transition:background .12s ease,border-color .12s ease,box-shadow .12s ease}
    .kcard:hover{background:var(--bg-elevated);border-color:var(--border-default)}
    .kcard.dragging{opacity:.3;cursor:grabbing}
    .kcard-id{font-size:11px;color:var(--text-tertiary);font-family:var(--mono)}
    .kcard-name{font-size:12px;font-weight:500;margin:2px 0 6px;line-height:1.3;color:var(--text-primary);word-break:break-word}
    .kcard-agents{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px}
    .agent-badge{font-size:10px;font-family:var(--mono);padding:1px 6px;border-radius:999px;background:var(--bg-elevated);border:1px solid var(--border-subtle);color:var(--text-secondary)}
    .agent-badge.implementing{border-color:rgba(59,130,246,.4);color:#93c5fd}
    .agent-badge.waiting{border-color:rgba(245,158,11,.4);color:#fcd34d}
    .agent-badge.submitted{border-color:rgba(34,197,94,.4);color:#86efac}
    .agent-badge.error{border-color:rgba(239,68,68,.4);color:#fca5a5}
    .kcard-actions{display:flex;gap:5px;flex-wrap:wrap}
    .kcard-actions .btn{font-size:11px;padding:3px 8px}
    .col-empty{padding:12px 8px;color:var(--text-tertiary);font-size:12px;text-align:center}
    /* Agent picker modal */
    .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:center;justify-content:center}
    .modal-box{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:var(--radius);padding:20px 24px;min-width:280px;max-width:400px;width:100%}
    .modal-box h3{margin:0 0 14px;font-size:15px;letter-spacing:-.01em}
    .modal-desc{color:var(--text-secondary);font-size:12px;margin:0 0 14px}
    .agent-checks{display:grid;gap:8px;margin-bottom:18px}
    .agent-check-row{display:flex;align-items:center;gap:10px;padding:7px 10px;border:1px solid var(--border-subtle);border-radius:8px;cursor:pointer;transition:background .1s ease,border-color .1s ease}
    .agent-check-row:hover{background:var(--bg-elevated);border-color:var(--border-default)}
    .agent-check-row input{cursor:pointer;accent-color:var(--accent)}
    .agent-check-label{font-family:var(--mono);font-size:13px;flex:1}
    .agent-check-hint{font-size:11px;color:var(--text-tertiary)}
    .modal-actions{display:flex;gap:8px;justify-content:flex-end}
    .create-input{width:100%;padding:10px 12px;background:var(--bg-root);color:var(--text-primary);border:1px solid var(--border-subtle);border-radius:8px;font:13px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;outline:none;transition:border-color .12s ease}
    .create-input:focus{border-color:var(--accent)}
    .create-input::placeholder{color:var(--text-tertiary)}
    .modal-actions .btn{padding:6px 16px}
    /* Settings view */
    .settings-area{padding:16px 0 28px;max-width:640px}
    .settings-section{margin-bottom:24px}
    .settings-section h3{margin:0 0 12px;font-size:15px;font-weight:600;letter-spacing:-.01em}
    .settings-section p{color:var(--text-secondary);font-size:12px;margin:0 0 12px}
    .repo-list{display:grid;gap:6px;margin-bottom:12px}
    .repo-list-item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 12px;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:8px}
    .repo-list-item:hover{border-color:var(--border-default)}
    .repo-list-path{font-family:var(--mono);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
    .repo-list-remove{background:none;border:none;color:var(--text-tertiary);cursor:pointer;font-size:16px;padding:2px 6px;border-radius:4px;line-height:1;transition:color .12s ease,background .12s ease}
    .repo-list-remove:hover{color:var(--error);background:rgba(239,68,68,.1)}
    .add-repo-form{display:flex;gap:8px}
    .add-repo-input{flex:1;padding:7px 12px;background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:8px;color:var(--text-primary);font:inherit;font-family:var(--mono);font-size:12px}
    .add-repo-input::placeholder{color:var(--text-tertiary)}
    .add-repo-input:focus{outline:none;border-color:var(--accent)}
    .settings-empty{color:var(--text-tertiary);font-size:12px;padding:12px;text-align:center}
    /* Spec drawer */
    .drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;opacity:0;pointer-events:none;transition:opacity .2s ease}
    .drawer-overlay.open{opacity:1;pointer-events:auto}
    .spec-drawer{position:fixed;top:0;right:0;bottom:0;width:min(55vw,720px);background:var(--bg-surface);z-index:201;transform:translateX(100%);transition:transform .25s ease,width .25s ease;display:flex;flex-direction:column;border-left:1px solid var(--border-subtle)}
    .spec-drawer.open{transform:translateX(0)}
    .spec-drawer.fullscreen{width:100vw;border-left:none}
    .drawer-header{display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:1px solid var(--border-subtle);flex-shrink:0}
    .drawer-title{flex:1;font-size:15px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .drawer-stage{font-size:11px;padding:2px 8px;border-radius:10px;background:var(--bg-elevated);color:var(--text-secondary);white-space:nowrap}
    .drawer-actions{display:flex;gap:6px;align-items:center}
    .drawer-mode-toggle{display:flex;border:1px solid var(--border-subtle);border-radius:var(--radius);overflow:hidden}
    .drawer-mode-btn{padding:4px 10px;font-size:11px;background:none;border:none;color:var(--text-secondary);cursor:pointer}
    .drawer-mode-btn.active{background:var(--accent);color:#fff}
    .drawer-body{flex:1;overflow-y:auto;padding:16px}
    .drawer-preview{font-size:13px;line-height:1.6;color:var(--text-primary)}
    .drawer-preview h1{font-size:20px;margin:0 0 12px;font-weight:700}
    .drawer-preview h2{font-size:16px;margin:20px 0 8px;font-weight:600;color:var(--text-primary)}
    .drawer-preview h3{font-size:14px;margin:16px 0 6px;font-weight:600}
    .drawer-preview p{margin:0 0 10px}
    .drawer-preview ul,.drawer-preview ol{margin:0 0 10px;padding-left:20px}
    .drawer-preview li{margin:2px 0}
    .drawer-preview code{font-family:var(--mono);font-size:12px;background:var(--bg-elevated);padding:1px 5px;border-radius:4px}
    .drawer-preview pre{background:var(--bg-elevated);border:1px solid var(--border-subtle);border-radius:8px;padding:12px;overflow-x:auto;margin:0 0 12px}
    .drawer-preview pre code{background:none;padding:0}
    .drawer-preview blockquote{border-left:3px solid var(--accent);margin:0 0 10px;padding:4px 12px;color:var(--text-secondary)}
    .drawer-preview input[type="checkbox"]{margin-right:6px}
    .drawer-editor{width:100%;height:100%;background:var(--bg-root);color:var(--text-primary);border:1px solid var(--border-subtle);border-radius:8px;padding:12px;font:12px/1.5 var(--mono);resize:none;outline:none}
    .drawer-editor:focus{border-color:var(--accent)}
    .drawer-footer{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-top:1px solid var(--border-subtle);flex-shrink:0}
    .drawer-footer-left{display:flex;gap:6px;align-items:center}
    .drawer-font-controls{display:flex;gap:4px;align-items:center}
    .drawer-font-btn{padding:3px 8px;font-size:12px;min-width:unset}
    /* Responsive: sidebar collapses to dropdown */
    @media (max-width: 768px){
      .repo-sidebar{display:none}
      .repo-select-mobile{display:block}
      .detail-area{padding-left:0}
      .spec-drawer{width:100vw}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1>Aigon Dashboard</h1>
      <div class="meta">
        <span class="health" aria-live="polite"><span class="dot" id="health-dot"></span><span id="health-text">Connected</span></span>
        <span id="updated-text">Updated just now</span>
        <button class="btn" id="refresh-btn" title="Force refresh status">Refresh</button>
      </div>
    </div>
    <nav class="view-tabs" aria-label="Dashboard views">
      <button class="view-tab" id="tab-monitor" data-view="monitor">Monitor</button>
      <button class="view-tab" id="tab-pipeline" data-view="pipeline">Pipeline</button>
      <button class="view-tab" id="tab-settings" data-view="settings">Settings</button>
    </nav>
    <select id="repo-select-mobile" class="repo-select-mobile" aria-label="Select repository"></select>
    <div class="dashboard-body">
      <nav id="repo-sidebar" class="repo-sidebar" role="listbox" aria-label="Repository selector"></nav>
      <div class="detail-area" id="detail-area">
        <div id="repo-header" class="repo-header-bar" style="display:none"></div>
        <div id="monitor-summary" class="summary" aria-label="Agent status summary"></div>
        <div id="repos" class="repos"></div>
        <div id="empty" class="empty" style="display:none"></div>
      </div>
    </div>
  </div>
  <div id="toasts" class="toast-wrap" aria-live="polite"></div>
  <!-- Agent picker modal -->
  <div id="agent-picker" class="modal-backdrop" style="display:none" role="dialog" aria-modal="true" aria-labelledby="agent-picker-title">
    <div class="modal-box">
      <h3 id="agent-picker-title">Select Agents</h3>
      <p class="modal-desc" id="agent-picker-desc"></p>
      <div class="agent-checks">
        <label class="agent-check-row"><input type="checkbox" value="cc"><span class="agent-check-label">cc</span><span class="agent-check-hint">Claude Code</span></label>
        <label class="agent-check-row"><input type="checkbox" value="cx"><span class="agent-check-label">cx</span><span class="agent-check-hint">Codex</span></label>
        <label class="agent-check-row"><input type="checkbox" value="gg"><span class="agent-check-label">gg</span><span class="agent-check-hint">Gemini</span></label>
        <label class="agent-check-row"><input type="checkbox" value="cu"><span class="agent-check-label">cu</span><span class="agent-check-hint">Cursor</span></label>
      </div>
      <div class="modal-actions">
        <button class="btn" id="agent-picker-cancel">Cancel</button>
        <button class="btn btn-primary" id="agent-picker-submit">Setup</button>
      </div>
    </div>
  </div>
  <!-- Create spec modal -->
  <div id="create-modal" class="modal-backdrop" style="display:none">
    <div class="modal-box">
      <h3 id="create-modal-title">New Feature</h3>
      <div id="create-modal-repo-picker" style="display:none;margin-bottom:14px">
        <label style="display:block;font-size:12px;color:var(--text-secondary);margin-bottom:6px">Repository</label>
        <select id="create-modal-repo" class="create-input" style="padding:8px 10px"></select>
      </div>
      <label style="display:block;font-size:12px;color:var(--text-secondary);margin-bottom:6px">Name</label>
      <input type="text" id="create-modal-name" class="create-input" placeholder="e.g. dark mode toggle" autofocus />
      <div class="modal-actions" style="margin-top:16px">
        <button class="btn" id="create-modal-cancel">Cancel</button>
        <button class="btn btn-primary" id="create-modal-submit">Create</button>
      </div>
    </div>
  </div>
  <!-- Spec drawer -->
  <div id="drawer-overlay" class="drawer-overlay"></div>
  <aside id="spec-drawer" class="spec-drawer" role="dialog" aria-modal="true">
    <div class="drawer-header">
      <span class="drawer-title" id="drawer-title"></span>
      <span class="drawer-stage" id="drawer-stage"></span>
      <div class="drawer-actions">
        <div class="drawer-mode-toggle">
          <button class="drawer-mode-btn active" data-mode="read">Read</button>
          <button class="drawer-mode-btn" data-mode="edit">Edit</button>
        </div>
        <button class="btn" id="drawer-open-editor" title="Open in default editor">Open in Editor</button>
        <button class="btn" id="drawer-fullscreen" title="Toggle fullscreen (Cmd+Shift+F)">⤢</button>
        <button class="btn" id="drawer-close" aria-label="Close">&times;</button>
      </div>
    </div>
    <div class="drawer-body" id="drawer-body">
      <div class="drawer-preview" id="drawer-preview"></div>
      <textarea class="drawer-editor" id="drawer-editor" style="display:none"></textarea>
    </div>
    <div class="drawer-footer">
      <div class="drawer-footer-left">
        <button class="btn btn-primary" id="drawer-save" disabled>Save</button>
        <button class="btn" id="drawer-undo" title="Undo (Cmd+Z)" disabled>Undo</button>
        <button class="btn" id="drawer-redo" title="Redo (Cmd+Shift+Z)" disabled>Redo</button>
        <span id="drawer-save-status" style="font-size:11px;color:var(--text-tertiary)"></span>
      </div>
      <div class="drawer-font-controls">
        <button class="btn drawer-font-btn" id="drawer-font-down" title="Decrease font size">A−</button>
        <span id="drawer-font-size" style="font-size:11px;color:var(--text-secondary);min-width:28px;text-align:center">13</span>
        <button class="btn drawer-font-btn" id="drawer-font-up" title="Increase font size">A+</button>
      </div>
    </div>
  </aside>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const POLL_MS = 10000;
    const TS_MS = 30000;
    const INITIAL_DATA = ${INITIAL_DATA};
    const state = {
      data: INITIAL_DATA,
      failures: 0,
      lastStatuses: new Map(),
      collapsed: JSON.parse(localStorage.getItem('aigon.dashboard.collapsed') || '{}'),
      filter: localStorage.getItem('aigon.dashboard.filter') || 'all',
      view: localStorage.getItem('aigon.dashboard.view') || 'monitor',
      selectedRepo: localStorage.getItem('aigon.dashboard.selectedRepo') || 'all',
      pipelineType: localStorage.getItem('aigon.dashboard.pipelineType') || 'features',
      monitorType: localStorage.getItem('aigon.dashboard.monitorType') || 'all',
      pendingActions: new Set()
    };

    // ── Utilities ─────────────────────────────────────────────────────────────

    function relTime(iso) {
      const diff = Math.max(0, Math.floor((Date.now() - new Date(iso).getTime()) / 1000));
      if (diff < 10) return 'just now';
      if (diff < 60) return diff + 's ago';
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      return Math.floor(diff / 3600) + 'h ago';
    }

    function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function statusRank(s){ return s === 'waiting' ? 0 : s === 'implementing' ? 1 : s === 'error' ? 2 : 3; }
    function featureRank(feature){ return feature.agents && feature.agents.length > 0 ? Math.min(...feature.agents.map(a => statusRank(a.status))) : 99; }

    function showToast(text, actionLabel, actionFn, opts){
      const wrap = document.getElementById('toasts');
      const n = document.createElement('div');
      const isError = opts && opts.error;
      n.className = 'toast' + (isError ? ' toast-error' : '');
      const span = document.createElement('span');
      span.textContent = text;
      n.appendChild(span);
      if (actionLabel && actionFn) {
        const b = document.createElement('button');
        b.textContent = actionLabel;
        b.onclick = actionFn;
        n.appendChild(b);
      }
      const dismiss = document.createElement('button');
      dismiss.className = 'toast-dismiss';
      dismiss.innerHTML = '&times;';
      dismiss.onclick = () => n.remove();
      n.appendChild(dismiss);
      wrap.prepend(n);
      while (wrap.children.length > 5) wrap.removeChild(wrap.lastChild);
      const timeout = isError ? 20000 : 10000;
      setTimeout(() => n.remove(), timeout);
    }

    async function copyText(text){
      try { await navigator.clipboard.writeText(text); return true; } catch (e) {}
      const ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta); ta.select();
      const ok = document.execCommand('copy'); ta.remove(); return ok;
    }

    // ── API helpers ───────────────────────────────────────────────────────────

    async function requestAttach(repoPath, featureId, agentId, tmuxSession){
      try {
        const res = await fetch('/api/attach', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ repoPath, featureId, agentId, tmuxSession })
        });
        const payload = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(payload.error || ('HTTP ' + res.status));
        showToast(payload.message || 'Attach opened in terminal');
      } catch (e) {
        showToast('Attach failed: ' + e.message, null, null, {error:true});
      }
    }

    async function requestRefresh() {
      const btn = document.getElementById('refresh-btn');
      if (btn) btn.disabled = true;
      try {
        const res = await fetch('/api/refresh', { method: 'POST', cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const next = await res.json();
        state.failures = 0;
        state.data = next;
        render();
      } catch (e) {
        state.failures += 1;
        setHealth();
        showToast('Refresh failed: ' + e.message, null, null, {error:true});
      } finally {
        if (btn) btn.disabled = false;
      }
    }

    async function requestAction(action, args, repoPath, btn) {
      const key = action + ':' + (args || []).join(':');
      if (state.pendingActions.has(key)) return;
      state.pendingActions.add(key);
      if (btn) { btn.disabled = true; btn.textContent = '...'; }
      try {
        const body = { action, args: args || [] };
        if (repoPath) body.repoPath = repoPath;
        const res = await fetch('/api/action', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify(body)
        });
        const payload = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(payload.error || ('HTTP ' + res.status));
        showToast('Done: ' + (payload.command || action));
        await requestRefresh();
      } catch (e) {
        showToast('Action failed: ' + e.message, null, null, {error:true});
        if (btn) { btn.disabled = false; btn.textContent = btn._origText || action; }
      } finally {
        state.pendingActions.delete(key);
      }
    }

    async function requestWorktreeOpen(featureId, agentId, repoPath, btn, pType) {
      if (btn) { btn.disabled = true; btn.textContent = '...'; }
      try {
        const body = { featureId, agentId };
        if (repoPath) body.repoPath = repoPath;
        if (pType) body.pipelineType = pType;
        const res = await fetch('/api/worktree-open', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify(body)
        });
        const payload = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(payload.error || ('HTTP ' + res.status));
        showToast(payload.message || 'Worktree opened');
      } catch (e) {
        showToast('Open worktree failed: ' + e.message, null, null, {error:true});
      } finally {
        if (btn) { btn.disabled = false; btn.textContent = btn._origText || 'Open'; }
      }
    }

    // ── Agent picker ──────────────────────────────────────────────────────────

    let pickerResolve = null;

    function showAgentPicker(featureId, featureName) {
      return new Promise((resolve) => {
        pickerResolve = resolve;
        document.getElementById('agent-picker-desc').textContent = '#' + featureId + ' ' + featureName;
        document.querySelectorAll('#agent-picker input[type=checkbox]').forEach(cb => { cb.checked = false; });
        document.getElementById('agent-picker').style.display = 'flex';
        document.getElementById('agent-picker-submit').focus();
      });
    }

    function hideAgentPicker(result) {
      document.getElementById('agent-picker').style.display = 'none';
      if (pickerResolve) { pickerResolve(result); pickerResolve = null; }
    }

    document.getElementById('agent-picker-cancel').onclick = () => hideAgentPicker(null);
    document.getElementById('agent-picker').onclick = (e) => { if (e.target === e.currentTarget) hideAgentPicker(null); };
    document.getElementById('agent-picker-submit').onclick = () => {
      const selected = [...document.querySelectorAll('#agent-picker input[type=checkbox]:checked')].map(cb => cb.value);
      if (selected.length === 0) { showToast('Select at least one agent'); return; }
      hideAgentPicker(selected);
    };

    // ── Repo sidebar ──────────────────────────────────────────────────────────

    function selectRepo(repoPath) {
      state.selectedRepo = repoPath;
      localStorage.setItem('aigon.dashboard.selectedRepo', repoPath);
      // Sync mobile dropdown
      const mobile = document.getElementById('repo-select-mobile');
      if (mobile) mobile.value = repoPath;
      render();
    }

    function getRepoStats(repo) {
      const allItems = [...(repo.features || []), ...(repo.research || []), ...(repo.feedback || [])];
      const activeItems = allItems.filter(f => f.stage !== 'done');
      const totalItems = activeItems.length;
      const hasWaiting = allItems.some(f => (f.agents || []).some(a => a.status === 'waiting'));
      const hasError = allItems.some(f => (f.agents || []).some(a => a.status === 'error'));
      const featureCount = (repo.features || []).filter(f => f.stage !== 'done').length;
      const researchCount = (repo.research || []).filter(f => f.stage !== 'done').length;
      const feedbackCount = (repo.feedback || []).filter(f => f.stage !== 'done').length;
      const waitingCount = allItems.filter(f => (f.agents || []).some(a => a.status === 'waiting')).length;
      const errorCount = allItems.filter(f => (f.agents || []).some(a => a.status === 'error')).length;
      return { totalItems, featureCount, researchCount, feedbackCount, hasWaiting, hasError, waitingCount, errorCount };
    }

    function renderSidebar(repos) {
      const sidebar = document.getElementById('repo-sidebar');
      const mobile = document.getElementById('repo-select-mobile');
      const hadFocus = sidebar.contains(document.activeElement);
      sidebar.innerHTML = '';
      mobile.innerHTML = '';

      // Sort repos: active agents first, then by most recent activity
      const sorted = [...(repos || [])].sort((a, b) => {
        const aItems = [...(a.features || []), ...(a.research || [])];
        const bItems = [...(b.features || []), ...(b.research || [])];
        const aRunning = aItems.some(f => (f.agents || []).some(ag => ag.status === 'implementing'));
        const bRunning = bItems.some(f => (f.agents || []).some(ag => ag.status === 'implementing'));
        if (aRunning !== bRunning) return aRunning ? -1 : 1;
        const aActive = aItems.filter(f => f.stage === 'in-progress' || f.stage === 'in-evaluation').length;
        const bActive = bItems.filter(f => f.stage === 'in-progress' || f.stage === 'in-evaluation').length;
        if (aActive !== bActive) return bActive - aActive;
        const latestTime = items => Math.max(0, ...items.flatMap(f => (f.agents || []).map(ag => new Date(ag.updatedAt || 0).getTime())));
        return latestTime(bItems) - latestTime(aItems);
      });

      // "All" option
      const allBtn = document.createElement('button');
      allBtn.className = 'sidebar-item' + (state.selectedRepo === 'all' ? ' active' : '');
      allBtn.setAttribute('role', 'option');
      allBtn.setAttribute('aria-selected', state.selectedRepo === 'all' ? 'true' : 'false');
      allBtn.setAttribute('tabindex', state.selectedRepo === 'all' ? '0' : '-1');
      allBtn.innerHTML = '<span class="sidebar-name">All Repos</span>';
      allBtn.onclick = () => selectRepo('all');
      sidebar.appendChild(allBtn);

      const allOpt = document.createElement('option');
      allOpt.value = 'all';
      allOpt.textContent = 'All Repos';
      mobile.appendChild(allOpt);

      // Per-repo items
      sorted.forEach(repo => {
        const stats = getRepoStats(repo);
        const isActive = state.selectedRepo === repo.path;

        const btn = document.createElement('button');
        btn.className = 'sidebar-item' + (isActive ? ' active' : '');
        btn.setAttribute('role', 'option');
        btn.setAttribute('aria-selected', isActive ? 'true' : 'false');
        btn.setAttribute('tabindex', isActive ? '0' : '-1');
        btn.title = repo.displayPath;

        let indicatorsHtml = '';
        if (stats.hasError) indicatorsHtml += '<span class="sidebar-dot error"></span>';
        else if (stats.hasWaiting) indicatorsHtml += '<span class="sidebar-dot waiting"></span>';
        if (stats.totalItems > 0) indicatorsHtml += '<span class="sidebar-badge">' + stats.totalItems + '</span>';

        btn.innerHTML = '<span class="sidebar-name">' + escHtml(repo.displayPath) + '</span>' +
          (indicatorsHtml ? '<span class="sidebar-indicators">' + indicatorsHtml + '</span>' : '');
        btn.onclick = () => selectRepo(repo.path);
        sidebar.appendChild(btn);

        const opt = document.createElement('option');
        opt.value = repo.path;
        opt.textContent = repo.displayPath + (stats.totalItems ? ' (' + stats.totalItems + ')' : '');
        mobile.appendChild(opt);
      });

      mobile.value = state.selectedRepo;

      // Validate: if selectedRepo no longer exists, reset to 'all'
      if (state.selectedRepo !== 'all' && !(repos || []).some(r => r.path === state.selectedRepo)) {
        selectRepo('all');
      }

      // Restore focus if sidebar had focus before re-render
      if (hadFocus) {
        const activeBtn = sidebar.querySelector('.sidebar-item[tabindex="0"]');
        if (activeBtn) activeBtn.focus();
      }
    }

    function renderRepoHeader(repo) {
      const header = document.getElementById('repo-header');
      if (!repo || state.selectedRepo === 'all') {
        header.style.display = 'none';
        return;
      }
      const stats = getRepoStats(repo);
      const parts = [];
      if (stats.featureCount > 0) parts.push(stats.featureCount + ' feature' + (stats.featureCount === 1 ? '' : 's'));
      if (stats.researchCount > 0) parts.push(stats.researchCount + ' research');
      let metaText = parts.join(', ') || 'No items';
      if (stats.waitingCount > 0) metaText += ' · ' + stats.waitingCount + ' waiting';
      if (stats.errorCount > 0) metaText += ' · ' + stats.errorCount + ' error';

      header.style.display = '';
      header.innerHTML = '<h2 class="repo-header-name">' + escHtml(repo.displayPath) + '</h2>' +
        '<span class="repo-header-meta">' + escHtml(metaText) + '</span>';
    }

    // Keyboard navigation for sidebar
    document.getElementById('repo-sidebar').addEventListener('keydown', (e) => {
      const items = [...document.querySelectorAll('.sidebar-item')];
      const focusedIdx = items.indexOf(document.activeElement);
      if (focusedIdx === -1) return;

      let nextIdx = -1;
      if (e.key === 'ArrowDown') {
        nextIdx = Math.min(focusedIdx + 1, items.length - 1);
      } else if (e.key === 'ArrowUp') {
        nextIdx = Math.max(focusedIdx - 1, 0);
      } else if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        items[focusedIdx].click();
        return;
      } else if (e.key === 'Home') {
        nextIdx = 0;
      } else if (e.key === 'End') {
        nextIdx = items.length - 1;
      } else {
        return;
      }

      e.preventDefault();
      if (nextIdx >= 0 && nextIdx < items.length) {
        items.forEach(it => it.setAttribute('tabindex', '-1'));
        items[nextIdx].setAttribute('tabindex', '0');
        items[nextIdx].focus();
      }
    });

    // Mobile dropdown handler
    document.getElementById('repo-select-mobile').addEventListener('change', (e) => {
      selectRepo(e.target.value);
    });

    // ── Spec drawer ──────────────────────────────────────────────────────────

    const drawerState = {
      path: null, content: '', savedContent: '', mode: 'read', dirty: false,
      title: '', stage: '',
      fontSize: Number(localStorage.getItem('aigon.dashboard.drawerFontSize') || '13'),
      undoStack: [], redoStack: []
    };
    const drawerOverlay = document.getElementById('drawer-overlay');
    const drawerEl = document.getElementById('spec-drawer');
    const drawerTitle = document.getElementById('drawer-title');
    const drawerStage = document.getElementById('drawer-stage');
    const drawerPreview = document.getElementById('drawer-preview');
    const drawerEditor = document.getElementById('drawer-editor');
    const drawerSaveBtn = document.getElementById('drawer-save');
    const drawerSaveStatus = document.getElementById('drawer-save-status');
    const drawerUndoBtn = document.getElementById('drawer-undo');
    const drawerRedoBtn = document.getElementById('drawer-redo');
    const drawerFontSizeLabel = document.getElementById('drawer-font-size');

    function applyDrawerFontSize() {
      const sz = drawerState.fontSize + 'px';
      drawerPreview.style.fontSize = sz;
      drawerEditor.style.fontSize = sz;
      drawerFontSizeLabel.textContent = drawerState.fontSize;
      localStorage.setItem('aigon.dashboard.drawerFontSize', String(drawerState.fontSize));
    }

    function renderMarkdownPreview(md) {
      if (typeof marked !== 'undefined') {
        drawerPreview.innerHTML = marked.parse(md);
        drawerPreview.querySelectorAll('input[type="checkbox"]').forEach(cb => { cb.disabled = true; });
      } else {
        drawerPreview.textContent = md;
      }
    }

    function updateDrawerButtons() {
      drawerSaveBtn.disabled = !drawerState.dirty;
      drawerUndoBtn.disabled = drawerState.undoStack.length === 0;
      drawerRedoBtn.disabled = drawerState.redoStack.length === 0;
    }

    function pushUndo() {
      const current = drawerEditor.value;
      const last = drawerState.undoStack[drawerState.undoStack.length - 1];
      if (last === current) return;
      drawerState.undoStack.push(current);
      if (drawerState.undoStack.length > 100) drawerState.undoStack.shift();
      drawerState.redoStack = [];
      updateDrawerButtons();
    }

    function openDrawer(specPath, title, stage) {
      if (!specPath) return;
      drawerState.path = specPath;
      drawerState.title = title;
      drawerState.stage = stage;
      drawerState.mode = 'read';
      drawerState.dirty = false;
      drawerState.undoStack = [];
      drawerState.redoStack = [];
      drawerTitle.textContent = title;
      drawerStage.textContent = stage;
      drawerPreview.innerHTML = '<span style="color:var(--text-tertiary)">Loading…</span>';
      drawerEditor.value = '';
      drawerEditor.style.display = 'none';
      drawerPreview.style.display = '';
      drawerSaveStatus.textContent = '';
      updateDrawerModeButtons();
      updateDrawerButtons();
      applyDrawerFontSize();
      drawerOverlay.classList.add('open');
      drawerEl.classList.add('open');
      document.body.style.overflow = 'hidden';

      fetch('/api/spec?path=' + encodeURIComponent(specPath))
        .then(r => r.json())
        .then(data => {
          if (data.error) { drawerPreview.textContent = 'Error: ' + data.error; return; }
          drawerState.content = data.content;
          drawerState.savedContent = data.content;
          drawerEditor.value = data.content;
          renderMarkdownPreview(data.content);
        })
        .catch(e => { drawerPreview.textContent = 'Failed to load: ' + e.message; });
    }

    function closeDrawer() {
      if (drawerState.dirty && !confirm('You have unsaved changes. Discard?')) return;
      drawerOverlay.classList.remove('open');
      drawerEl.classList.remove('open');
      document.body.style.overflow = '';
      drawerState.path = null;
      drawerState.dirty = false;
    }

    function setDrawerMode(mode) {
      drawerState.mode = mode;
      updateDrawerModeButtons();
      if (mode === 'read') {
        drawerEditor.style.display = 'none';
        drawerPreview.style.display = '';
        drawerState.content = drawerEditor.value;
        renderMarkdownPreview(drawerState.content);
      } else {
        drawerEditor.value = drawerState.content;
        drawerPreview.style.display = 'none';
        drawerEditor.style.display = '';
        drawerEditor.focus();
      }
    }

    function updateDrawerModeButtons() {
      drawerEl.querySelectorAll('.drawer-mode-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mode === drawerState.mode);
      });
    }

    async function saveDrawer() {
      if (!drawerState.dirty) return;
      drawerSaveBtn.disabled = true;
      drawerSaveStatus.textContent = 'Saving…';
      try {
        const content = drawerState.mode === 'edit' ? drawerEditor.value : drawerState.content;
        const res = await fetch('/api/spec', {
          method: 'PUT',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ path: drawerState.path, content })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed');
        drawerState.content = content;
        drawerState.savedContent = content;
        drawerState.dirty = false;
        drawerSaveStatus.textContent = 'Saved';
        renderMarkdownPreview(drawerState.content);
        updateDrawerButtons();
      } catch (e) {
        drawerSaveStatus.textContent = 'Error: ' + e.message;
      } finally {
        drawerSaveBtn.disabled = !drawerState.dirty;
      }
    }

    // Event listeners
    drawerOverlay.onclick = closeDrawer;
    document.getElementById('drawer-close').onclick = closeDrawer;
    drawerEl.querySelectorAll('.drawer-mode-btn').forEach(btn => {
      btn.onclick = () => setDrawerMode(btn.dataset.mode);
    });

    // Track edits for dirty state — use a debounced undo snapshot
    let undoTimer = null;
    drawerEditor.addEventListener('input', () => {
      drawerState.dirty = drawerEditor.value !== drawerState.savedContent;
      drawerSaveStatus.textContent = '';
      updateDrawerButtons();
      // Snapshot for undo after 500ms pause in typing
      clearTimeout(undoTimer);
      undoTimer = setTimeout(() => pushUndo(), 500);
    });

    // Before first edit in a session, snapshot the original
    drawerEditor.addEventListener('focus', () => {
      if (drawerState.undoStack.length === 0 && drawerEditor.value) {
        drawerState.undoStack.push(drawerEditor.value);
      }
    });

    drawerSaveBtn.onclick = saveDrawer;

    drawerUndoBtn.onclick = () => {
      if (drawerState.undoStack.length === 0) return;
      drawerState.redoStack.push(drawerEditor.value);
      const prev = drawerState.undoStack.pop();
      drawerEditor.value = prev;
      drawerState.content = prev;
      drawerState.dirty = prev !== drawerState.savedContent;
      drawerSaveStatus.textContent = '';
      updateDrawerButtons();
    };

    drawerRedoBtn.onclick = () => {
      if (drawerState.redoStack.length === 0) return;
      drawerState.undoStack.push(drawerEditor.value);
      const next = drawerState.redoStack.pop();
      drawerEditor.value = next;
      drawerState.content = next;
      drawerState.dirty = next !== drawerState.savedContent;
      drawerSaveStatus.textContent = '';
      updateDrawerButtons();
    };

    // Font size controls
    document.getElementById('drawer-font-down').onclick = () => {
      drawerState.fontSize = Math.max(10, drawerState.fontSize - 1);
      applyDrawerFontSize();
    };
    document.getElementById('drawer-font-up').onclick = () => {
      drawerState.fontSize = Math.min(24, drawerState.fontSize + 1);
      applyDrawerFontSize();
    };

    document.getElementById('drawer-open-editor').onclick = async () => {
      try {
        await fetch('/api/open-in-editor', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ path: drawerState.path })
        });
      } catch (e) {
        showToast('Could not open editor: ' + e.message, null, null, {error:true});
      }
    };

    // Fullscreen toggle
    function toggleDrawerFullscreen() {
      drawerEl.classList.toggle('fullscreen');
      const btn = document.getElementById('drawer-fullscreen');
      btn.textContent = drawerEl.classList.contains('fullscreen') ? '⤡' : '⤢';
    }
    document.getElementById('drawer-fullscreen').onclick = toggleDrawerFullscreen;

    // Keyboard shortcuts for drawer
    document.addEventListener('keydown', (e) => {
      if (!drawerEl.classList.contains('open')) return;
      if (e.key === 'Escape') { closeDrawer(); return; }
      // Cmd+S to save
      if ((e.metaKey || e.ctrlKey) && e.key === 's') {
        e.preventDefault();
        saveDrawer();
        return;
      }
      // Cmd+Shift+E to toggle read/edit mode
      if ((e.metaKey || e.ctrlKey) && e.shiftKey && e.key === 'e') {
        e.preventDefault();
        setDrawerMode(drawerState.mode === 'read' ? 'edit' : 'read');
        return;
      }
      // Cmd+Shift+F to toggle fullscreen
      if ((e.metaKey || e.ctrlKey) && e.shiftKey && e.key === 'f') {
        e.preventDefault();
        toggleDrawerFullscreen();
      }
    });

    // ── Shared render helpers ─────────────────────────────────────────────────

    function updateTitleAndFavicon(waiting){
      document.title = waiting > 0 ? '(' + waiting + ') Aigon Dashboard' : 'Aigon Dashboard';
      const link = document.querySelector('link[rel="icon"]') || (() => { const x = document.createElement('link'); x.rel = 'icon'; document.head.appendChild(x); return x; })();
      if (!waiting) { link.href = 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2232%22 height=%2232%22></svg>'; return; }
      const c = document.createElement('canvas'); c.width = 32; c.height = 32;
      const ctx = c.getContext('2d');
      ctx.fillStyle = '#111113'; ctx.fillRect(0,0,32,32);
      ctx.fillStyle = '#f59e0b'; ctx.beginPath(); ctx.arc(16,16,13,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff'; ctx.font = 'bold 16px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(String(waiting > 99 ? '99+' : waiting), 16, 16);
      link.href = c.toDataURL('image/png');
    }

    function setHealth() {
      const dot = document.getElementById('health-dot');
      const text = document.getElementById('health-text');
      if (state.failures === 0) { dot.style.background = '#22c55e'; text.textContent = 'Connected'; return; }
      if (state.failures < 3) { dot.style.background = '#f59e0b'; text.textContent = 'Reconnecting...'; return; }
      dot.style.background = '#ef4444'; text.textContent = 'Disconnected';
    }

    function updateViewTabs() {
      document.querySelectorAll('.view-tab').forEach(tab => {
        tab.classList.toggle('active', tab.getAttribute('data-view') === state.view);
      });
    }

    function getVisibleRepos(data) {
      if (!data || !data.repos) return [];
      if (state.selectedRepo === 'all') return data.repos;
      return data.repos.filter(r => r.path === state.selectedRepo);
    }

    // ── Monitor view ──────────────────────────────────────────────────────────

          itemTypes.forEach(t => {
            (repo[t] || []).forEach(item => {

        '<button class="pill pill-filter waiting' + (state.filter === 'waiting' ? ' active' : '') + '" data-filter="waiting">' + summary.waiting + ' waiting</button>' +
        '<button class="pill pill-filter' + (state.filter === 'submitted' ? ' active' : '') + '" data-filter="submitted">' + summary.submitted + ' submitted</button>' +
        '<button class="pill pill-filter' + (state.filter === 'error' ? ' active' : '') + '" data-filter="error">' + summary.error + ' error</button>';

        const features = rawFeatures.filter(f => state.filter === 'all' || f.agents.some(a => a.status === state.filter));
        const rawResearch = showResearch ? [...(repo.research || [])].filter(r => r.stage === 'in-progress').sort((a, b) => featureRank(a) - featureRank(b) || Number(a.id) - Number(b.id)) : [];
        const research = rawResearch.filter(r => state.filter === 'all' || r.agents.some(a => a.status === state.filter));
        const rawFeedback = showFeedback ? [...(repo.feedback || [])].filter(f => f.stage === 'in-progress').sort((a, b) => featureRank(a) - featureRank(b) || Number(a.id) - Number(b.id)) : [];

        const waitingCards = features.filter(f => f.agents.some(a => a.status === 'waiting')).length + research.filter(r => r.agents.some(a => a.status === 'waiting')).length + feedback.filter(f => (f.agents || []).some(a => a.status === 'waiting')).length;
        const headerParts = [];

        section.innerHTML = '<div class="repo-h"><strong>' + escHtml(repo.displayPath) + '</strong><span>' + headerText + (waitingCards ? ' • ' + waitingCards + ' waiting' : '') + ' <span aria-label="Toggle">' + (state.collapsed[repo.path] ? '[+]' : '[-]') + '</span></span></div><div class="repo-b"></div>';

            const rows = [...feature.agents].sort((a, b) => statusRank(a.status) - statusRank(b.status) || a.id.localeCompare(b.id));
            const nextCmd = feature.nextAction && feature.nextAction.command ? feature.nextAction.command : null;
            const nextReason = feature.nextAction && feature.nextAction.reason ? escHtml(feature.nextAction.reason) : '';
            const nextBtn = nextCmd ? '<button class="copy btn btn-primary next-copy" data-copy="' + escHtml(nextCmd) + '" title="' + nextReason + '">Copy next</button>' : '';
            const evalBadge = isEval ? '<span class="eval-badge' + (feature.evalStatus === 'pick winner' ? ' pick-winner' : '') + '">' + escHtml(feature.evalStatus || 'evaluating') + '</span>' : '';
            card.innerHTML = '<div class="card-h"><span class="feature">' + (feature.id ? '#' + escHtml(feature.id) + ' ' : '') + escHtml(feature.name) + evalBadge + '</span><span class="head-actions">' + nextBtn + '</span></div><div class="rows"></div>';
            const rowsEl = card.querySelector('.rows');
            rows.forEach(agent => {
              const row = document.createElement('div');
              row.className = 'row ' + agent.status;
              const waitingCmd = agent.slashCommand
                ? '<button class="copy btn" data-copy="' + escHtml(agent.slashCommand) + '">Copy cmd</button>'
                : '';
              const attachBtn = agent.tmuxRunning
                ? '<button class="attach btn btn-primary" data-repo="' + escHtml(repo.path) + '" data-feature="' + escHtml(feature.id) + '" data-agent="' + escHtml(agent.id) + '" data-session="' + escHtml(agent.tmuxSession || '') + '">Attach</button>'
                : '';
              row.innerHTML = '<span class="agent">' + escHtml(agent.id) + '</span><span class="status ' + escHtml(agent.status) + '"><span class="dot"></span>' + escHtml(agent.status) + '</span><span class="stamp" data-updated="' + escHtml(agent.updatedAt) + '">' + relTime(agent.updatedAt) + '</span><span class="row-actions">' + waitingCmd + attachBtn + '</span>';
              rowsEl.appendChild(row);

            // Click card to open spec drawer

              card.addEventListener('click', (e) => {

          research.forEach(item => {
            const hasWaiting = item.agents.some(a => a.status === 'waiting');

            const card = document.createElement('article');
            card.className = 'card research' + (hasWaiting ? ' waiting' : '');
            const rows = [...item.agents].sort((a, b) => statusRank(a.status) - statusRank(b.status) || a.id.localeCompare(b.id));
            const synthBadge = allSubmitted ? '<span class="research-badge all-submitted">ready to synthesize</span>' : '<span class="research-badge">research</span>';
            const synthCmd = allSubmitted ? '/ars ' + String(item.id).padStart(2, '0') : null;
            const synthBtn = synthCmd ? '<button class="copy btn btn-primary next-copy" data-copy="' + escHtml(synthCmd) + '" title="All agents submitted — synthesize findings">Copy next</button>' : '';
            card.innerHTML = '<div class="card-h"><span class="feature">' + (item.id ? 'R#' + escHtml(item.id) + ' ' : '') + escHtml(item.name) + synthBadge + '</span><span class="head-actions">' + synthBtn + '</span></div><div class="rows"></div>';
            const rowsEl = card.querySelector('.rows');
            rows.forEach(agent => {
              const row = document.createElement('div');
              row.className = 'row ' + agent.status;
              const waitingCmd = agent.slashCommand
                ? '<button class="copy btn" data-copy="' + escHtml(agent.slashCommand) + '">Copy cmd</button>'
                : '';
              const attachBtn = agent.tmuxRunning
                ? '<button class="attach btn btn-primary" data-repo="' + escHtml(repo.path) + '" data-feature="' + escHtml(item.id) + '" data-agent="' + escHtml(agent.id) + '">Attach</button>'
                : '';
              row.innerHTML = '<span class="agent">' + escHtml(agent.id) + '</span><span class="status ' + escHtml(agent.status) + '"><span class="dot"></span>' + escHtml(agent.status) + '</span><span class="stamp" data-updated="' + escHtml(agent.updatedAt) + '">' + relTime(agent.updatedAt) + '</span><span class="row-actions">' + waitingCmd + attachBtn + '</span>';
              rowsEl.appendChild(row);
            });
            // Click card to open spec drawer
            if (item.specPath) {
              card.style.cursor = 'pointer';
              card.addEventListener('click', (e) => {
                if (e.target.closest('button') || e.target.closest('.btn')) return;
                const name = (item.id ? 'R#' + item.id + ' ' : '') + item.name;
                openDrawer(item.specPath, name, 'in-progress');
              });
            }
            body.appendChild(card);
          });
          feedback.forEach(item => {
            const hasWaiting = (item.agents || []).some(a => a.status === 'waiting');
            const card = document.createElement('article');
            card.className = 'card feedback' + (hasWaiting ? ' waiting' : '');
            const rows = [...(item.agents || [])].sort((a, b) => statusRank(a.status) - statusRank(b.status) || a.id.localeCompare(b.id));
            card.innerHTML = '<div class="card-h"><span class="feature">' + (item.id ? 'FB#' + escHtml(item.id) + ' ' : '') + escHtml(item.name) + '<span class="research-badge">feedback</span></span></div><div class="rows"></div>';
            const rowsEl = card.querySelector('.rows');
            rows.forEach(agent => {
              const row = document.createElement('div');
              row.className = 'row ' + agent.status;
              const waitingCmd = agent.slashCommand
                ? '<button class="copy btn" data-copy="' + escHtml(agent.slashCommand) + '">Copy cmd</button>'
                : '';
              const attachBtn = agent.tmuxRunning
                ? '<button class="attach btn btn-primary" data-repo="' + escHtml(repo.path) + '" data-feature="' + escHtml(item.id) + '" data-agent="' + escHtml(agent.id) + '">Attach</button>'
                : '';
              row.innerHTML = '<span class="agent">' + escHtml(agent.id) + '</span><span class="status ' + escHtml(agent.status) + '"><span class="dot"></span>' + escHtml(agent.status) + '</span><span class="stamp" data-updated="' + escHtml(agent.updatedAt) + '">' + relTime(agent.updatedAt) + '</span><span class="row-actions">' + waitingCmd + attachBtn + '</span>';
              rowsEl.appendChild(row);
            });
            if (item.specPath) {
              card.style.cursor = 'pointer';
              card.addEventListener('click', (e) => {
                if (e.target.closest('button') || e.target.closest('.btn')) return;
                const name = (item.id ? 'FB#' + item.id + ' ' : '') + item.name;
                openDrawer(item.specPath, name, 'in-progress');
              });
            }
            body.appendChild(card);
          });
        }
        reposRoot.appendChild(section);
      });

      if (visibleItemCount === 0) {
        empty.style.display = '';
        empty.textContent = state.filter === 'all'
          ? 'No items in progress.'
          : 'No items match filter: ' + state.filter;
      }

      reposRoot.querySelectorAll('button.copy').forEach(btn => {
        btn.onclick = async (e) => {
          e.stopPropagation();
          const text = btn.getAttribute('data-copy') || '';
          if (!text) return;
          const ok = await copyText(text);
          showToast(ok ? 'Copied: ' + text : 'Copy failed');

      reposRoot.querySelectorAll('button.attach').forEach(btn => {
        btn.onclick = async (e) => {

          const agentId = btn.getAttribute('data-agent') || '';
          const tmuxSession = btn.getAttribute('data-session') || '';

          render();
