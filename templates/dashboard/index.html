      area.appendChild(section);

      // ── Notifications section ─────────────────────────────────────────────
      const NOTIF_TYPE_LABELS = {
        'agent-waiting': 'Agent waiting',
        'agent-submitted': 'Agent submitted',
        'all-submitted': 'All agents submitted (features)',
        'all-research-submitted': 'All agents submitted (research)',
        'error': 'Errors'
      };
      const notifSection = document.createElement('div');
      notifSection.className = 'settings-section';
      notifSection.innerHTML = '<h3>Notifications</h3><p>macOS notifications are delivered only while the dashboard is running.</p>';

      async function loadAndRenderNotifToggles() {
        let cfg = { enabled: true, types: {} };
        try {
          const r = await fetch('/api/settings/notifications');
          cfg = await r.json();
        } catch (_) {}

        notifSection.querySelectorAll('.toggle-row').forEach(r => r.remove());

        function makeToggleRow(label, checked, disabled, onChange) {
          const row = document.createElement('div');
          row.className = 'toggle-row';
          const labelDiv = document.createElement('div');
          labelDiv.className = 'toggle-row-label';
          labelDiv.textContent = label;
          const sw = document.createElement('label');
          sw.className = 'toggle-switch';
          const inp = document.createElement('input');
          inp.type = 'checkbox';
          inp.checked = checked;
          if (disabled) inp.disabled = true;
          inp.onchange = () => onChange(inp.checked);
          const track = document.createElement('span');
          track.className = 'toggle-track';
          sw.appendChild(inp);
          sw.appendChild(track);
          row.appendChild(labelDiv);
          row.appendChild(sw);
          return { row, inp };
        }

        // Master toggle
        const { row: masterRow, inp: masterInp } = makeToggleRow('Enable macOS notifications', cfg.enabled, false, async (val) => {
          try {
            await fetch('/api/settings/notifications', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ enabled: val }) });
          } catch (_) {}
          loadAndRenderNotifToggles();
        });
        notifSection.appendChild(masterRow);

        // Per-type toggles
        Object.entries(NOTIF_TYPE_LABELS).forEach(([type, label]) => {
          const { row, inp } = makeToggleRow(label, cfg.types[type] !== false, !cfg.enabled, async (val) => {
            try {
              await fetch('/api/settings/notifications', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ types: { [type]: val } }) });
            } catch (_) {}
          });
          row.style.paddingLeft = '24px';
          notifSection.appendChild(row);
        });
      }

      loadAndRenderNotifToggles();
      area.appendChild(notifSection);

      reposRoot.appendChild(area);
    }

    async function loadAnalytics() {
      if (statsState.loading) return;
      statsState.loading = true;
      try {
        const res = await fetch('/api/analytics', { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        statsState.data = await res.json();
        statsState.error = null;
      } catch (e) {
        statsState.error = e.message;
      } finally {
        statsState.loading = false;
      }
    }

    function fmtNum(v, decimals) {
      if (v === null || v === undefined) return '—';
      return decimals !== undefined ? v.toFixed(decimals) : String(v);
    }
    function fmtPct(v) {
      if (v === null || v === undefined) return '—';
      return Math.round(v * 100) + '%';
    }
    function fmtHours(v) {
      if (v === null || v === undefined) return '—';
      if (v < 1) return Math.round(v * 60) + 'm';
      return v.toFixed(1) + 'h';
    }

    function trendIcon(pct, lowerIsBetter) {
      if (pct === null || pct === undefined) return '';
      const positive = lowerIsBetter ? pct < 0 : pct > 0;
      const arrow = pct > 0 ? '↑' : '↓';
      const cls = positive ? 'trend-up' : 'trend-down';
      return `<span class="${cls}">${arrow} ${Math.abs(pct)}%</span>`;
    }

    function buildSparklineSvg(points, color) {
      if (!points || points.length < 2) return '';
      const vals = points.map(p => (p.count !== undefined ? p.count : p.score) || 0);
      const maxVal = Math.max(...vals, 1);
      const w = 400, h = 40, pad = 2;
      const xs = vals.map((_, i) => pad + (i / (vals.length - 1)) * (w - pad * 2));
      const ys = vals.map(v => h - pad - ((v / maxVal) * (h - pad * 2)));
      const pts = xs.map((x, i) => `${x},${ys[i]}`).join(' ');
      const fillPts = `${xs[0]},${h} ${pts} ${xs[xs.length - 1]},${h}`;
      return `<svg class="sparkline-svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
        <polygon points="${fillPts}" fill="${color}" opacity="0.15"/>
        <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2"/>
      </svg>`;
    }

    function buildStatCard(label, value, trendHtml, extra) {
      return `<div class="stat-card">
        <div class="stat-card-label">${escHtml(label)}</div>
        <div class="stat-card-value">${value}</div>
        ${trendHtml ? `<div class="stat-card-trend">${trendHtml}</div>` : ''}
        ${extra ? `<div class="stat-card-trend" style="color:var(--text-tertiary)">${extra}</div>` : ''}
      </div>`;
    }

    function buildVolumeSeries(features, granularity) {
      const buckets = {};
      let minTs = Infinity, maxTs = -Infinity;

      features.forEach(f => {
        const ts = f.completedAt ? new Date(f.completedAt) : null;
        if (!ts || isNaN(ts)) return;
        const t = ts.getTime();
        if (t < minTs) minTs = t;
        if (t > maxTs) maxTs = t;
        let key;
        if (granularity === 'daily') {
          key = ts.toISOString().slice(0, 10);
        } else if (granularity === 'weekly') {
          const d = new Date(ts);
          const dow = d.getUTCDay() || 7;
          d.setUTCDate(d.getUTCDate() - dow + 1);
          key = d.toISOString().slice(0, 10);
        } else {
          key = ts.toISOString().slice(0, 7) + '-01';
        }
        buckets[key] = (buckets[key] || 0) + 1;
      });

      if (minTs === Infinity) return [];

      // Fill in zero-count buckets for a continuous timeline
      const filled = [];
      const cur = new Date(minTs);
      const end = new Date(maxTs);

      if (granularity === 'daily') {
        cur.setUTCHours(0, 0, 0, 0);
        end.setUTCHours(0, 0, 0, 0);
        while (cur <= end) {
          const key = cur.toISOString().slice(0, 10);
          filled.push({ date: key, count: buckets[key] || 0 });
          cur.setUTCDate(cur.getUTCDate() + 1);
        }
      } else if (granularity === 'weekly') {
        // Align to Monday
        const dow = cur.getUTCDay() || 7;
        cur.setUTCDate(cur.getUTCDate() - dow + 1);
        cur.setUTCHours(0, 0, 0, 0);
        while (cur <= end) {
          const key = cur.toISOString().slice(0, 10);
          filled.push({ date: key, count: buckets[key] || 0 });
          cur.setUTCDate(cur.getUTCDate() + 7);
        }
      } else {
        cur.setUTCDate(1); cur.setUTCHours(0, 0, 0, 0);
        end.setUTCDate(1); end.setUTCHours(0, 0, 0, 0);
        while (cur <= end) {
          const key = cur.toISOString().slice(0, 10);
          filled.push({ date: key, count: buckets[key] || 0 });
          cur.setUTCMonth(cur.getUTCMonth() + 1);
        }
      }
      return filled;
    }

    function buildCycleTimeSeries(features, granularity) {
      const MIN_DURATION_MS = 5 * 60 * 1000; // ignore < 5 min (likely backfill artifacts)

      // Compute outlier cap: P95 or 48h, whichever is larger
      const allHours = features
        .filter(f => f.durationMs && f.durationMs >= MIN_DURATION_MS && !f.cycleTimeExclude)
        .map(f => f.durationMs / 3600000)
        .sort((a, b) => a - b);
      const p95 = allHours.length > 0 ? allHours[Math.floor(allHours.length * 0.95)] : 48;
      const outlierCap = Math.max(p95, 48);

      const buckets = {};
      features.forEach(f => {
        if (!f.durationMs || f.durationMs < MIN_DURATION_MS) return;
        if (f.cycleTimeExclude) return;
        const ts = f.completedAt ? new Date(f.completedAt) : null;
        if (!ts || isNaN(ts)) return;
        let key;
        if (granularity === 'daily') {
          key = ts.toISOString().slice(0, 10);
        } else if (granularity === 'weekly') {
          const d = new Date(ts);
          const dow = d.getUTCDay() || 7;
          d.setUTCDate(d.getUTCDate() - dow + 1);
          key = d.toISOString().slice(0, 10);
        } else {
          key = ts.toISOString().slice(0, 7) + '-01';
        }
        const hours = f.durationMs / 3600000;
        if (!buckets[key]) buckets[key] = { included: [], outliers: 0 };
        if (hours > outlierCap) {
          buckets[key].outliers++;
        } else {
          buckets[key].included.push(hours);
        }
      });
      return Object.keys(buckets).sort().map(k => {
        const { included, outliers } = buckets[k];
        let medianHours = null;
        if (included.length > 0) {
          const sorted = included.slice().sort((a, b) => a - b);
          const mid = Math.floor(sorted.length / 2);
          medianHours = Math.round((sorted.length % 2 ? sorted[mid] : (sorted[mid - 1] + sorted[mid]) / 2) * 10) / 10;
        }
        return { date: k, medianHours, count: included.length, outliersExcluded: outliers };
      });
    }

    function applyCycleTimeWindow() {
      const series = statsState.cycleTimeSeries;
      const gran = statsState.volumeGranularity;
      const windowSize = VOLUME_WINDOW[gran] || 8;
      if (!series || !series.length) return;

      const needsNav = series.length > windowSize;

      const navEl = document.getElementById('ct-nav-controls');
      if (navEl) navEl.style.visibility = needsNav ? 'visible' : 'hidden';

      let startIdx, endIdx, slice;
      if (!needsNav) {
        startIdx = 0;
        endIdx = series.length - 1;
        slice = series.slice();
        statsState.cycleTimeWindowEnd = endIdx;
      } else {
        if (statsState.cycleTimeWindowEnd === null) statsState.cycleTimeWindowEnd = series.length - 1;
        statsState.cycleTimeWindowEnd = Math.min(statsState.cycleTimeWindowEnd, series.length - 1);
        endIdx = statsState.cycleTimeWindowEnd;
        startIdx = Math.max(0, endIdx - windowSize + 1);
        slice = series.slice(startIdx, endIdx + 1);
      }

      const chart = statsState.cycleTimeChart;
      if (chart) {
        chart.data.labels = slice.map(d => gran === 'monthly' ? d.date.slice(0, 7) : d.date.slice(5, 10));
        chart.data.datasets[0].data = slice.map(d => d.medianHours);
        chart.options.plugins.tooltip.callbacks.label = ctx => {
          const d = slice[ctx.dataIndex];
          const line = ` Median cycle time: ${ctx.parsed.y}h`;
          return d && d.outliersExcluded > 0 ? [line, ` (${d.outliersExcluded} outlier${d.outliersExcluded > 1 ? 's' : ''} excluded)`] : line;
        };
        chart.update('none');
      }

      if (needsNav) {
        const fmt = d => gran === 'monthly' ? d.date.slice(0, 7) : d.date.slice(0, 10);
        const rangeEl = document.getElementById('ct-nav-range');
        if (rangeEl && slice.length) rangeEl.textContent = `${fmt(slice[0])} – ${fmt(slice[slice.length - 1])}`;
        const btnPrev = document.getElementById('ct-nav-prev');
        const btnNext = document.getElementById('ct-nav-next');
        if (btnPrev) btnPrev.disabled = startIdx === 0;
        if (btnNext) btnNext.disabled = endIdx >= series.length - 1;
      }
    }

    function panCycleTimeChart(direction) {
      const series = statsState.cycleTimeSeries || [];
      const windowSize = VOLUME_WINDOW[statsState.volumeGranularity] || 8;
      if (!series.length) return;
      const step = Math.max(1, Math.floor(windowSize / 2));
      const current = statsState.cycleTimeWindowEnd !== null ? statsState.cycleTimeWindowEnd : series.length - 1;
      if (direction === 'prev') {
        statsState.cycleTimeWindowEnd = Math.max(windowSize - 1, current - step);
      } else {
        statsState.cycleTimeWindowEnd = Math.min(series.length - 1, current + step);
      }
      applyCycleTimeWindow();
    }

    function applyVolumeWindow() {
      const series = statsState.volumeSeries;
      const gran = statsState.volumeGranularity;

      if (needsNav) {

        const rangeEl = document.getElementById('vol-nav-range');
        if (rangeEl && slice.length) rangeEl.textContent = `${fmt(slice[0])} – ${fmt(slice[slice.length - 1])}`;
        const btnPrev = document.getElementById('vol-nav-prev');
        const btnNext = document.getElementById('vol-nav-next');
        if (btnPrev) btnPrev.disabled = startIdx === 0;

    function panVolumeChart(direction) {
      const series = statsState.volumeSeries;
      const windowSize = VOLUME_WINDOW[statsState.volumeGranularity] || 8;

      const step = Math.max(1, Math.floor(windowSize / 2));

    function filterFeaturesByPeriodAndRepo(features, period, repoFilter) {
      const now = Date.now();
      const ms = { '7d': 7, '30d': 30, '90d': 90, 'all': null };
      const days = ms[period];
      const since = days ? now - days * 86400000 : 0;
      return features.filter(f => {
        if (f.completedAt && new Date(f.completedAt).getTime() < since) return false;
        if (repoFilter !== 'all' && f.repoPath !== repoFilter) return false;
        return true;
      });
    }

    // ── Logs view ──────────────────────────────────────────────────────────────

    const logsState = {
      sort: { col: 'updatedAt', dir: 'desc' },
      search: '',
      repoFilter: 'all',
      page: 0,
      pageSize: 50
    };

    function slugToTitle(slug) {
      return (slug || '').replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    }

    function renderLogsView() {
      const container = document.getElementById('logs-view');
      document.getElementById('monitor-summary').style.display = 'none';
      document.getElementById('repo-header').style.display = 'none';
      document.getElementById('repos').style.display = 'none';
      document.getElementById('empty').style.display = 'none';

      const data = state.data;
      if (!data || !data.repos) { container.innerHTML = '<div class="stats-empty-msg">No data</div>'; return; }

      // Collect all features from allFeatures (falls back to features if allFeatures absent)
      const allRows = [];
      data.repos.forEach(repo => {
        const src = repo.allFeatures || repo.features || [];
        src.forEach(f => allRows.push({ ...f, repoName: repo.name, repoPath: repo.path, repoDisplay: repo.displayPath }));
      });

      // Repo filter
      let rows = logsState.repoFilter === 'all' ? allRows : allRows.filter(r => r.repoPath === logsState.repoFilter);

      // Search filter
      const q = logsState.search.trim().toLowerCase();
      if (q) rows = rows.filter(r => {
        const title = slugToTitle(r.name).toLowerCase();
        return title.includes(q) || (r.name || '').toLowerCase().includes(q) || String(r.id || '').includes(q);
      });

      // Sort
      const { col, dir } = logsState.sort;
      rows = rows.slice().sort((a, b) => {
        let av, bv;
        if (col === 'id') { av = Number(a.id ?? Infinity); bv = Number(b.id ?? Infinity); }
        else if (col === 'name') { av = slugToTitle(a.name).toLowerCase(); bv = slugToTitle(b.name).toLowerCase(); }
        else if (col === 'stage') { av = a.stage || ''; bv = b.stage || ''; }
        else if (col === 'repo') { av = a.repoName || ''; bv = b.repoName || ''; }
        else { av = a[col] || ''; bv = b[col] || ''; } // ISO dates sort lexically
        if (av < bv) return dir === 'asc' ? -1 : 1;
        if (av > bv) return dir === 'asc' ? 1 : -1;
        return 0;
      });

      const total = rows.length;
      const totalPages = Math.max(1, Math.ceil(total / logsState.pageSize));
      if (logsState.page >= totalPages) logsState.page = totalPages - 1;
      const pageRows = rows.slice(logsState.page * logsState.pageSize, (logsState.page + 1) * logsState.pageSize);

      function thHtml(key, label) {
        const active = col === key;
        const arrow = active ? (dir === 'asc' ? ' ↑' : ' ↓') : '';
        return `<th class="${active ? 'sort-active' : ''}" data-sort="${key}">${label}${arrow}</th>`;
      }

      function stageHtml(stage) {
        const cls = 'logs-stage stage-' + (stage || 'inbox').replace(/\s+/g, '-');
        return `<span class="${cls}">${escHtml(stage || '')}</span>`;
      }

      const html = [];
      html.push('<div class="logs-toolbar">');
      html.push(`<input class="logs-search" id="logs-search-input" type="search" placeholder="Search features…" value="${escHtml(logsState.search)}">`);
      html.push('<label style="font-size:12px;color:var(--text-secondary)">Repo:</label>');
      html.push('<select class="stats-select" id="logs-repo-filter">');
      html.push(`<option value="all"${logsState.repoFilter === 'all' ? ' selected' : ''}>All repos</option>`);
      data.repos.forEach(r => {
        const sel = logsState.repoFilter === r.path ? ' selected' : '';
        html.push(`<option value="${escHtml(r.path)}"${sel}>${escHtml(r.displayPath)}</option>`);
      });
      html.push('</select>');
      html.push(`<span style="margin-left:auto;font-size:11px;color:var(--text-tertiary)">${total} feature${total !== 1 ? 's' : ''}</span>`);
      html.push('</div>');

      html.push('<div style="overflow-x:auto">');
      html.push('<table class="logs-table">');
      html.push('<thead><tr>');
      html.push(thHtml('id', 'ID'));
      html.push(thHtml('name', 'Name'));
      html.push(thHtml('stage', 'Stage'));
      html.push(thHtml('repo', 'Repo'));
      html.push(thHtml('createdAt', 'Created'));
      html.push(thHtml('updatedAt', 'Last Changed'));
      html.push('</tr></thead>');
      html.push('<tbody>');
      pageRows.forEach((r, i) => {
        const title = slugToTitle(r.name);
        const idStr = r.id != null ? `#${String(r.id).padStart(2, '0')}` : '—';
        html.push(`<tr class="logs-row" data-idx="${i}" style="cursor:pointer" title="Click to open spec">`);
        html.push(`<td class="col-id">${idStr}</td>`);
        html.push(`<td class="col-name">${escHtml(title)}</td>`);
        html.push(`<td>${stageHtml(r.stage)}</td>`);
        html.push(`<td class="col-repo" title="${escHtml(r.repoDisplay || '')}">${escHtml(r.repoName || '—')}</td>`);
        html.push(`<td class="col-date">${logsDateFmt(r.createdAt)}</td>`);
        html.push(`<td class="col-date">${logsDateFmt(r.updatedAt)}</td>`);
        html.push('</tr>');
      });
      if (pageRows.length === 0) {
        html.push(`<tr><td colspan="6" style="text-align:center;color:var(--text-tertiary);padding:20px 0">${q ? 'No features match your search.' : 'No features found.'}</td></tr>`);
      }
      html.push('</tbody></table></div>');

      // Pagination
      html.push('<div class="logs-pagination">');
      html.push(`<button class="logs-page-btn" id="logs-prev"${logsState.page === 0 ? ' disabled' : ''}>← Prev</button>`);
      html.push(`<span class="logs-page-info">${logsState.page + 1} / ${totalPages}</span>`);
      html.push(`<button class="logs-page-btn" id="logs-next"${logsState.page >= totalPages - 1 ? ' disabled' : ''}>Next →</button>`);
      html.push('</div>');

      container.innerHTML = html.join('');

      // Wire up sort headers
      container.querySelectorAll('th[data-sort]').forEach(th => {
        th.onclick = () => {
          const key = th.getAttribute('data-sort');
          if (logsState.sort.col === key) {
            logsState.sort.dir = logsState.sort.dir === 'asc' ? 'desc' : 'asc';
          } else {
            logsState.sort.col = key;
            logsState.sort.dir = key === 'updatedAt' || key === 'createdAt' ? 'desc' : 'asc';
          }
          logsState.page = 0;
          renderLogsView();
        };
      });

      // Wire up row clicks → open spec drawer
      container.querySelectorAll('.logs-row').forEach((row, i) => {
        row.onmouseenter = () => row.style.background = 'var(--bg-surface)';
        row.onmouseleave = () => row.style.background = '';
        row.onclick = () => {
          const r = pageRows[i];
          if (r && r.specPath) openDrawer(r.specPath, slugToTitle(r.name), r.stage);
        };
      });

      // Wire up repo filter
      const repoFilter = document.getElementById('logs-repo-filter');
      if (repoFilter) repoFilter.onchange = () => { logsState.repoFilter = repoFilter.value; logsState.page = 0; renderLogsView(); };

      // Wire up search
      const searchInput = document.getElementById('logs-search-input');
      if (searchInput) {
        searchInput.oninput = () => { logsState.search = searchInput.value; logsState.page = 0; renderLogsView(); };
      }

      // Wire up pagination
      const prevBtn = document.getElementById('logs-prev');
      const nextBtn = document.getElementById('logs-next');
      if (prevBtn) prevBtn.onclick = () => { logsState.page--; renderLogsView(); };
      if (nextBtn) nextBtn.onclick = () => { logsState.page++; renderLogsView(); };
    }

    const FEAT_LIST_PAGE_SIZE = 20;

    function renderFeatureList() {
      const el = document.getElementById('stats-feature-list');
      if (!el) return;
      const features = statsState.filteredFeatures || [];
      const total = features.length;
      const page = statsState.featureListPage;
      const totalPages = Math.max(1, Math.ceil(total / FEAT_LIST_PAGE_SIZE));
      const start = page * FEAT_LIST_PAGE_SIZE;
      const slice = features.slice(start, start + FEAT_LIST_PAGE_SIZE);

      if (total === 0) {
        el.innerHTML = '<div style="color:var(--text-tertiary);font-size:12px;padding:12px 0">No features in this period.</div>';
        return;
      }

      const rows = slice.map(f => {
        const repo = f.repoPath ? f.repoPath.split('/').pop() : '—';
        const date = f.completedAt ? f.completedAt.slice(0, 10) : '—';
        const ctHours = f.durationMs ? Math.round(f.durationMs / 3600000 * 10) / 10 : null;
        const ctClass = ctHours !== null && ctHours > 48 ? ' class="fl-ct-high"' : '';
        const ctStr = ctHours !== null ? ctHours + 'h' : '—';
        const excludeBadge = f.cycleTimeExclude ? '<span class="feat-exclude-badge">excluded</span>' : '';
        const desc = escHtml(f.desc || '');
        return `<tr>
          <td>${escHtml(date)}</td>
          <td>${escHtml(repo)}</td>
          <td class="fl-num">${escHtml(String(f.featureNum || ''))}</td>
          <td class="fl-desc" title="${desc}">${desc}${excludeBadge}</td>
          <td>${escHtml(f.winnerAgent || '—')}</td>
          <td${ctClass}>${ctStr}</td>
        </tr>`;
      }).join('');

      const pagination = totalPages > 1 ? `
        <div class="feat-list-pagination">
          <button class="vol-nav-btn" id="fl-prev" ${page === 0 ? 'disabled' : ''}>&#8592;</button>
          <span>Page ${page + 1} of ${totalPages} &nbsp;·&nbsp; ${total} features</span>
          <button class="vol-nav-btn" id="fl-next" ${page >= totalPages - 1 ? 'disabled' : ''}>&#8594;</button>
        </div>` : `<div class="feat-list-pagination">${total} features</div>`;

      el.innerHTML = `
        <table class="feat-list-table">
          <thead><tr><th>Date</th><th>Repo</th><th>#</th><th>Feature</th><th>Agent</th><th>Cycle Time</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
        ${pagination}`;

      document.getElementById('fl-prev')?.addEventListener('click', () => {
        statsState.featureListPage = Math.max(0, page - 1);
        renderFeatureList();
      });
      document.getElementById('fl-next')?.addEventListener('click', () => {
        statsState.featureListPage = Math.min(totalPages - 1, page + 1);
        renderFeatureList();
      });
    }

    async function renderStatistics() {
      const container = document.getElementById('statistics-view');
      document.getElementById('monitor-summary').style.display = 'none';
      document.getElementById('repo-header').style.display = 'none';
      document.getElementById('repos').style.display = 'none';
      document.getElementById('empty').style.display = 'none';

      if (!statsState.data) {
        container.innerHTML = '<div class="stats-empty-msg">Loading statistics…</div>';
        await loadAnalytics();
      }

      const analytics = statsState.data;

      if (!analytics || statsState.error) {
        container.innerHTML = `<div class="stats-empty-msg">${escHtml(statsState.error || 'Could not load analytics')}</div>`;
        return;
      }

      // Build repo list for filter
      const repoSet = new Set((analytics.features || []).map(f => f.repoPath).filter(Boolean));
      const repos = [...repoSet];

      const html = [];
      html.push('<div class="stats-view">');

      // Toolbar
      html.push('<div class="stats-toolbar">');
      html.push('<label style="font-size:12px;color:var(--text-secondary)">Repo:</label>');
      html.push('<select class="stats-select" id="stats-repo-filter">');
      html.push(`<option value="all"${statsState.repoFilter === 'all' ? ' selected' : ''}>All repos</option>`);
      repos.forEach(r => {
        const display = r.replace(/^\/Users\/[^/]+\//, '~/');
        const sel = statsState.repoFilter === r ? ' selected' : '';
        html.push(`<option value="${escHtml(r)}"${sel}>${escHtml(display)}</option>`);
      });
      html.push('</select>');
      html.push('<label style="font-size:12px;color:var(--text-secondary)">Period:</label>');
      html.push('<select class="stats-select" id="stats-period-filter">');
      [['7d','Last 7 days'],['30d','Last 30 days'],['90d','Last 90 days'],['all','All time']].forEach(([v,l]) => {
        html.push(`<option value="${v}"${statsState.period === v ? ' selected' : ''}>${l}</option>`);
      });
      html.push('</select>');
      html.push('<button class="btn" id="stats-refresh-btn" style="margin-left:auto">Refresh</button>');
      html.push('</div>');

      // Filter features for the selected period + repo
      const filteredFeatures = filterFeaturesByPeriodAndRepo(analytics.features || [], statsState.period, statsState.repoFilter);
      const totalCompleted = filteredFeatures.length;
      const featWithDur = filteredFeatures.filter(f => f.durationMs && f.durationMs > 0 && !f.cycleTimeExclude);
      const durHoursSorted = featWithDur.map(f => f.durationMs / 3600000).sort((a, b) => a - b);
      const ctMid = Math.floor(durHoursSorted.length / 2);
      const medianCycle = durHoursSorted.length > 0
        ? (durHoursSorted.length % 2 ? durHoursSorted[ctMid] : (durHoursSorted[ctMid - 1] + durHoursSorted[ctMid]) / 2)
        : null;
      const avgCycle = featWithDur.length > 0
        ? featWithDur.reduce((s, f) => s + f.durationMs, 0) / featWithDur.length / (1000 * 3600) : null;
      const firstPassFeats = filteredFeatures.filter(f => f.firstPassSuccess !== null);
      const firstPassRate = firstPassFeats.length > 0
        ? firstPassFeats.filter(f => f.firstPassSuccess).length / firstPassFeats.length : null;
      const autonomyFeats = filteredFeatures.filter(f => f.autonomyRatio !== null && f.autonomyRatio !== undefined);
      const avgAutonomy = autonomyFeats.length > 0
        ? autonomyFeats.reduce((s, f) => s + f.autonomyRatio, 0) / autonomyFeats.length : null;

      // Volume cards
      html.push('<div class="stats-section-title">Volume</div>');
      html.push('<div class="stats-cards">');
      const trend30 = analytics.volume && analytics.volume.trend30d;
      html.push(buildStatCard('Features Completed', String(totalCompleted),
        statsState.period === '30d' && trend30 !== null ? trendIcon(trend30) : null));
      html.push(buildStatCard('Cycle Time', fmtHours(medianCycle), null, medianCycle !== null ? 'median, start to close' : null));
      html.push(buildStatCard('Autonomy Score', avgAutonomy !== null ? fmtPct(avgAutonomy) : '—', null));
      html.push(buildStatCard('First-Pass Rate', fmtPct(firstPassRate), null));
      html.push('</div>');

      // Volume trend line chart
      html.push('<div class="volume-chart-wrap">');
      html.push('<div class="volume-chart-header">');
      html.push('<div class="volume-chart-title">Features Completed Over Time</div>');
      html.push('<div style="display:flex;align-items:center;gap:8px">');
      html.push('<span id="vol-nav-controls" style="display:flex;align-items:center;gap:4px">');
      html.push('<button id="vol-nav-prev" class="vol-nav-btn" title="Earlier">&#8592;</button>');
      html.push('<span id="vol-nav-range" style="font-size:11px;color:var(--text-tertiary);min-width:140px;text-align:center"></span>');
      html.push('<button id="vol-nav-next" class="vol-nav-btn" title="Later">&#8594;</button>');
      html.push('</span>');
      html.push('<div class="volume-granularity-btns" style="margin-left:8px">');
      [['daily','Daily'],['weekly','Weekly'],['monthly','Monthly']].forEach(([g,l]) => {
        const active = statsState.volumeGranularity === g ? ' active' : '';
        html.push(`<button class="vol-gran-btn${active}" data-gran="${g}">${l}</button>`);
      });
      html.push('</div>');
      html.push('</div>');
      html.push('</div>');
      html.push('<div style="height:220px;position:relative"><canvas id="volume-chart-canvas"></canvas></div>');
      html.push('</div>');

      // Quality block
      html.push('<div class="stats-row">');
      const quality = analytics.quality || {};
      const dur = quality.durationHours || {};
      html.push('<div class="stats-block">');
      html.push('<div class="stats-block-title">Quality &amp; Speed</div>');
      html.push('<div class="stats-kv-grid">');
      html.push(`<div class="stats-kv"><div class="stats-kv-label">Cycle time (median)</div><div class="stats-kv-val">${fmtHours(medianCycle !== null ? medianCycle : dur.median)}</div></div>`);
      html.push(`<div class="stats-kv"><div class="stats-kv-label">Cycle time (mean)</div><div class="stats-kv-val">${fmtHours(avgCycle !== null ? avgCycle : dur.average)}</div></div>`);
      html.push(`<div class="stats-kv"><div class="stats-kv-label">Max cycle time</div><div class="stats-kv-val">${fmtHours(dur.max)}</div></div>`);
      html.push(`<div class="stats-kv"><div class="stats-kv-label">Avg iterations</div><div class="stats-kv-val">${fmtNum(quality.avgIterationsPerFeature, 1)}</div></div>`);
      html.push('</div>');
      html.push('</div>');
      html.push('</div>'); // end stats-row

      // Cycle time over time chart
      html.push('<div class="volume-chart-wrap">');
      html.push('<div class="volume-chart-header">');
      html.push('<div class="volume-chart-title">Median Cycle Time Over Time</div>');
      html.push('<div style="display:flex;align-items:center;gap:8px">');
      html.push('<span id="ct-nav-controls" style="display:flex;align-items:center;gap:4px">');
      html.push('<button id="ct-nav-prev" class="vol-nav-btn" title="Earlier">&#8592;</button>');
      html.push('<span id="ct-nav-range" style="font-size:11px;color:var(--text-tertiary);min-width:140px;text-align:center"></span>');
      html.push('<button id="ct-nav-next" class="vol-nav-btn" title="Later">&#8594;</button>');
      html.push('</span>');
      html.push('<div class="volume-granularity-btns" style="margin-left:8px">');
      [['daily','Daily'],['weekly','Weekly'],['monthly','Monthly']].forEach(([g,l]) => {
        const active = statsState.volumeGranularity === g ? ' active' : '';
        html.push(`<button class="vol-gran-btn${active}" data-gran="${g}">${l}</button>`);
      });
      html.push('</div>');
      html.push('</div>');
      html.push('</div>');
      html.push('<div style="height:220px;position:relative"><canvas id="cycle-time-chart-canvas"></canvas></div>');
      html.push('</div>');

      // Agent leaderboard — computed from filteredFeatures so repo+period filters apply
      const round1 = v => Math.round(v * 10) / 10;
      const leaderAgentMap = {};
      filteredFeatures.forEach(f => {
        const ag = f.winnerAgent || 'solo';
        if (!leaderAgentMap[ag]) leaderAgentMap[ag] = { completed: 0, durMs: [], autonomyRatios: [], firstPassArr: [] };
        leaderAgentMap[ag].completed++;
        if (f.durationMs && f.durationMs > 0 && !f.cycleTimeExclude) leaderAgentMap[ag].durMs.push(f.durationMs);
        if (f.autonomyRatio !== null) leaderAgentMap[ag].autonomyRatios.push(f.autonomyRatio);
        if (f.firstPassSuccess !== null) leaderAgentMap[ag].firstPassArr.push(f.firstPassSuccess);
      });

      // Filter eval wins by repo
      const evalWinsByRepo = analytics.evalWinsByRepo || [];
      const filteredEvalWins = statsState.repoFilter === 'all'
        ? analytics.evalWins || []
        : (() => {
            const repoEntries = evalWinsByRepo.filter(e => e.repoPath === statsState.repoFilter);
            const agg = {};
            repoEntries.forEach(e => {
              if (!agg[e.agent]) agg[e.agent] = { agent: e.agent, wins: 0, evals: 0 };
              agg[e.agent].wins += e.wins;
              agg[e.agent].evals += e.evals;
            });
            return Object.values(agg).map(e => ({
              ...e, winRate: e.evals > 0 ? Math.round(e.wins / e.evals * 100) / 100 : 0
            }));
          })();

      const evalMap = {};
      filteredEvalWins.forEach(e => { evalMap[e.agent] = e; });
      const totalEvalWins = filteredEvalWins.reduce((s, e) => s + e.wins, 0);

      const allAgentIds = [...new Set([...Object.keys(leaderAgentMap), ...filteredEvalWins.map(e => e.agent)])];

      if (allAgentIds.length > 0) {
        html.push('<div class="stats-section-title" style="margin-top:4px">Agent Leaderboard</div>');
        html.push('<div class="stats-block" style="overflow-x:auto">');
        html.push('<table class="stats-leaderboard">');
        html.push('<thead><tr><th>Agent</th><th>Features</th><th>Eval wins</th><th>Fleet win %</th><th>Autonomy</th><th>Cycle time</th><th>First-pass</th></tr></thead>');
        html.push('<tbody>');

        allAgentIds
          .sort((a, b) => (leaderAgentMap[b] || { completed: 0 }).completed - (leaderAgentMap[a] || { completed: 0 }).completed)
          .forEach(agentId => {
            const d = leaderAgentMap[agentId] || { completed: 0, durMs: [], autonomyRatios: [], firstPassArr: [] };
            const ev = evalMap[agentId];
            const sortedDur = d.durMs.slice().sort((a, b) => a - b);
            const ldrMid = Math.floor(sortedDur.length / 2);
            const avgCycle = sortedDur.length > 0
              ? round1(sortedDur.length % 2 ? sortedDur[ldrMid] / 3600000 : (sortedDur[ldrMid - 1] + sortedDur[ldrMid]) / 2 / 3600000)
              : null;
            const autoScore = d.autonomyRatios.length > 0 ? d.autonomyRatios.reduce((s, v) => s + v, 0) / d.autonomyRatios.length : null;
            const fpRate = d.firstPassArr.length > 0 ? d.firstPassArr.filter(Boolean).length / d.firstPassArr.length : null;
            // Share of total eval wins (sums to 100% across agents)
            const winShare = ev && totalEvalWins > 0 ? ev.wins / totalEvalWins : null;
            html.push('<tr>');
            html.push(`<td><span class="agent-mono">${escHtml(agentId)}</span></td>`);
            html.push(`<td>${d.completed}</td>`);
            html.push(`<td>${ev ? ev.wins : '—'}</td>`);
            html.push(`<td>${winShare !== null ? `<span class="win-rate">${fmtPct(winShare)}</span>` : '—'}</td>`);
            html.push(`<td>${fmtPct(autoScore)}</td>`);
            html.push(`<td>${fmtHours(avgCycle)}</td>`);
            html.push(`<td>${fmtPct(fpRate)}</td>`);
            html.push('</tr>');
          });
        html.push('</tbody></table>');
        html.push('</div>');
      }

      if (totalCompleted === 0 && allAgentIds.length === 0) {
        html.push('<div class="stats-empty-msg">No completed features found. Statistics will appear here once features are closed.</div>');
      }

      // Feature list section (populated after render via renderFeatureList)
      html.push('<div class="stats-section-title" style="margin-top:4px">Features</div>');
      html.push('<div class="stats-block" style="overflow-x:auto"><div id="stats-feature-list"></div></div>');

      html.push('</div>'); // end stats-view

      // Store filtered features for pagination (avoids re-rendering charts on page change)
      statsState.filteredFeatures = filteredFeatures.slice().sort((a, b) => {
        const ta = a.completedAt ? new Date(a.completedAt).getTime() : 0;
        const tb = b.completedAt ? new Date(b.completedAt).getTime() : 0;
        return tb - ta;
      });

      container.innerHTML = html.join('');

      // Render Chart.js charts into canvases now that they're in the DOM
      const volSeries = buildVolumeSeries(filteredFeatures, statsState.volumeGranularity);
      renderVolumeChart(volSeries, statsState.volumeGranularity);

      const ctSeries = buildCycleTimeSeries(filteredFeatures, statsState.volumeGranularity);
      renderCycleTimeChart(ctSeries, statsState.volumeGranularity);

      // Wire up controls
      const repoSel = document.getElementById('stats-repo-filter');
      if (repoSel) repoSel.onchange = () => {
        statsState.repoFilter = repoSel.value;
        statsState.volumeWindowEnd = null;
        statsState.cycleTimeWindowEnd = null;
        statsState.featureListPage = 0;
        saveStatsPrefs();
        renderStatistics();
      };

      const periodSel = document.getElementById('stats-period-filter');
      if (periodSel) periodSel.onchange = () => {
        statsState.period = periodSel.value;
        statsState.volumeWindowEnd = null;
        statsState.cycleTimeWindowEnd = null;
        statsState.featureListPage = 0;
        saveStatsPrefs();
        renderStatistics();
      };

      const refreshBtn = document.getElementById('stats-refresh-btn');
      if (refreshBtn) refreshBtn.onclick = async () => {
        statsState.data = null;
        container.innerHTML = '<div class="stats-empty-msg">Loading…</div>';
        // force=1 busts the server-side analytics cache (picks up backfill changes)
        try {
          const res = await fetch('/api/analytics?force=1', { cache: 'no-store' });
          if (!res.ok) throw new Error('HTTP ' + res.status);
          statsState.data = await res.json();
          statsState.error = null;
        } catch (e) {
          statsState.error = e.message;
        }
        statsState.loading = false;
        renderStatistics();
      };

      // Volume granularity buttons — reset both windows on change
      document.querySelectorAll('.vol-gran-btn').forEach(btn => {
        btn.onclick = () => {
          statsState.volumeGranularity = btn.dataset.gran;
          statsState.volumeWindowEnd = null;
          statsState.cycleTimeWindowEnd = null;
          saveStatsPrefs();
          renderStatistics();
        };
      });

      // Volume nav buttons
      document.getElementById('vol-nav-prev')?.addEventListener('click', () => panVolumeChart('prev'));
      document.getElementById('vol-nav-next')?.addEventListener('click', () => panVolumeChart('next'));

      // Cycle time nav buttons
      document.getElementById('ct-nav-prev')?.addEventListener('click', () => panCycleTimeChart('prev'));
      document.getElementById('ct-nav-next')?.addEventListener('click', () => panCycleTimeChart('next'));

      // Feature list
      renderFeatureList();
    }

    // ── Main render dispatch ───────────────────────────────────────────────────

    async function renderSessions() {
      const container = document.getElementById('sessions-view');
      container.innerHTML = '<div style="padding:12px 0;color:var(--text-tertiary);font-size:12px">Loading sessions…</div>';

      let sessions = [];
      let orphanCount = 0;
      try {
        const res = await fetch('/api/sessions');
        const data = await res.json();
        sessions = data.sessions || [];
        orphanCount = data.orphanCount || 0;
      } catch (e) {
        container.innerHTML = '<div class="empty">Failed to load sessions: ' + escHtml(e.message) + '</div>';
        return;
      }

      container.innerHTML = '';

      // Toolbar
      const toolbar = document.createElement('div');
      toolbar.className = 'sessions-toolbar';
      toolbar.innerHTML = '<strong style="font-size:15px;font-weight:600;letter-spacing:-.01em">Tmux Sessions</strong>' +
        '<span style="font-size:12px;color:var(--text-tertiary)">' + sessions.length + ' session' + (sessions.length === 1 ? '' : 's') + '</span>' +
        (orphanCount > 0 ? '<button class="btn btn-warn" id="sessions-kill-orphans-btn" style="font-size:11px;padding:4px 10px">Kill ' + orphanCount + ' Orphan' + (orphanCount === 1 ? '' : 's') + '</button>' : '') +
        '<button class="btn" id="sessions-refresh-btn" style="margin-left:auto">↺ Refresh</button>';
      container.appendChild(toolbar);
      document.getElementById('sessions-refresh-btn').onclick = () => renderSessions();
      const killOrphansBtn = document.getElementById('sessions-kill-orphans-btn');
      if (killOrphansBtn) {
        killOrphansBtn.onclick = async () => {
          if (!confirm('Kill all ' + orphanCount + ' orphaned session' + (orphanCount === 1 ? '' : 's') + '?')) return;
          try {
            const r = await fetch('/api/sessions/cleanup', { method: 'POST' });
            const d = await r.json();
            showToast('Killed ' + (d.count || 0) + ' orphan' + (d.count === 1 ? '' : 's'));
          } catch (e) { showToast('Cleanup failed: ' + e.message); }
          renderSessions();
        };
      }

      if (sessions.length === 0) {
        container.innerHTML += '<div class="empty">No tmux sessions running.</div>';
        return;
      }

      // Group: dashboard, orphaned, agent
      const dashSessions = sessions.filter(s => s.name.startsWith('aigon-dash-'));
      const orphanSessions = sessions.filter(s => !s.name.startsWith('aigon-dash-') && s.orphan);
      const agentSessions = sessions.filter(s => !s.name.startsWith('aigon-dash-') && !s.orphan);

      function entityBadge(s) {
        if (!s.entityType) return '';
        const label = s.entityType + s.entityId;
        const cls = s.entityType === 'f' ? 'feature' : 'research';
        return '<span class="session-entity-badge ' + cls + '">' + escHtml(label) + '</span>';
      }

      function statusBadge(s) {
        if (s.orphan) {
          const reasonLabels = { done: 'feature done', paused: 'feature paused', 'spec-missing': 'spec deleted' };
          const label = reasonLabels[s.orphan.reason] || 'orphan';
          const entity = s.entityType && s.entityId ? ' — ' + s.entityType.toUpperCase() + s.entityId : '';
          const tip = s.orphan.reason === 'done' ? 'This session\'s feature has been completed'
            : s.orphan.reason === 'paused' ? 'This session\'s feature is paused'
            : s.orphan.reason === 'spec-missing' ? 'No spec file found for this session\'s feature'
            : 'Session has no active feature';
          return '<span class="session-orphan-badge" title="' + escHtml(tip + entity) + '">' + label + entity + '</span>';
        }
        if (s.attached) return '<span class="session-attached-badge">attached</span>';
        return '';
      }

      function renderGroup(title, items, opts) {
        if (items.length === 0) return;
        const group = document.createElement('div');
        group.className = 'sessions-group';
        const titleCls = 'sessions-group-title' + (opts && opts.orphan ? ' orphan-title' : '');
        group.innerHTML = '<div class="' + titleCls + '">' + escHtml(title) + ' (' + items.length + ')</div>';
        items.forEach(s => {
          const row = document.createElement('div');
          const rowCls = 'session-row' + (s.attached ? ' attached' : '') + (s.orphan ? ' orphan' : '');
          row.className = rowCls;
          const age = relTime(s.createdAt);
          row.innerHTML =
            '<span class="session-name" title="' + escHtml(s.name) + '">' + escHtml(s.name) + '</span>' +
            entityBadge(s) +
            statusBadge(s) +
            '<span class="session-meta">' + age + '</span>' +
            '<span style="display:flex;gap:5px">' +
              '<button class="btn btn-primary" style="font-size:11px;padding:3px 8px" data-session="' + escHtml(s.name) + '">Attach</button>' +
              '<button class="btn btn-warn" style="font-size:11px;padding:3px 8px" data-kill="' + escHtml(s.name) + '">Kill</button>' +
            '</span>';

          row.querySelector('[data-session]').onclick = async (e) => {
            e.stopPropagation();
            openTerminalPanel(s.name, '', s.name);
          };
          row.querySelector('[data-kill]').onclick = async (e) => {
            e.stopPropagation();
            if (!confirm('Kill session "' + s.name + '"?')) return;
            await fetch('/api/session/stop', {
              method: 'POST', headers: { 'content-type': 'application/json' },
              body: JSON.stringify({ sessionName: s.name })
            });
            showToast('Killed: ' + s.name);
            renderSessions();
          };
          group.appendChild(row);
        });
        container.appendChild(group);
      }

      renderGroup('Dashboard Sessions', dashSessions);
      renderGroup('Orphaned Sessions', orphanSessions, { orphan: true });
      renderGroup('Agent Sessions', agentSessions);
    }

    function render() {
      updateViewTabs();
      const sidebar = document.getElementById('repo-sidebar');
      const mobileSelect = document.getElementById('repo-select-mobile');
      if (state.view === 'settings') {
        sidebar.style.display = 'none';
        mobileSelect.style.display = 'none';
        document.getElementById('sessions-view').style.display = 'none';
        document.getElementById('statistics-view').style.display = 'none';
        document.getElementById('logs-view').style.display = 'none';
        document.getElementById('repos').style.display = '';
        document.getElementById('repo-header').style.display = 'none';
        renderSettings();
      } else if (state.view === 'sessions') {
        sidebar.style.display = 'none';
        mobileSelect.style.display = 'none';
        document.getElementById('repos').style.display = 'none';
        document.getElementById('empty').style.display = 'none';
        document.getElementById('sessions-view').style.display = '';
        document.getElementById('statistics-view').style.display = 'none';
        document.getElementById('logs-view').style.display = 'none';
        document.getElementById('repo-header').style.display = 'none';
        renderSessions();
      } else if (state.view === 'statistics') {
        sidebar.style.display = 'none';
        mobileSelect.style.display = 'none';
        document.getElementById('repos').style.display = 'none';
        document.getElementById('empty').style.display = 'none';
        document.getElementById('sessions-view').style.display = 'none';
        document.getElementById('statistics-view').style.display = '';
        document.getElementById('logs-view').style.display = 'none';
        document.getElementById('repo-header').style.display = 'none';
        renderStatistics();
      } else if (state.view === 'logs') {
        sidebar.style.display = 'none';
        mobileSelect.style.display = 'none';
        document.getElementById('repos').style.display = 'none';
        document.getElementById('empty').style.display = 'none';
        document.getElementById('sessions-view').style.display = 'none';
        document.getElementById('statistics-view').style.display = 'none';
        document.getElementById('logs-view').style.display = '';
        document.getElementById('repo-header').style.display = 'none';
        renderLogsView();
      } else {
        // monitor or pipeline — Alpine components handle the view content
        sidebar.style.display = '';
        mobileSelect.style.display = '';
        document.getElementById('repos').style.display = 'none'; // settings only
        document.getElementById('empty').style.display = 'none';
        document.getElementById('sessions-view').style.display = 'none';
        document.getElementById('statistics-view').style.display = 'none';
        document.getElementById('logs-view').style.display = 'none';
        // Sidebar + header are shared between monitor and pipeline
        const allRepos = ((state.data || {}).repos || []);
        renderSidebar(allRepos);
        const selectedRepoData = state.selectedRepo !== 'all' ? allRepos.find(r => r.path === state.selectedRepo) : null;
        renderRepoHeader(selectedRepoData);
        setHealth();
        updateTitleAndFavicon(((state.data || {}).summary || {}).waiting || 0);
        document.getElementById('updated-text').textContent = 'Updated ' + relTime((state.data || {}).generatedAt || new Date().toISOString());
        // Alpine reactively renders #monitor-view and #pipeline-view based on state.view
      }
    }

    function refreshTimestamps() {
      document.querySelectorAll('[data-updated]').forEach(n => { n.textContent = relTime(n.getAttribute('data-updated')); });
      const generatedAt = (state.data && state.data.generatedAt) ? state.data.generatedAt : new Date().toISOString();
      document.getElementById('updated-text').textContent = 'Updated ' + relTime(generatedAt);
    }

    function flattenStatuses(data) {
      const map = new Map();
      (data.repos || []).forEach(repo => {
        (repo.features || []).forEach(feature => {
          (feature.agents || []).forEach(agent => {
            map.set(repo.path + ':' + feature.id + ':' + agent.id, { status: agent.status, cmd: agent.slashCommand });
          });
        });
      });
      return map;
    }

    async function poll() {
      const previous = flattenStatuses(state.data || {});
      try {
        const res = await fetch('/api/status', { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const next = await res.json();
        state.failures = 0;
        const current = flattenStatuses(next);
        current.forEach((v, k) => {
          const prev = previous.get(k);
          if (!prev) return;
          if (prev.status !== 'waiting' && v.status === 'waiting') {
            showToast('Agent is waiting', v.cmd ? 'Copy command' : null, v.cmd ? () => copyText(v.cmd).then(() => showToast('Copied: ' + v.cmd)) : null);
          }
          if (prev.status !== 'error' && v.status === 'error') showToast('Agent entered error state', null, null, {error:true});
        });
        state.data = next;
        render();
      } catch (e) {
        state.failures += 1;
        setHealth();
      }
    }

    // ── Init ──────────────────────────────────────────────────────────────────

    render();
    document.getElementById('refresh-btn').onclick = requestRefresh;
    setInterval(refreshTimestamps, TS_MS);
    setInterval(poll, POLL_MS);
    setTimeout(poll, 400);

    document.querySelectorAll('.view-tab').forEach(tab => {
      tab.onclick = () => {
        state.view = tab.getAttribute('data-view');
        localStorage.setItem(lsKey('view'), state.view);
        render();
      };
    });

    // ── Notification bell & dropdown ─────────────────────────────────────────

    const notifBellBtn = document.getElementById('notif-bell-btn');
    const notifBadge = document.getElementById('notif-badge');
    const notifDropdown = document.getElementById('notif-dropdown');
    const notifOverlay = document.getElementById('notif-overlay');
    const notifList = document.getElementById('notif-list');
    const notifCloseBtn = document.getElementById('notif-close-btn');

    const NOTIF_TYPE_LABELS_DISPLAY = {
      'agent-waiting': 'Waiting',
      'agent-submitted': 'Submitted',
      'all-submitted': 'All Submitted',
      'all-research-submitted': 'Research Done',
      'error': 'Error'
    };

    function relTimeShort(iso) {
      const diff = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
      if (diff < 60) return 'just now';
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
      return Math.floor(diff / 86400) + 'd ago';
    }

    function renderNotifList(events) {
      if (!events || events.length === 0) {
        notifList.innerHTML = '<div class="notif-empty">No notifications yet</div>';
        return;
      }
      notifList.innerHTML = '';
      [...events].reverse().forEach(ev => {
        const item = document.createElement('div');
        item.className = 'notif-item' + (ev.read ? '' : ' unread');
        item.style.cursor = 'pointer';
        const typeLabel = NOTIF_TYPE_LABELS_DISPLAY[ev.type] || ev.type;
        item.innerHTML =
          '<div class="notif-item-type ' + ev.type + '">' + escHtml(typeLabel) + '</div>' +
          '<div class="notif-item-msg">' + escHtml(ev.message) + '</div>' +
          '<div class="notif-item-time">' + relTimeShort(ev.timestamp) + '</div>';
        item.onclick = () => {
          closeNotifDropdown();
          state.view = 'monitor';
          localStorage.setItem(lsKey('view'), 'monitor');
          render();
        };
        notifList.appendChild(item);
      });
    }

    function updateBadge(count) {
      if (count > 0) {
        notifBadge.textContent = count > 99 ? '99+' : String(count);
        notifBadge.removeAttribute('data-hidden');
      } else {
        notifBadge.setAttribute('data-hidden', '');
      }
    }

    async function loadNotifications() {
      try {
        const r = await fetch('/api/notifications');
        if (!r.ok) return;
        const data = await r.json();
        updateBadge(data.unreadCount || 0);
        return data.events || [];
      } catch (_) { return []; }
    }

    async function openNotifDropdown() {
      const events = await loadNotifications();
      renderNotifList(events);
      notifDropdown.classList.add('open');
      notifOverlay.classList.add('open');
      // Mark all as read
      try { await fetch('/api/notifications/read', { method: 'POST' }); } catch (_) {}
      updateBadge(0);
    }

    function closeNotifDropdown() {
      notifDropdown.classList.remove('open');
      notifOverlay.classList.remove('open');
    }

    notifBellBtn.onclick = () => {
      if (notifDropdown.classList.contains('open')) closeNotifDropdown();
      else openNotifDropdown();
    };
    notifCloseBtn.onclick = closeNotifDropdown;
    notifOverlay.onclick = closeNotifDropdown;

    // Poll badge count every 30s without opening the dropdown
    setInterval(async () => {
      if (!notifDropdown.classList.contains('open')) {
        await loadNotifications();
      }
    }, 30000);
    // Initial badge check
    loadNotifications();
  </script>
</body>
</html>`;
