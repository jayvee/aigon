      await launchAiSession(drawerState.path, drawerState.title || 'spec', repoPath, specCtx);
    };

    document.getElementById('drawer-open-editor').onclick = async () => {
      try {
        await fetch('/api/open-in-editor', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ path: drawerState.path })
        });
      } catch (e) {
        showToast('Could not open editor: ' + e.message, null, null, {error:true});
      }
    };

    // Fullscreen toggle
    function toggleDrawerFullscreen() {
      drawerEl.classList.toggle('fullscreen');
      const btn = document.getElementById('drawer-fullscreen');
      btn.textContent = drawerEl.classList.contains('fullscreen') ? '⤡' : '⤢';
    }
    document.getElementById('drawer-fullscreen').onclick = toggleDrawerFullscreen;

    // Keyboard shortcuts for drawer
    document.addEventListener('keydown', (e) => {
      if (!drawerEl.classList.contains('open')) return;
      if (e.key === 'Escape') { closeDrawer(); return; }
      // Cmd+S to save
      if ((e.metaKey || e.ctrlKey) && e.key === 's') {
        e.preventDefault();
        saveDrawer();
        return;
      }
      // Cmd+Shift+E to toggle read/edit mode
      if ((e.metaKey || e.ctrlKey) && e.shiftKey && e.key === 'e') {
        e.preventDefault();
        setDrawerMode(drawerState.mode === 'read' ? 'edit' : 'read');
        return;
      }
      // Cmd+Shift+F to toggle fullscreen
      if ((e.metaKey || e.ctrlKey) && e.shiftKey && e.key === 'f') {
        e.preventDefault();
        toggleDrawerFullscreen();
      }
    });

    // ── Shared render helpers ─────────────────────────────────────────────────

    function updateTitleAndFavicon(waiting){
      document.title = waiting > 0 ? '(' + waiting + ') Aigon Dashboard' : 'Aigon Dashboard';
      const link = document.querySelector('link[rel="icon"]') || (() => { const x = document.createElement('link'); x.rel = 'icon'; document.head.appendChild(x); return x; })();
      if (!waiting) { link.href = 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2232%22 height=%2232%22></svg>'; return; }
      const c = document.createElement('canvas'); c.width = 32; c.height = 32;
      const ctx = c.getContext('2d');
      ctx.fillStyle = '#111113'; ctx.fillRect(0,0,32,32);
      ctx.fillStyle = '#f59e0b'; ctx.beginPath(); ctx.arc(16,16,13,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff'; ctx.font = 'bold 16px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(String(waiting > 99 ? '99+' : waiting), 16, 16);
      link.href = c.toDataURL('image/png');
    }

    function setHealth() {
      const dot = document.getElementById('health-dot');
      const text = document.getElementById('health-text');
      if (state.failures === 0) { dot.style.background = '#22c55e'; text.textContent = 'Connected'; return; }
      if (state.failures < 3) { dot.style.background = '#f59e0b'; text.textContent = 'Reconnecting...'; return; }
      dot.style.background = '#ef4444'; text.textContent = 'Disconnected';
    }

    function updateViewTabs() {
      document.querySelectorAll('.view-tab').forEach(tab => {
        tab.classList.toggle('active', tab.getAttribute('data-view') === state.view);
      });
    }

    function getVisibleRepos(data) {
      if (!data || !data.repos) return [];
      if (state.selectedRepo === 'all') return data.repos;
      return data.repos.filter(r => r.path === state.selectedRepo);
    }

    // ── Monitor view ──────────────────────────────────────────────────────────

    function renderMonitorTypeToggle(container) {
      const existing = container.querySelector('.monitor-toolbar');
      if (existing) existing.remove();

      const toolbar = document.createElement('div');
      toolbar.className = 'monitor-toolbar pipeline-toolbar';

      const toggle = document.createElement('div');
      toggle.className = 'pipeline-type-toggle';
      const monitorType = state.monitorType || 'all';
      [{ key: 'all', label: 'All' }, { key: 'features', label: 'Features' }, { key: 'research', label: 'Research' }, { key: 'feedback', label: 'Feedback' }].forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'toggle-btn' + (monitorType === opt.key ? ' active' : '');
        btn.textContent = opt.label;
        btn.onclick = () => {
          state.monitorType = opt.key;
          localStorage.setItem('aigon.dashboard.monitorType', opt.key);
          render();
        };
        toggle.appendChild(btn);
      });
      toolbar.appendChild(toggle);
      container.prepend(toolbar);
    }

    function renderMonitor() {
      const summaryEl = document.getElementById('monitor-summary');
      summaryEl.style.display = '';
      const data = state.data || { repos: [], summary: { implementing: 0, waiting: 0, submitted: 0, error: 0 } };
      const allRepos = data.repos || [];
      const visibleRepos = getVisibleRepos(data);
      const monitorType = state.monitorType || 'all';

      // Render type toggle
      const detailArea = document.querySelector('.detail-area') || document.getElementById('detail-area');
      renderMonitorTypeToggle(detailArea);

      // Compute summary for visible repos only
      let summary;
      if (state.selectedRepo === 'all') {
        summary = data.summary || { implementing: 0, waiting: 0, submitted: 0, error: 0 };
      } else {
        summary = { implementing: 0, waiting: 0, submitted: 0, error: 0 };
        const itemTypes = monitorType === 'all' ? ['features', 'research', 'feedback'] : [monitorType];
        visibleRepos.forEach(repo => {
          itemTypes.forEach(t => {
            (repo[t] || []).forEach(item => {
              (item.agents || []).forEach(a => {
                if (summary[a.status] !== undefined) summary[a.status]++;
              });
            });
          });
        });
      }

      summaryEl.innerHTML =
        '<button class="pill pill-filter' + (state.filter === 'all' ? ' active' : '') + '" data-filter="all">All</button>' +
        '<button class="pill pill-filter' + (state.filter === 'implementing' ? ' active' : '') + '" data-filter="implementing">' + summary.implementing + ' implementing</button>' +
        '<button class="pill pill-filter waiting' + (state.filter === 'waiting' ? ' active' : '') + '" data-filter="waiting">' + summary.waiting + ' waiting</button>' +
        '<button class="pill pill-filter' + (state.filter === 'submitted' ? ' active' : '') + '" data-filter="submitted">' + summary.submitted + ' submitted</button>' +
        '<button class="pill pill-filter' + (state.filter === 'error' ? ' active' : '') + '" data-filter="error">' + summary.error + ' error</button>';
      updateTitleAndFavicon((data.summary || {}).waiting || 0);
      setHealth();
      document.getElementById('updated-text').textContent = 'Updated ' + relTime(data.generatedAt || new Date().toISOString());

      // Render sidebar from all repos (always show full list)
      renderSidebar(allRepos);

      // Render header bar for selected repo
      const selectedRepoData = state.selectedRepo !== 'all' ? allRepos.find(r => r.path === state.selectedRepo) : null;
      renderRepoHeader(selectedRepoData);

      const reposRoot = document.getElementById('repos');
      const empty = document.getElementById('empty');
      reposRoot.className = 'repos' + (state.selectedRepo !== 'all' ? ' single-repo' : '');
      reposRoot.innerHTML = '';

      if (visibleRepos.length === 0) {
        empty.style.display = '';
        empty.textContent = state.selectedRepo === 'all'
          ? 'No repos registered. Run: aigon conductor add'
          : 'No data for selected repo.';
        return;
      }

      empty.style.display = 'none';
      let visibleItemCount = 0;
      visibleRepos.forEach(repo => {
        const section = document.createElement('section');
        section.className = 'repo' + (state.collapsed[repo.path] ? ' collapsed' : '');
        const showFeatures = monitorType === 'all' || monitorType === 'features';
        const showResearch = monitorType === 'all' || monitorType === 'research';
        const showFeedback = monitorType === 'all' || monitorType === 'feedback';
        const rawFeatures = showFeatures ? [...(repo.features || [])].filter(f => f.stage === 'in-progress' || f.stage === 'in-evaluation').sort((a, b) => featureRank(a) - featureRank(b) || Number(a.id) - Number(b.id)) : [];
        const features = rawFeatures.filter(f => state.filter === 'all' || f.agents.some(a => a.status === state.filter));
        const rawResearch = showResearch ? [...(repo.research || [])].filter(r => r.stage === 'in-progress').sort((a, b) => featureRank(a) - featureRank(b) || Number(a.id) - Number(b.id)) : [];
        const research = rawResearch.filter(r => state.filter === 'all' || r.agents.some(a => a.status === state.filter));
        const rawFeedback = showFeedback ? [...(repo.feedback || [])].filter(f => f.stage === 'in-progress').sort((a, b) => featureRank(a) - featureRank(b) || Number(a.id) - Number(b.id)) : [];
        const feedback = rawFeedback.filter(f => state.filter === 'all' || (f.agents || []).some(a => a.status === state.filter));
        const totalItems = features.length + research.length + feedback.length;
        visibleItemCount += totalItems;
        const waitingCards = features.filter(f => f.agents.some(a => a.status === 'waiting')).length + research.filter(r => r.agents.some(a => a.status === 'waiting')).length + feedback.filter(f => (f.agents || []).some(a => a.status === 'waiting')).length;
        const headerParts = [];
        if (features.length > 0) headerParts.push(features.length + ' feature' + (features.length === 1 ? '' : 's'));
        if (research.length > 0) headerParts.push(research.length + ' research');
        if (feedback.length > 0) headerParts.push(feedback.length + ' feedback');
        const headerText = headerParts.join(', ') || '0 items';
        section.innerHTML = '<div class="repo-h"><strong>' + escHtml(repo.displayPath) + '</strong><span>' + headerText + (waitingCards ? ' • ' + waitingCards + ' waiting' : '') + ' <span aria-label="Toggle">' + (state.collapsed[repo.path] ? '[+]' : '[-]') + '</span></span></div><div class="repo-b"></div>';
        section.querySelector('.repo-h').onclick = () => {
          state.collapsed[repo.path] = !state.collapsed[repo.path];
          localStorage.setItem('aigon.dashboard.collapsed', JSON.stringify(state.collapsed));
          render();
        };
        const body = section.querySelector('.repo-b');
        if (totalItems === 0) {
          body.innerHTML = '<div class="empty">No items in progress.</div>';
        } else {
          features.forEach(feature => {
            const hasWaiting = feature.agents.some(a => a.status === 'waiting');
            const isEval = feature.stage === 'in-evaluation';
            const card = document.createElement('article');
            card.className = 'card' + (hasWaiting ? ' waiting' : '') + (isEval ? ' evaluating' : '');
            const rows = [...feature.agents].sort((a, b) => statusRank(a.status) - statusRank(b.status) || a.id.localeCompare(b.id));
            const nextActions = feature.nextActions && feature.nextActions.length > 0
              ? feature.nextActions
              : (feature.nextAction && feature.nextAction.command ? [{ command: feature.nextAction.command, label: 'Run', reason: feature.nextAction.reason || '', mode: 'fire-and-forget' }] : []);
            let nextBtn = '';
            if (nextActions.length > 0) {
              const primary = nextActions[0];
              const extras = nextActions.slice(1);
              const dropdownHtml = extras.length > 0
                ? '<button class="btn btn-primary run-next-chevron" aria-haspopup="true" title="More actions">▾</button>' +
                  '<div class="run-next-dropdown" role="menu">' +
                  extras.map(a => '<button class="dropdown-item" data-command="' + escHtml(a.command) + '" data-mode="' + escHtml(a.mode) + '">' +
                    '<span class="item-label">' + escHtml(a.label) + '</span>' +
                    '<code class="item-command">' + escHtml(a.command) + '</code>' +
                    '<span class="item-reason">' + escHtml(a.reason) + '</span>' +
                    '</button>').join('') + '</div>'
                : '';
              nextBtn = '<span class="run-next-group">' +
                '<button class="btn btn-primary run-next-primary" data-command="' + escHtml(primary.command) + '" data-mode="' + escHtml(primary.mode) + '" data-repo="' + escHtml(repo.path) + '" title="' + escHtml(primary.command) + ' — ' + escHtml(primary.reason) + '">' + escHtml(primary.label) + '</button>' +
                dropdownHtml + '</span>';
            }
            const evalBadge = isEval ? '<span class="eval-badge' + (feature.evalStatus === 'pick winner' ? ' pick-winner' : '') + '">' + escHtml(feature.evalStatus || 'evaluating') + '</span>' : '';
            card.innerHTML = '<div class="card-h"><span class="feature">' + (feature.id ? '#' + escHtml(feature.id) + ' ' : '') + escHtml(feature.name) + evalBadge + '</span><span class="head-actions">' + nextBtn + '</span></div><div class="rows"></div>';
            const rowsEl = card.querySelector('.rows');
            rows.forEach(agent => {
              const row = document.createElement('div');
              row.className = 'row ' + agent.status;
              const waitingCmd = agent.slashCommand
                ? '<button class="copy btn" data-copy="' + escHtml(agent.slashCommand) + '">Copy cmd</button>'
                : '';
              const attachBtn = agent.tmuxRunning
                ? '<button class="attach btn btn-primary" data-repo="' + escHtml(repo.path) + '" data-feature="' + escHtml(feature.id) + '" data-agent="' + escHtml(agent.id) + '" data-session="' + escHtml(agent.tmuxSession || '') + '">Attach</button>'
                : '';
              row.innerHTML = '<span class="agent">' + escHtml(agent.id) + '</span><span class="status ' + escHtml(agent.status) + '"><span class="dot"></span>' + escHtml(agent.status) + '</span><span class="stamp" data-updated="' + escHtml(agent.updatedAt) + '">' + relTime(agent.updatedAt) + '</span><span class="row-actions">' + waitingCmd + attachBtn + '</span>';
              rowsEl.appendChild(row);
            });
            // Click card to open spec drawer
            if (feature.specPath) {
              card.style.cursor = 'pointer';
              card.addEventListener('click', (e) => {
                if (e.target.closest('button') || e.target.closest('.btn')) return;
                const name = (feature.id ? '#' + feature.id + ' ' : '') + feature.name;
                openDrawer(feature.specPath, name, feature.stage);
              });
            }
            body.appendChild(card);
          });
          research.forEach(item => {
            const hasWaiting = item.agents.some(a => a.status === 'waiting');
            const allSubmitted = item.agents.length > 0 && item.agents.every(a => a.status === 'submitted');
            const card = document.createElement('article');
            card.className = 'card research' + (hasWaiting ? ' waiting' : '');
            const rows = [...item.agents].sort((a, b) => statusRank(a.status) - statusRank(b.status) || a.id.localeCompare(b.id));
            const synthBadge = allSubmitted ? '<span class="research-badge all-submitted">ready to synthesize</span>' : '<span class="research-badge">research</span>';
            const synthCmd = allSubmitted ? '/ars ' + String(item.id).padStart(2, '0') : null;
            const synthBtn = synthCmd ? '<button class="copy btn btn-primary next-copy" data-copy="' + escHtml(synthCmd) + '" title="All agents submitted — synthesize findings">Copy next</button>' : '';
            card.innerHTML = '<div class="card-h"><span class="feature">' + (item.id ? 'R#' + escHtml(item.id) + ' ' : '') + escHtml(item.name) + synthBadge + '</span><span class="head-actions">' + synthBtn + '</span></div><div class="rows"></div>';
            const rowsEl = card.querySelector('.rows');
            rows.forEach(agent => {
              const row = document.createElement('div');
              row.className = 'row ' + agent.status;
              const waitingCmd = agent.slashCommand
                ? '<button class="copy btn" data-copy="' + escHtml(agent.slashCommand) + '">Copy cmd</button>'
                : '';
              const attachBtn = agent.tmuxRunning
                ? '<button class="attach btn btn-primary" data-repo="' + escHtml(repo.path) + '" data-feature="' + escHtml(item.id) + '" data-agent="' + escHtml(agent.id) + '">Attach</button>'
                : '';
              row.innerHTML = '<span class="agent">' + escHtml(agent.id) + '</span><span class="status ' + escHtml(agent.status) + '"><span class="dot"></span>' + escHtml(agent.status) + '</span><span class="stamp" data-updated="' + escHtml(agent.updatedAt) + '">' + relTime(agent.updatedAt) + '</span><span class="row-actions">' + waitingCmd + attachBtn + '</span>';
              rowsEl.appendChild(row);
            });
            // Click card to open spec drawer
            if (item.specPath) {
              card.style.cursor = 'pointer';
              card.addEventListener('click', (e) => {
                if (e.target.closest('button') || e.target.closest('.btn')) return;
                const name = (item.id ? 'R#' + item.id + ' ' : '') + item.name;
                openDrawer(item.specPath, name, 'in-progress');
              });
            }
            body.appendChild(card);
          });
          feedback.forEach(item => {
            const hasWaiting = (item.agents || []).some(a => a.status === 'waiting');
            const card = document.createElement('article');
            card.className = 'card feedback' + (hasWaiting ? ' waiting' : '');
            const rows = [...(item.agents || [])].sort((a, b) => statusRank(a.status) - statusRank(b.status) || a.id.localeCompare(b.id));
            card.innerHTML = '<div class="card-h"><span class="feature">' + (item.id ? 'FB#' + escHtml(item.id) + ' ' : '') + escHtml(item.name) + '<span class="research-badge">feedback</span></span></div><div class="rows"></div>';
            const rowsEl = card.querySelector('.rows');
            rows.forEach(agent => {
              const row = document.createElement('div');
              row.className = 'row ' + agent.status;
              const waitingCmd = agent.slashCommand
                ? '<button class="copy btn" data-copy="' + escHtml(agent.slashCommand) + '">Copy cmd</button>'
                : '';
              const attachBtn = agent.tmuxRunning
                ? '<button class="attach btn btn-primary" data-repo="' + escHtml(repo.path) + '" data-feature="' + escHtml(item.id) + '" data-agent="' + escHtml(agent.id) + '">Attach</button>'
                : '';
              row.innerHTML = '<span class="agent">' + escHtml(agent.id) + '</span><span class="status ' + escHtml(agent.status) + '"><span class="dot"></span>' + escHtml(agent.status) + '</span><span class="stamp" data-updated="' + escHtml(agent.updatedAt) + '">' + relTime(agent.updatedAt) + '</span><span class="row-actions">' + waitingCmd + attachBtn + '</span>';
              rowsEl.appendChild(row);
            });
            if (item.specPath) {
              card.style.cursor = 'pointer';
              card.addEventListener('click', (e) => {
                if (e.target.closest('button') || e.target.closest('.btn')) return;
                const name = (item.id ? 'FB#' + item.id + ' ' : '') + item.name;
                openDrawer(item.specPath, name, 'in-progress');
              });
            }
            body.appendChild(card);
          });
        }
        reposRoot.appendChild(section);
      });

      if (visibleItemCount === 0) {
        empty.style.display = '';
        empty.textContent = state.filter === 'all'
          ? 'No items in progress.'
          : 'No items match filter: ' + state.filter;
      }

      // Keep copy handler for remaining "Copy cmd" buttons on agent rows
      reposRoot.querySelectorAll('button.copy').forEach(btn => {
        btn.onclick = async (e) => {
          e.stopPropagation();
          const text = btn.getAttribute('data-copy') || '';
          if (!text) return;
          const ok = await copyText(text);
          showToast(ok ? 'Copied: ' + text : 'Copy failed');
        };
      });

      // Run next: primary button
      reposRoot.querySelectorAll('.run-next-primary').forEach(btn => {
        btn.onclick = async (e) => {
          e.stopPropagation();
          const command = btn.getAttribute('data-command') || '';
          const mode = btn.getAttribute('data-mode') || 'fire-and-forget';
          const repoPath = btn.getAttribute('data-repo') || '';
          await executeNextAction(command, mode, repoPath, btn);
        };
      });

      // Run next: chevron opens dropdown
      reposRoot.querySelectorAll('.run-next-chevron').forEach(chevron => {
        chevron.onclick = (e) => {
          e.stopPropagation();
          const group = chevron.closest('.run-next-group');
          const dropdown = group && group.querySelector('.run-next-dropdown');
          if (!dropdown) return;
          const isOpen = dropdown.classList.contains('open');
          // Close all open dropdowns first
          document.querySelectorAll('.run-next-dropdown.open').forEach(d => d.classList.remove('open'));
          if (!isOpen) {
            dropdown.classList.add('open');
            const close = (ev) => {
              if (!group.contains(ev.target)) {
                dropdown.classList.remove('open');
                document.removeEventListener('click', close);
              }
            };
            setTimeout(() => document.addEventListener('click', close), 0);
          }
        };
      });

      // Run next: dropdown item click
      reposRoot.querySelectorAll('.dropdown-item').forEach(item => {
        item.onclick = async (e) => {
          e.stopPropagation();
          const command = item.getAttribute('data-command') || '';
          const mode = item.getAttribute('data-mode') || 'fire-and-forget';
          const group = item.closest('.run-next-group');
          const primaryBtn = group && group.querySelector('.run-next-primary');
          const repoPath = primaryBtn ? primaryBtn.getAttribute('data-repo') || '' : '';
          item.closest('.run-next-dropdown').classList.remove('open');
          await executeNextAction(command, mode, repoPath, primaryBtn || item);
        };
      });

      reposRoot.querySelectorAll('button.attach').forEach(btn => {
        btn.onclick = async (e) => {
          e.stopPropagation();
          const repoPath = btn.getAttribute('data-repo') || '';
          const featureId = btn.getAttribute('data-feature') || '';
          const agentId = btn.getAttribute('data-agent') || '';
          const tmuxSession = btn.getAttribute('data-session') || '';
          if (!repoPath || !featureId || !agentId) return;
          await requestAttach(repoPath, featureId, agentId, tmuxSession);
        };
      });

      document.querySelectorAll('button.pill-filter').forEach(btn => {
        btn.onclick = (e) => {
          e.stopPropagation();
          const next = btn.getAttribute('data-filter') || 'all';
          state.filter = next;
          localStorage.setItem('aigon.dashboard.filter', next);
          render();
        };
      });
    }

    // ── Pipeline / Kanban view ─────────────────────────────────────────────────

    const STAGE_ORDER = ['inbox', 'backlog', 'in-progress', 'in-evaluation', 'done'];
    const STAGE_LABELS = { inbox: 'Inbox', backlog: 'Backlog', 'in-progress': 'In-Progress', 'in-evaluation': 'Evaluation', done: 'Done', paused: 'Paused', triaged: 'Triaged', actionable: 'Actionable', 'wont-fix': "Won't Fix", duplicate: 'Duplicate' };
    const PIPELINE_STAGES = {
      features: ['inbox', 'backlog', 'in-progress', 'in-evaluation', 'done'],
      research: ['inbox', 'backlog', 'in-progress', 'paused', 'done'],
      feedback: ['inbox', 'triaged', 'actionable', 'done', 'wont-fix']
    };
    // ALLOWED_TRANSITIONS removed — transitions are now validated server-side via
    // validActions in the /api/status response. Drag-drop uses validTargetStages
    // computed from validActions on the card's dragstart event.

    let dragState = null;

    function pipelineCommand(pipelineType, action) {
      const prefix = pipelineType === 'research' ? 'research' : pipelineType === 'feedback' ? 'feedback' : 'feature';
      return prefix + '-' + action;
    }

    function buildAgentBadgesHtml(agents) {
      if (!agents || agents.length === 0) return '';
      return agents.map(a => '<span class="agent-badge ' + escHtml(a.status || '') + '">' + escHtml(a.id) + '</span>').join('');
    }

    // Maps validActions to button CSS classes using priority as the primary signal.
    // priority:'high' → primary (prominent, recommended next step)
    // feature-stop → danger (destructive)
    // everything else → secondary (subdued, available but not competing)
    function validActionBtnClass(action, priority) {
      if (priority === 'high') return 'btn btn-primary';
      if (action === 'feature-stop') return 'btn btn-danger';
      return 'btn btn-secondary';
    }

    // Builds button HTML from server-provided validActions.
    // Returns only action buttons — status badges are handled separately in buildKanbanCard.
    // Transitions are used for drag-drop only (not rendered as buttons) —
    // except specific transitions that should appear as buttons (prioritise, close, triage).
    function buildValidActionsHtml(validActions) {
      if (!validActions || validActions.length === 0) return '';
      // Filter: show in-state actions as buttons, plus specific transitions that need buttons
      const transitionsAsButtons = ['feature-prioritise', 'research-prioritise', 'feature-close', 'research-close', 'feedback-triage'];
      const buttonsToRender = validActions.filter(va => {
        if (va.type === 'action') return true;
        // Only render transition as button if it's in the explicit list
        return va.type === 'transition' && transitionsAsButtons.includes(va.action);
      });
      // Deduplicate: if a transition and an action have the same action name, keep only the action
      const seen = new Set();
      const deduped = [];
      // Actions first (preferred), then transitions
      const sorted = [...buttonsToRender.filter(v => v.type === 'action'), ...buttonsToRender.filter(v => v.type === 'transition')];
      for (const va of sorted) {
        const key = va.action + (va.agentId || '');
        if (!seen.has(key)) { seen.add(key); deduped.push(va); }
      }
      // Sort: high-priority (primary) first, then normal, then stop/danger last
      deduped.sort((a, b) => {
        const rank = v => v.priority === 'high' ? 0 : v.action === 'feature-stop' ? 2 : 1;
        return rank(a) - rank(b);
      });
      return deduped.map(va => {
        const cls = validActionBtnClass(va.action, va.priority);
        const agentAttr = va.agentId ? ' data-agent="' + escHtml(va.agentId) + '"' : '';
        return '<button class="' + cls + ' kcard-va-btn" data-va-action="' + escHtml(va.action) + '"' + agentAttr + '>' + escHtml(va.label) + '</button>';
      }).join('');
    }

    // Dispatches a validAction click to the appropriate API endpoint
    async function handleValidAction(va, feature, repoPath, btn, pipelineType) {
      const id = feature.id;
      const agentId = va.agentId || null;
      switch (va.action) {
        case 'feature-open':
        case 'feature-attach':
        case 'research-open':
        case 'research-attach':
          await requestWorktreeOpen(id, agentId, repoPath, btn, pipelineType);
          break;
        case 'feature-setup':
        case 'research-setup': {
          const agents = await showAgentPicker(id, feature.name);
          if (!agents) return;
          await requestAction(pipelineCommand(pipelineType, 'setup'), [id, ...agents], repoPath, btn);
          break;
        }
        case 'feature-prioritise':
        case 'research-prioritise':
          await requestAction(pipelineCommand(pipelineType, 'prioritise'), [feature.name], repoPath, btn);
          break;
        case 'feature-focus':
          await requestAction('terminal-focus', [id, ...(agentId ? [agentId] : [])], repoPath, btn);
          break;
        case 'feature-stop':
          await requestAction('feature-stop', [id, ...(agentId ? [agentId] : [])], repoPath, btn);
          break;
        default:
          await requestAction(va.action, [id, ...(agentId ? [agentId] : [])], repoPath, btn);
      }
    }

    function buildKanbanCard(feature, repoPath, pipelineType) {
      const card = document.createElement('div');
      card.className = 'kcard';
      card.draggable = true;
      card.dataset.featureId = feature.id;
      card.dataset.featureName = feature.name;
      card.dataset.stage = feature.stage;
      card.dataset.repoPath = repoPath || '';

      const agentBadgesHtml = buildAgentBadgesHtml(feature.agents);

      const stage = feature.stage;

      // Render buttons from server-provided validActions (state machine is the only source of truth).
      const actionsHtml = buildValidActionsHtml(feature.validActions || []);
      // Eval status badge is a non-interactive status indicator, rendered separately from buttons.
      const evalStatusHtml = feature.evalStatus
        ? '<span class="eval-badge' + (feature.evalStatus === 'pick winner' ? ' pick-winner' : '') + '">' + escHtml(feature.evalStatus) + '</span>'
        : '';

      card.innerHTML =
        (feature.id ? '<div class="kcard-id">#' + escHtml(feature.id) + '</div>' : '') +
        '<div class="kcard-name">' + escHtml(feature.name.replace(/-/g, ' ')) + '</div>' +
        (agentBadgesHtml ? '<div class="kcard-agents">' + agentBadgesHtml + '</div>' : '') +
        (evalStatusHtml ? '<div class="kcard-status">' + evalStatusHtml + '</div>' : '') +
        (actionsHtml ? '<div class="kcard-actions">' + actionsHtml + '</div>' : '');

      let wasDragged = false;
      card.addEventListener('dragstart', (e) => {
        wasDragged = true;
        card.classList.add('dragging');
        // Valid target stages come from state machine validActions (transitions only)
        const validTargetStages = (feature.validActions || [])
          .filter(a => a.type === 'transition')
          .map(a => a.to);
        dragState = { featureId: feature.id, featureName: feature.name, fromStage: feature.stage, repoPath, pipelineType, validTargetStages };
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', feature.id);
        // Create tilted drag image
        const ghost = card.cloneNode(true);
        ghost.style.cssText = 'position:fixed;top:-1000px;left:-1000px;width:' + card.offsetWidth + 'px;transform:rotate(6deg);opacity:0.85;box-shadow:0 8px 24px rgba(0,0,0,.4);pointer-events:none;z-index:9999';
        document.body.appendChild(ghost);
        e.dataTransfer.setDragImage(ghost, card.offsetWidth / 2, card.offsetHeight / 2);
        requestAnimationFrame(() => requestAnimationFrame(() => ghost.remove()));
      });
      card.addEventListener('dragend', () => {
        card.classList.remove('dragging');
        dragState = null;
        document.querySelectorAll('.kanban-col').forEach(col => col.classList.remove('drag-over', 'drag-blocked'));
      });

      // Click to open spec drawer — skip if drag occurred or button clicked
      card.style.cursor = 'pointer';
      card.addEventListener('click', (e) => {
        if (wasDragged) { wasDragged = false; return; }
        if (e.target.closest('button') || e.target.closest('.btn')) return;
        if (feature.specPath) {
          const displayName = (feature.id ? '#' + feature.id + ' ' : '') + feature.name.replace(/-/g, ' ');
          openDrawer(feature.specPath, displayName, feature.stage);
        }
      });

      // Wire validActions buttons (state machine-driven)
      card.querySelectorAll('.kcard-va-btn').forEach(btn => {
        const vaAction = btn.getAttribute('data-va-action');
        const vaAgentId = btn.getAttribute('data-agent') || null;
        const va = (feature.validActions || []).find(a => a.action === vaAction && (a.agentId || null) === vaAgentId);
        if (!va) return;
        btn._origText = btn.textContent;
        btn.onclick = async (e) => {
          e.stopPropagation();
          await handleValidAction(va, feature, repoPath, btn, pipelineType);
        };
      });

      return card;
    }

    function renderPipelineTypeToggle(container) {
      const existing = container.querySelector('.pipeline-toolbar');
      if (existing) existing.remove();

      const toolbar = document.createElement('div');
      toolbar.className = 'pipeline-toolbar';

      const toggle = document.createElement('div');
      toggle.className = 'pipeline-type-toggle';
      ['features', 'research', 'feedback'].forEach(type => {
        const btn = document.createElement('button');
        btn.className = 'toggle-btn' + (state.pipelineType === type ? ' active' : '');
        btn.textContent = type.charAt(0).toUpperCase() + type.slice(1);
        btn.onclick = () => {
          state.pipelineType = type;
          localStorage.setItem('aigon.dashboard.pipelineType', type);
          render();
        };
        toggle.appendChild(btn);
      });
      toolbar.appendChild(toggle);

      const createBtn = document.createElement('button');
      createBtn.className = 'btn btn-primary';
      createBtn.style.cssText = 'font-size:12px;padding:5px 12px';
      createBtn.textContent = '+ Create';
      createBtn.onclick = () => createNewSpec();
      toolbar.appendChild(createBtn);

      container.prepend(toolbar);
    }

    function createNewSpec() {
      const pType = state.pipelineType || 'features';
      const typeLabel = pType === 'features' ? 'Feature' : pType === 'research' ? 'Research Topic' : 'Feedback Item';
      const modal = document.getElementById('create-modal');
      const titleEl = document.getElementById('create-modal-title');
      const nameInput = document.getElementById('create-modal-name');
      const repoSelect = document.getElementById('create-modal-repo');
      const repoPicker = document.getElementById('create-modal-repo-picker');
      const submitBtn = document.getElementById('create-modal-submit');

      titleEl.textContent = 'New ' + typeLabel;
      nameInput.value = '';
      nameInput.placeholder = pType === 'features' ? 'e.g. dark mode toggle' : pType === 'research' ? 'e.g. auth provider comparison' : 'e.g. sidebar not scrolling on mobile';

      // Repo picker: show if "All" selected and multiple repos
      const repos = (state.data || {}).repos || [];
      if (state.selectedRepo === 'all' && repos.length > 1) {
        repoPicker.style.display = '';
        repoSelect.innerHTML = '';
        repos.forEach(r => {
          const opt = document.createElement('option');
          opt.value = r.path;
          opt.textContent = r.displayPath;
          repoSelect.appendChild(opt);
        });
      } else {
        repoPicker.style.display = 'none';
      }

      modal.style.display = '';
      nameInput.focus();

      async function submit() {
        const name = nameInput.value.trim();
        if (!name) { nameInput.focus(); return; }

        let repoPath;
        if (state.selectedRepo !== 'all') {
          repoPath = state.selectedRepo;
        } else if (repos.length === 1) {
          repoPath = repos[0].path;
        } else {
          repoPath = repoSelect.value;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Creating…';
        try {
          const res = await fetch('/api/spec/create', {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify({ repoPath, type: pType, name })
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Failed');
          modal.style.display = 'none';
          showToast('Created: ' + name);
          openDrawer(data.path, name, 'inbox');
          setTimeout(() => setDrawerMode('edit'), 300);
          requestRefresh();
        } catch (e) {
          showToast('Create failed: ' + e.message, null, null, {error:true});
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Create';
        }
      }

      function cancel() { modal.style.display = 'none'; }

      async function useAi() {
        const name = nameInput.value.trim();
        if (!name) { nameInput.focus(); return; }
        let repoPath;
        if (state.selectedRepo !== 'all') {
          repoPath = state.selectedRepo;
        } else if (repos.length === 1) {
          repoPath = repos[0].path;
        } else {
          repoPath = repoSelect.value;
        }
        // Create the spec first, then launch AI
        const useAiBtn = document.getElementById('create-modal-use-ai');
        if (useAiBtn) { useAiBtn.disabled = true; useAiBtn.textContent = 'Creating…'; }
        try {
          const res = await fetch('/api/spec/create', {
            method: 'POST', headers: { 'content-type': 'application/json' },
            body: JSON.stringify({ repoPath, type: pType, name })
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Failed');
          modal.style.display = 'none';
          showToast('Created: ' + name);
          requestRefresh();
          await launchAiSession(data.path, name, repoPath);
        } catch (e) {
          showToast('Create failed: ' + e.message);
        } finally {
          if (useAiBtn) { useAiBtn.disabled = false; useAiBtn.textContent = 'Use AI'; }
        }
      }

      // Wire up (replace listeners to avoid stacking)
      submitBtn.onclick = submit;
      document.getElementById('create-modal-cancel').onclick = cancel;
      const useAiBtn = document.getElementById('create-modal-use-ai');
      if (useAiBtn) useAiBtn.onclick = useAi;
      nameInput.onkeydown = (e) => { if (e.key === 'Enter') submit(); if (e.key === 'Escape') cancel(); };
    }

    function renderPipeline() {
      document.getElementById('monitor-summary').style.display = 'none';
      const data = state.data || { repos: [] };
      const allRepos = data.repos || [];
      const visibleRepos = getVisibleRepos(data);
      setHealth();
      document.getElementById('updated-text').textContent = 'Updated ' + relTime(data.generatedAt || new Date().toISOString());

      // Render sidebar from all repos
      renderSidebar(allRepos);

      // Render header bar for selected repo
      const selectedRepoData = state.selectedRepo !== 'all' ? allRepos.find(r => r.path === state.selectedRepo) : null;
      renderRepoHeader(selectedRepoData);

      const empty = document.getElementById('empty');
      const reposRoot = document.getElementById('repos');
      reposRoot.className = '';
      reposRoot.innerHTML = '';

      // Type toggle (features/research/feedback)
      const detailArea = document.querySelector('.detail-area') || reposRoot.parentElement;
      renderPipelineTypeToggle(detailArea);

      const pType = state.pipelineType || 'features';
      const stages = PIPELINE_STAGES[pType] || STAGE_ORDER;

      if (visibleRepos.length === 0) {
        empty.style.display = '';
        empty.textContent = state.selectedRepo === 'all'
          ? 'No repos registered. Run: aigon conductor add'
          : 'No data for selected repo.';
        return;
      }
      empty.style.display = 'none';

      visibleRepos.forEach(repo => {
        const byStage = {};
        stages.forEach(s => { byStage[s] = []; });
        const items = repo[pType] || [];
        items.forEach(f => {
          if (byStage[f.stage]) byStage[f.stage].push(f);
        });

        const repoSection = document.createElement('div');
        reposRoot.appendChild(repoSection);

        if (state.selectedRepo === 'all' && visibleRepos.length > 1) {
          const repoLabel = document.createElement('div');
          repoLabel.style.cssText = 'font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-tertiary);margin:10px 0 6px;font-weight:600';
          repoLabel.textContent = repo.displayPath || repo.name;
          repoSection.appendChild(repoLabel);
        }

        const kanban = document.createElement('div');
        kanban.className = 'kanban';
        repoSection.appendChild(kanban);

        const doneTotalKey = pType === 'research' ? 'researchDoneTotal' : pType === 'feedback' ? 'feedbackDoneTotal' : 'doneTotal';

        stages.forEach(stage => {
          const cards = byStage[stage] || [];
          const displayCount = (stage === 'done' && repo[doneTotalKey]) ? repo[doneTotalKey] : cards.length;
          const col = document.createElement('div');
          col.className = 'kanban-col';
          col.dataset.stage = stage;
          col.dataset.repoPath = repo.path || '';

          col.innerHTML =
            '<div class="col-h"><span class="col-title">' + escHtml(STAGE_LABELS[stage]) + '</span><span class="col-count">' + displayCount + '</span></div>' +
            '<div class="col-body"></div>';

          const colBody = col.querySelector('.col-body');

          if (cards.length === 0) {
            const emp = document.createElement('div');
            emp.className = 'col-empty';
            emp.textContent = 'Empty';
            colBody.appendChild(emp);
          } else {
            const DONE_CAP = 6;
            const displayCards = (stage === 'done' && cards.length > DONE_CAP) ? cards.slice(0, DONE_CAP) : cards;
            displayCards.forEach(feature => {
              colBody.appendChild(buildKanbanCard(feature, repo.path, pType));
            });
            if (stage === 'done' && cards.length > DONE_CAP) {
              const totalDone = repo.doneTotal || cards.length;
              const moreBtn = document.createElement('button');
              moreBtn.className = 'btn';
              moreBtn.style.cssText = 'width:100%;margin-top:4px;font-size:11px;padding:6px';
              moreBtn.textContent = (totalDone - DONE_CAP) + ' more — open in Finder';
              moreBtn.onclick = async () => {
                const donePath = (repo.path || '') + '/docs/specs/features/05-done';
                try {
                  await fetch('/api/open-folder', {
                    method: 'POST',
                    headers: { 'content-type': 'application/json' },
                    body: JSON.stringify({ path: donePath })
                  });
                } catch (e) {
                  showToast('Could not open folder: ' + e.message, null, null, {error:true});
                }
              };
              colBody.appendChild(moreBtn);
            }
          }

          col.addEventListener('dragover', (e) => {
            if (!dragState) return;
            const allowed = dragState.validTargetStages
              ? dragState.validTargetStages.includes(stage)
              : false;
            e.preventDefault();
            e.dataTransfer.dropEffect = allowed ? 'move' : 'none';
            document.querySelectorAll('.kanban-col').forEach(c => c.classList.remove('drag-over', 'drag-blocked'));
            col.classList.add(allowed ? 'drag-over' : 'drag-blocked');
          });

          col.addEventListener('dragleave', (e) => {
            if (!col.contains(e.relatedTarget)) {
              col.classList.remove('drag-over', 'drag-blocked');
            }
          });

          col.addEventListener('drop', async (e) => {
            e.preventDefault();
            col.classList.remove('drag-over', 'drag-blocked');
            if (!dragState) return;
            const { featureId, featureName, fromStage, repoPath, pipelineType: dragPType, validTargetStages: dropTargets } = dragState;
            dragState = null;
            const dropAllowed = dropTargets ? dropTargets.includes(stage) : false;
            if (!dropAllowed) return;

            if (fromStage === 'inbox' && stage === 'backlog') {
              await requestAction(pipelineCommand(dragPType, 'prioritise'), [featureName], repoPath);
            } else if (fromStage === 'backlog' && stage === 'in-progress') {
              const agents = await showAgentPicker(featureId, featureName);
              if (!agents) return;
              await requestAction(pipelineCommand(dragPType, 'setup'), [featureId, ...agents], repoPath);

            }
          });

          kanban.appendChild(col);
        });
      });
    }

    function fmtNum(v, decimals) {
      if (v === null || v === undefined) return '—';

    function trendIcon(pct, lowerIsBetter) {
      if (pct === null || pct === undefined) return '';
      const positive = lowerIsBetter ? pct < 0 : pct > 0;
      const arrow = pct > 0 ? '↑' : '↓';
      const cls = positive ? 'trend-up' : 'trend-down';
      return `<span class="${cls}">${arrow} ${Math.abs(pct)}%</span>`;
    }

    function buildSparklineSvg(points, color) {
      if (!points || points.length < 2) return '';
      const vals = points.map(p => (p.count !== undefined ? p.count : p.score) || 0);
      const maxVal = Math.max(...vals, 1);
      const w = 400, h = 40, pad = 2;
      const xs = vals.map((_, i) => pad + (i / (vals.length - 1)) * (w - pad * 2));
      const ys = vals.map(v => h - pad - ((v / maxVal) * (h - pad * 2)));
      const pts = xs.map((x, i) => `${x},${ys[i]}`).join(' ');
      const fillPts = `${xs[0]},${h} ${pts} ${xs[xs.length - 1]},${h}`;
      return `<svg class="sparkline-svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
        <polygon points="${fillPts}" fill="${color}" opacity="0.15"/>
        <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2"/>
      </svg>`;
    }

    function buildStatCard(label, value, trendHtml, extra) {

        <div class="stat-card-label">${escHtml(label)}</div>

    }

    function buildVolumeSeries(features, granularity) {
      const buckets = {};
      let minTs = Infinity, maxTs = -Infinity;

      features.forEach(f => {
        const ts = f.completedAt ? new Date(f.completedAt) : null;
        if (!ts || isNaN(ts)) return;
        const t = ts.getTime();
        if (t < minTs) minTs = t;
        if (t > maxTs) maxTs = t;
        let key;
        if (granularity === 'daily') {
          key = ts.toISOString().slice(0, 10);
        } else if (granularity === 'weekly') {
          const d = new Date(ts);
          const dow = d.getUTCDay() || 7;
          d.setUTCDate(d.getUTCDate() - dow + 1);
          key = d.toISOString().slice(0, 10);
        } else {
          key = ts.toISOString().slice(0, 7) + '-01';
        }
        buckets[key] = (buckets[key] || 0) + 1;
      });

      if (minTs === Infinity) return [];

      // Fill in zero-count buckets for a continuous timeline
      const filled = [];
      const cur = new Date(minTs);
      const end = new Date(maxTs);

      if (granularity === 'daily') {
        cur.setUTCHours(0, 0, 0, 0);
        end.setUTCHours(0, 0, 0, 0);
        while (cur <= end) {
          const key = cur.toISOString().slice(0, 10);
          filled.push({ date: key, count: buckets[key] || 0 });
          cur.setUTCDate(cur.getUTCDate() + 1);
        }
      } else if (granularity === 'weekly') {
        // Align to Monday
        const dow = cur.getUTCDay() || 7;
        cur.setUTCDate(cur.getUTCDate() - dow + 1);
        cur.setUTCHours(0, 0, 0, 0);
        while (cur <= end) {
          const key = cur.toISOString().slice(0, 10);
          filled.push({ date: key, count: buckets[key] || 0 });
          cur.setUTCDate(cur.getUTCDate() + 7);
        }
      } else {
        cur.setUTCDate(1); cur.setUTCHours(0, 0, 0, 0);
        end.setUTCDate(1); end.setUTCHours(0, 0, 0, 0);
        while (cur <= end) {
          const key = cur.toISOString().slice(0, 10);
          filled.push({ date: key, count: buckets[key] || 0 });
          cur.setUTCMonth(cur.getUTCMonth() + 1);
        }
      }
      return filled;
    }

    function buildCycleTimeSeries(features, granularity) {
      const MIN_DURATION_MS = 5 * 60 * 1000; // ignore < 5 min (likely backfill artifacts)
      const buckets = {};
      features.forEach(f => {
        if (!f.durationMs || f.durationMs < MIN_DURATION_MS) return;
        const ts = f.completedAt ? new Date(f.completedAt) : null;
        if (!ts || isNaN(ts)) return;
        let key;
        if (granularity === 'daily') {
          key = ts.toISOString().slice(0, 10);
        } else if (granularity === 'weekly') {
          const d = new Date(ts);
          const dow = d.getUTCDay() || 7;
          d.setUTCDate(d.getUTCDate() - dow + 1);
          key = d.toISOString().slice(0, 10);
        } else {
          key = ts.toISOString().slice(0, 7) + '-01';
        }
        if (!buckets[key]) buckets[key] = [];
        buckets[key].push(f.durationMs / 3600000); // convert to hours
      });
      return Object.keys(buckets).sort().map(k => {
        const vals = buckets[k];
        const avg = vals.reduce((s, v) => s + v, 0) / vals.length;
        return { date: k, avgHours: Math.round(avg * 10) / 10, count: vals.length };
      });
    }

    function applyCycleTimeWindow() {
      const series = statsState.cycleTimeSeries;
      const gran = statsState.volumeGranularity;
      const windowSize = VOLUME_WINDOW[gran] || 8;
      if (!series || !series.length) return;

      const needsNav = series.length > windowSize;

      const navEl = document.getElementById('ct-nav-controls');
      if (navEl) navEl.style.visibility = needsNav ? 'visible' : 'hidden';

      let startIdx, endIdx, slice;
      if (!needsNav) {
        startIdx = 0;
        endIdx = series.length - 1;
        slice = series.slice();
        statsState.cycleTimeWindowEnd = endIdx;
      } else {
        if (statsState.cycleTimeWindowEnd === null) statsState.cycleTimeWindowEnd = series.length - 1;
        statsState.cycleTimeWindowEnd = Math.min(statsState.cycleTimeWindowEnd, series.length - 1);
        endIdx = statsState.cycleTimeWindowEnd;
        startIdx = Math.max(0, endIdx - windowSize + 1);
        slice = series.slice(startIdx, endIdx + 1);
      }

      const chart = statsState.cycleTimeChart;
      if (chart) {
        chart.data.labels = slice.map(d => gran === 'monthly' ? d.date.slice(0, 7) : d.date.slice(5, 10));
        chart.data.datasets[0].data = slice.map(d => d.avgHours);
        chart.update('none');
      }

      if (needsNav) {
        const fmt = d => gran === 'monthly' ? d.date.slice(0, 7) : d.date.slice(0, 10);
        const rangeEl = document.getElementById('ct-nav-range');
        if (rangeEl && slice.length) rangeEl.textContent = `${fmt(slice[0])} – ${fmt(slice[slice.length - 1])}`;
        const btnPrev = document.getElementById('ct-nav-prev');
        const btnNext = document.getElementById('ct-nav-next');
        if (btnPrev) btnPrev.disabled = startIdx === 0;
        if (btnNext) btnNext.disabled = endIdx >= series.length - 1;
      }
    }

    function panCycleTimeChart(direction) {
      const series = statsState.cycleTimeSeries || [];
      const windowSize = VOLUME_WINDOW[statsState.volumeGranularity] || 8;
      if (!series.length) return;
      const step = Math.max(1, Math.floor(windowSize / 2));
      const current = statsState.cycleTimeWindowEnd !== null ? statsState.cycleTimeWindowEnd : series.length - 1;
      if (direction === 'prev') {
        statsState.cycleTimeWindowEnd = Math.max(windowSize - 1, current - step);
      } else {
        statsState.cycleTimeWindowEnd = Math.min(series.length - 1, current + step);
      }
      applyCycleTimeWindow();
    }

    function filterFeaturesByPeriodAndRepo(features, period, repoFilter) {
      const now = Date.now();
      const ms = { '7d': 7, '30d': 30, '90d': 90, 'all': null };
      const days = ms[period];
      const since = days ? now - days * 86400000 : 0;
      return features.filter(f => {
        if (f.completedAt && new Date(f.completedAt).getTime() < since) return false;
        if (repoFilter !== 'all' && f.repoPath !== repoFilter) return false;
        return true;
      });
    }

        return;

      // Build repo list for filter

      });

      // Filter features for the selected period + repo
      const filteredFeatures = filterFeaturesByPeriodAndRepo(analytics.features || [], statsState.period, statsState.repoFilter);
      const totalCompleted = filteredFeatures.length;
      const featWithDur = filteredFeatures.filter(f => f.durationMs && f.durationMs > 0);
      const avgCycle = featWithDur.length > 0
        ? featWithDur.reduce((s, f) => s + f.durationMs, 0) / featWithDur.length / (1000 * 3600) : null;
      const featWithAutonomy = filteredFeatures.filter(f => f.autonomyRatio !== null);
      const avgAutonomy = featWithAutonomy.length > 0
        ? featWithAutonomy.reduce((s, f) => s + f.autonomyRatio, 0) / featWithAutonomy.length : null;
      const firstPassFeats = filteredFeatures.filter(f => f.firstPassSuccess !== null);
      const firstPassRate = firstPassFeats.length > 0
        ? firstPassFeats.filter(f => f.firstPassSuccess).length / firstPassFeats.length : null;

      // Volume cards
      html.push('<div class="stats-section-title">Volume</div>');
      html.push('<div class="stats-cards">');
      const trend30 = analytics.volume && analytics.volume.trend30d;
      html.push(buildStatCard('Features Completed', String(totalCompleted),
        statsState.period === '30d' && trend30 !== null ? trendIcon(trend30) : null));
      html.push(buildStatCard('Avg Cycle Time', fmtHours(avgCycle), null, avgCycle !== null ? 'start to close' : null));
      html.push(buildStatCard('Autonomy Score', avgAutonomy !== null ? fmtPct(avgAutonomy) : '—', null));
      html.push(buildStatCard('First-Pass Rate', fmtPct(firstPassRate), null));
      html.push('</div>');

      // Volume trend line chart
      html.push('<div class="volume-chart-wrap">');
      html.push('<div class="volume-chart-header">');
      html.push('<div class="volume-chart-title">Features Completed Over Time</div>');
      html.push('<div style="display:flex;align-items:center;gap:8px">');
      html.push('<span id="vol-nav-controls" style="display:flex;align-items:center;gap:4px">');
      html.push('<button id="vol-nav-prev" class="vol-nav-btn" title="Earlier">&#8592;</button>');
      html.push('<span id="vol-nav-range" style="font-size:11px;color:var(--text-tertiary);min-width:140px;text-align:center"></span>');
      html.push('<button id="vol-nav-next" class="vol-nav-btn" title="Later">&#8594;</button>');
      html.push('</span>');
      html.push('<div class="volume-granularity-btns" style="margin-left:8px">');
      [['daily','Daily'],['weekly','Weekly'],['monthly','Monthly']].forEach(([g,l]) => {
        const active = statsState.volumeGranularity === g ? ' active' : '';
        html.push(`<button class="vol-gran-btn${active}" data-gran="${g}">${l}</button>`);
      });
      html.push('</div>');
      html.push('</div>');
      html.push('</div>');
      html.push('<div style="height:220px;position:relative"><canvas id="volume-chart-canvas"></canvas></div>');
      html.push('</div>');

      // Autonomy section
      const autonomy = analytics.autonomy || {};
      const displayAutonomy = avgAutonomy !== null ? avgAutonomy : (autonomy.score || null);
      html.push('<div class="stats-row">');

      // Autonomy block
      html.push('<div class="stats-block">');
      html.push(`<div class="stats-block-title">Autonomy <span class="stats-block-score">${displayAutonomy !== null ? fmtPct(displayAutonomy) : '—'}</span></div>`);
      if (displayAutonomy !== null) {
        const pct = Math.round(displayAutonomy * 100);
        html.push(`<div class="autonomy-bar-wrap"><div class="autonomy-bar" style="width:${pct}%"></div></div>`);
      }
      html.push('<div class="stats-kv-grid">');
      html.push(`<div class="stats-kv"><div class="stats-kv-label">Waits/feature</div><div class="stats-kv-val">${fmtNum(autonomy.avgWaitEventsPerFeature, 1)}</div></div>`);
      html.push(`<div class="stats-kv"><div class="stats-kv-label">First-pass rate</div><div class="stats-kv-val">${fmtPct(firstPassRate !== null ? firstPassRate : autonomy.firstPassSuccessRate)}</div></div>`);
      html.push(`<div class="stats-kv"><div class="stats-kv-label">Autonomous mode</div><div class="stats-kv-val">${fmtPct(autonomy.autonomousModeAdoption)}</div></div>`);
      html.push(`<div class="stats-kv"><div class="stats-kv-label">Touch time ratio</div><div class="stats-kv-val">${fmtPct(autonomy.avgTouchTimeRatio)}</div></div>`);
      html.push('</div>');

      // Autonomy trend sparkline
      if (autonomy.trend && autonomy.trend.length > 1) {
        const trendPoints = autonomy.trend.map(t => ({ score: t.score }));
        html.push('<div class="sparkline-wrap">');
        html.push(buildSparklineSvg(trendPoints, 'var(--accent)'));
        const lastTrend = autonomy.trend[autonomy.trend.length - 1];
        const firstTrend = autonomy.trend[0];
        const improving = lastTrend.score > firstTrend.score;
        html.push(`<span class="sparkline-label">${improving ? '↑ improving' : '→ stable'}</span>`);
        html.push('</div>');
      }
      html.push('</div>');

      // Quality block
      const quality = analytics.quality || {};
      const dur = quality.durationHours || {};
      html.push('<div class="stats-block">');
      html.push('<div class="stats-block-title">Quality &amp; Speed</div>');
      html.push('<div class="stats-kv-grid">');
      html.push(`<div class="stats-kv"><div class="stats-kv-label">Avg cycle time</div><div class="stats-kv-val">${fmtHours(avgCycle !== null ? avgCycle : dur.average)}</div></div>`);
      html.push(`<div class="stats-kv"><div class="stats-kv-label">Median cycle time</div><div class="stats-kv-val">${fmtHours(dur.median)}</div></div>`);
      html.push(`<div class="stats-kv"><div class="stats-kv-label">Max cycle time</div><div class="stats-kv-val">${fmtHours(dur.max)}</div></div>`);
      html.push(`<div class="stats-kv"><div class="stats-kv-label">Avg iterations</div><div class="stats-kv-val">${fmtNum(quality.avgIterationsPerFeature, 1)}</div></div>`);
      html.push('</div>');
      html.push('</div>');
      html.push('</div>'); // end stats-row

      // Cycle time over time chart
      html.push('<div class="volume-chart-wrap">');
      html.push('<div class="volume-chart-header">');
      html.push('<div class="volume-chart-title">Avg Cycle Time Over Time</div>');
      html.push('<div style="display:flex;align-items:center;gap:8px">');
      html.push('<span id="ct-nav-controls" style="display:flex;align-items:center;gap:4px">');
      html.push('<button id="ct-nav-prev" class="vol-nav-btn" title="Earlier">&#8592;</button>');
      html.push('<span id="ct-nav-range" style="font-size:11px;color:var(--text-tertiary);min-width:140px;text-align:center"></span>');
      html.push('<button id="ct-nav-next" class="vol-nav-btn" title="Later">&#8594;</button>');
      html.push('</span>');
      html.push('<div class="volume-granularity-btns" style="margin-left:8px">');
      [['daily','Daily'],['weekly','Weekly'],['monthly','Monthly']].forEach(([g,l]) => {
        const active = statsState.volumeGranularity === g ? ' active' : '';
        html.push(`<button class="vol-gran-btn${active}" data-gran="${g}">${l}</button>`);
      });
      html.push('</div>');
      html.push('</div>');
      html.push('</div>');
      html.push('<div style="height:220px;position:relative"><canvas id="cycle-time-chart-canvas"></canvas></div>');
      html.push('</div>');

      // Agent leaderboard — computed from filteredFeatures so repo+period filters apply
      const round1 = v => Math.round(v * 10) / 10;
      const leaderAgentMap = {};
      filteredFeatures.forEach(f => {
        const ag = f.winnerAgent || 'solo';
        if (!leaderAgentMap[ag]) leaderAgentMap[ag] = { completed: 0, durMs: [], autonomyRatios: [], firstPassArr: [] };
        leaderAgentMap[ag].completed++;
        if (f.durationMs && f.durationMs > 0) leaderAgentMap[ag].durMs.push(f.durationMs);
        if (f.autonomyRatio !== null) leaderAgentMap[ag].autonomyRatios.push(f.autonomyRatio);
        if (f.firstPassSuccess !== null) leaderAgentMap[ag].firstPassArr.push(f.firstPassSuccess);
      });

      // Filter eval wins by repo
      const evalWinsByRepo = analytics.evalWinsByRepo || [];
      const filteredEvalWins = statsState.repoFilter === 'all'
        ? analytics.evalWins || []
        : (() => {
            const repoEntries = evalWinsByRepo.filter(e => e.repoPath === statsState.repoFilter);
            const agg = {};
            repoEntries.forEach(e => {
              if (!agg[e.agent]) agg[e.agent] = { agent: e.agent, wins: 0, evals: 0 };
              agg[e.agent].wins += e.wins;
              agg[e.agent].evals += e.evals;
            });
            return Object.values(agg).map(e => ({
              ...e, winRate: e.evals > 0 ? Math.round(e.wins / e.evals * 100) / 100 : 0
            }));
          })();

      const evalMap = {};
      filteredEvalWins.forEach(e => { evalMap[e.agent] = e; });
      const totalEvalWins = filteredEvalWins.reduce((s, e) => s + e.wins, 0);

      const allAgentIds = [...new Set([...Object.keys(leaderAgentMap), ...filteredEvalWins.map(e => e.agent)])];

      if (allAgentIds.length > 0) {
        html.push('<div class="stats-section-title" style="margin-top:4px">Agent Leaderboard</div>');
        html.push('<div class="stats-block" style="overflow-x:auto">');
        html.push('<table class="stats-leaderboard">');
        html.push('<thead><tr><th>Agent</th><th>Features</th><th>Eval wins</th><th>Fleet win %</th><th>Autonomy</th><th>Cycle time</th><th>First-pass</th></tr></thead>');
        html.push('<tbody>');

        allAgentIds
          .sort((a, b) => (leaderAgentMap[b] || { completed: 0 }).completed - (leaderAgentMap[a] || { completed: 0 }).completed)
          .forEach(agentId => {
            const d = leaderAgentMap[agentId] || { completed: 0, durMs: [], autonomyRatios: [], firstPassArr: [] };
            const ev = evalMap[agentId];
            const avgCycle = d.durMs.length > 0 ? round1(d.durMs.reduce((s, v) => s + v, 0) / d.durMs.length / 3600000) : null;
            const autoScore = d.autonomyRatios.length > 0 ? d.autonomyRatios.reduce((s, v) => s + v, 0) / d.autonomyRatios.length : null;
            const fpRate = d.firstPassArr.length > 0 ? d.firstPassArr.filter(Boolean).length / d.firstPassArr.length : null;
            // Share of total eval wins (sums to 100% across agents)
            const winShare = ev && totalEvalWins > 0 ? ev.wins / totalEvalWins : null;
            html.push('<tr>');
            html.push(`<td><span class="agent-mono">${escHtml(agentId)}</span></td>`);
            html.push(`<td>${d.completed}</td>`);
            html.push(`<td>${ev ? ev.wins : '—'}</td>`);
            html.push(`<td>${winShare !== null ? `<span class="win-rate">${fmtPct(winShare)}</span>` : '—'}</td>`);
            html.push(`<td>${fmtPct(autoScore)}</td>`);
            html.push(`<td>${fmtHours(avgCycle)}</td>`);
            html.push(`<td>${fmtPct(fpRate)}</td>`);
            html.push('</tr>');
          });
        html.push('</tbody></table>');
        html.push('</div>');
      }

      if (totalCompleted === 0 && allAgentIds.length === 0) {
        html.push('<div class="stats-empty-msg">No completed features found. Statistics will appear here once features are closed.</div>');
      }

      html.push('</div>'); // end stats-view
      container.innerHTML = html.join('');

      // Render Chart.js charts into canvases now that they're in the DOM
      const volSeries = buildVolumeSeries(filteredFeatures, statsState.volumeGranularity);
      renderVolumeChart(volSeries, statsState.volumeGranularity);

      const ctSeries = buildCycleTimeSeries(filteredFeatures, statsState.volumeGranularity);
      renderCycleTimeChart(ctSeries, statsState.volumeGranularity);

      // Wire up controls
      const repoSel = document.getElementById('stats-repo-filter');
      if (repoSel) repoSel.onchange = () => {
        statsState.repoFilter = repoSel.value;
        statsState.volumeWindowEnd = null;
        statsState.cycleTimeWindowEnd = null;
        saveStatsPrefs();
        renderStatistics();
      };

      const periodSel = document.getElementById('stats-period-filter');
      if (periodSel) periodSel.onchange = () => {
        statsState.period = periodSel.value;
        statsState.volumeWindowEnd = null;
        statsState.cycleTimeWindowEnd = null;
        saveStatsPrefs();
        renderStatistics();
      };

      const refreshBtn = document.getElementById('stats-refresh-btn');
      if (refreshBtn) refreshBtn.onclick = async () => {
        statsState.data = null;
        container.innerHTML = '<div class="stats-empty-msg">Loading…</div>';
        // force=1 busts the server-side analytics cache (picks up backfill changes)
        try {
          const res = await fetch('/api/analytics?force=1', { cache: 'no-store' });
          if (!res.ok) throw new Error('HTTP ' + res.status);
          statsState.data = await res.json();
          statsState.error = null;
        } catch (e) {
          statsState.error = e.message;
        }
        statsState.loading = false;
        renderStatistics();
      };

      // Volume granularity buttons — reset both windows on change
      document.querySelectorAll('.vol-gran-btn').forEach(btn => {
        btn.onclick = () => {
          statsState.volumeGranularity = btn.dataset.gran;
          statsState.volumeWindowEnd = null;
          statsState.cycleTimeWindowEnd = null;
          saveStatsPrefs();
          renderStatistics();
        };
      });

      // Volume nav buttons
      document.getElementById('vol-nav-prev')?.addEventListener('click', () => panVolumeChart('prev'));
      document.getElementById('vol-nav-next')?.addEventListener('click', () => panVolumeChart('next'));

      // Cycle time nav buttons
      document.getElementById('ct-nav-prev')?.addEventListener('click', () => panCycleTimeChart('prev'));
      document.getElementById('ct-nav-next')?.addEventListener('click', () => panCycleTimeChart('next'));
    }

    // ── Main render dispatch ───────────────────────────────────────────────────

    async function renderSessions() {
      const container = document.getElementById('sessions-view');
      container.innerHTML = '<div style="padding:12px 0;color:var(--text-tertiary);font-size:12px">Loading sessions…</div>';

      let sessions = [];
      try {
        const res = await fetch('/api/sessions');
        const data = await res.json();
        sessions = data.sessions || [];
      } catch (e) {
        container.innerHTML = '<div class="empty">Failed to load sessions: ' + escHtml(e.message) + '</div>';
        return;
      }

      container.innerHTML = '';

      // Toolbar
      const toolbar = document.createElement('div');
      toolbar.className = 'sessions-toolbar';
      toolbar.innerHTML = '<strong style="font-size:15px;font-weight:600;letter-spacing:-.01em">Tmux Sessions</strong>' +
        '<span style="font-size:12px;color:var(--text-tertiary)">' + sessions.length + ' session' + (sessions.length === 1 ? '' : 's') + '</span>' +
        '<button class="btn" id="sessions-refresh-btn" style="margin-left:auto">↺ Refresh</button>';
      container.appendChild(toolbar);
      document.getElementById('sessions-refresh-btn').onclick = () => renderSessions();

      if (sessions.length === 0) {
        container.innerHTML += '<div class="empty">No tmux sessions running.</div>';
        return;
      }

      // Group: dashboard sessions first, then by repo prefix
      const dashSessions = sessions.filter(s => s.name.startsWith('aigon-dash-'));
      const otherSessions = sessions.filter(s => !s.name.startsWith('aigon-dash-'));

      function renderGroup(title, items) {
        if (items.length === 0) return;
        const group = document.createElement('div');
        group.className = 'sessions-group';
        group.innerHTML = '<div class="sessions-group-title">' + escHtml(title) + ' (' + items.length + ')</div>';
        items.forEach(s => {
          const row = document.createElement('div');
          row.className = 'session-row' + (s.attached ? ' attached' : '');
          const age = relTime(s.createdAt);
          const attachedBadge = s.attached ? '<span class="session-attached-badge">attached</span>' : '';
          row.innerHTML =
            '<span class="session-name" title="' + escHtml(s.name) + '">' + escHtml(s.name) + '</span>' +
            '<span class="session-meta">' + age + '</span>' +
            attachedBadge +
            '<span style="display:flex;gap:5px">' +
              '<button class="btn btn-primary" style="font-size:11px;padding:3px 8px" data-session="' + escHtml(s.name) + '">Attach</button>' +
              '<button class="btn btn-warn" style="font-size:11px;padding:3px 8px" data-kill="' + escHtml(s.name) + '">Kill</button>' +
            '</span>';

          row.querySelector('[data-session]').onclick = async (e) => {
            e.stopPropagation();
            openTerminalPanel(s.name, '', s.name);
          };
          row.querySelector('[data-kill]').onclick = async (e) => {
            e.stopPropagation();
            if (!confirm('Kill session "' + s.name + '"?')) return;
            await fetch('/api/session/stop', {
              method: 'POST', headers: { 'content-type': 'application/json' },
              body: JSON.stringify({ sessionName: s.name })
            });
            showToast('Killed: ' + s.name);
            renderSessions();
          };
          group.appendChild(row);
        });
        container.appendChild(group);
      }

      renderGroup('Dashboard Sessions', dashSessions);
      renderGroup('Agent Sessions', otherSessions);
    }

    function render() {
      updateViewTabs();
      // Clean up view-specific toolbars when switching views
      if (state.view !== 'pipeline') {
        const stalePipeline = document.querySelector('.pipeline-toolbar:not(.monitor-toolbar)');
        if (stalePipeline) stalePipeline.remove();
      }
      if (state.view !== 'monitor') {
        const staleMonitor = document.querySelector('.monitor-toolbar');
        if (staleMonitor) staleMonitor.remove();
      }
      // Show/hide sidebar based on view
      const sidebar = document.getElementById('repo-sidebar');
      const mobileSelect = document.getElementById('repo-select-mobile');
      if (state.view === 'settings') {
        sidebar.style.display = 'none';
        mobileSelect.style.display = 'none';
        document.getElementById('sessions-view').style.display = 'none';
        document.getElementById('statistics-view').style.display = 'none';
        document.getElementById('repos').style.display = '';
        renderSettings();
      } else if (state.view === 'sessions') {
        sidebar.style.display = 'none';
        mobileSelect.style.display = 'none';
        document.getElementById('repos').style.display = 'none';
        document.getElementById('empty').style.display = 'none';
        document.getElementById('monitor-summary').style.display = 'none';
        document.getElementById('repo-header').style.display = 'none';
        document.getElementById('sessions-view').style.display = '';
        document.getElementById('statistics-view').style.display = 'none';
        renderSessions();
      } else if (state.view === 'statistics') {
        sidebar.style.display = 'none';
        mobileSelect.style.display = 'none';
        document.getElementById('repos').style.display = 'none';
        document.getElementById('empty').style.display = 'none';
        document.getElementById('monitor-summary').style.display = 'none';
        document.getElementById('repo-header').style.display = 'none';
        document.getElementById('sessions-view').style.display = 'none';
        document.getElementById('statistics-view').style.display = '';
        renderStatistics();
      } else {
        sidebar.style.display = '';
        mobileSelect.style.display = '';
        document.getElementById('repos').style.display = '';
        document.getElementById('sessions-view').style.display = 'none';
        document.getElementById('statistics-view').style.display = 'none';
        if (state.view === 'pipeline') {
          renderPipeline();
        } else {
          renderMonitor();
        }
      }
    }

    function refreshTimestamps() {
      document.querySelectorAll('[data-updated]').forEach(n => { n.textContent = relTime(n.getAttribute('data-updated')); });
      const generatedAt = (state.data && state.data.generatedAt) ? state.data.generatedAt : new Date().toISOString();
      document.getElementById('updated-text').textContent = 'Updated ' + relTime(generatedAt);
    }

    function flattenStatuses(data) {
      const map = new Map();
      (data.repos || []).forEach(repo => {
        (repo.features || []).forEach(feature => {
          (feature.agents || []).forEach(agent => {
            map.set(repo.path + ':' + feature.id + ':' + agent.id, { status: agent.status, cmd: agent.slashCommand });
          });
        });
      });
      return map;
    }

    async function poll() {
      const previous = flattenStatuses(state.data || {});
      try {
        const res = await fetch('/api/status', { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const next = await res.json();
        state.failures = 0;
        const current = flattenStatuses(next);
        current.forEach((v, k) => {
          const prev = previous.get(k);
          if (!prev) return;
          if (prev.status !== 'waiting' && v.status === 'waiting') {
            showToast('Agent is waiting', v.cmd ? 'Copy command' : null, v.cmd ? () => copyText(v.cmd).then(() => showToast('Copied: ' + v.cmd)) : null);
          }
          if (prev.status !== 'error' && v.status === 'error') showToast('Agent entered error state', null, null, {error:true});
        });
        state.data = next;
        render();
      } catch (e) {
        state.failures += 1;
        setHealth();
      }
    }

    // ── Init ──────────────────────────────────────────────────────────────────

    render();
    document.getElementById('refresh-btn').onclick = requestRefresh;
    setInterval(refreshTimestamps, TS_MS);
    setInterval(poll, POLL_MS);
    setTimeout(poll, 400);

    document.querySelectorAll('.view-tab').forEach(tab => {
      tab.onclick = () => {
        state.view = tab.getAttribute('data-view');
        localStorage.setItem('aigon.dashboard.view', state.view);
        render();
      };
    });
  </script>
</body>
</html>`;
