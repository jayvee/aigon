<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aigon Dashboard</title>
  <link rel="icon" type="image/x-icon" href="assets/icon/favicon.ico"/>
  <link rel="icon" type="image/svg+xml" href="assets/icon/aigon-icon.svg"/>
  <link rel="stylesheet" href="/styles.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1><img src="assets/icon/aigon-icon.svg" alt="Aigon" width="28" height="28"/>Aigon Dashboard</h1>
      <div class="meta">
        <span class="health" aria-live="polite"><span class="dot" id="health-dot"></span><span id="health-text">Connected</span></span>
        <span id="updated-text">Updated just now</span>
        <button class="notif-btn" id="notif-bell-btn" title="Notifications" aria-label="Notifications">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 1.5a4.5 4.5 0 0 0-4.5 4.5v1.75L2 9.5h12l-1.5-1.75V6A4.5 4.5 0 0 0 8 1.5z"/><path d="M6.5 13.5a1.5 1.5 0 0 0 3 0"/></svg>
          <span class="notif-badge" id="notif-badge" data-hidden>0</span>
        </button>
        <button class="btn" id="refresh-btn" title="Force refresh status">Refresh</button>
        <a class="btn docs-link" id="docs-link" href="https://www.aigon.build" target="_blank" title="Open Aigon docs">?</a>
      </div>
    </div>
    <nav class="view-tabs" aria-label="Dashboard views">
      <button class="view-tab" id="tab-monitor" data-view="monitor">Monitor</button>
      <button class="view-tab" id="tab-pipeline" data-view="pipeline">Pipeline</button>
      <button class="view-tab" id="tab-sessions" data-view="sessions">Sessions</button>
      <button class="view-tab" id="tab-statistics" data-view="statistics">Reports</button>
      <button class="view-tab" id="tab-insights" data-view="insights">Insights<sup style="font-size:8px;opacity:0.6;margin-left:2px;vertical-align:super">PRO</sup></button>
      <button class="view-tab" id="tab-logs" data-view="logs">Logs</button>
      <button class="view-tab" id="tab-all-items" data-view="all-items">All Items</button>
      <button class="view-tab" id="tab-settings" data-view="settings">Settings</button>
    </nav>
    <select id="repo-select-mobile" class="repo-select-mobile" aria-label="Select repository"></select>
    <div class="dashboard-body">
      <button class="sidebar-toggle-btn" id="sidebar-toggle-btn" title="Hide sidebar" aria-label="Hide sidebar">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <path d="M2.5 3.5h11"/>
          <path d="M2.5 8h11"/>
          <path d="M2.5 12.5h11"/>
        </svg>
      </button>
      <nav id="repo-sidebar" class="repo-sidebar" role="listbox" aria-label="Repository selector"><div class="sidebar-resize" id="sidebar-resize"></div></nav>
      <div class="detail-area" id="detail-area">
        <div id="repo-header" class="repo-header-bar" x-ignore style="display:none"></div>

        <!-- ── Monitor view — Alpine component ──────────────────────────────── -->
        <div id="monitor-view" x-data="monitorView()" x-cloak x-show="$store.dashboard.view === 'monitor'" x-on:click.passive="handleMonitorClick($event)">
          <!-- Monitor type toggle -->
          <div class="pipeline-toolbar monitor-toolbar">
            <div class="pipeline-type-toggle">
              <template x-for="opt in monitorTypeOpts" :key="opt.key">
                <button class="toggle-btn" :class="{ active: $store.dashboard.monitorType === opt.key }" x-on:click="setMonitorType(opt.key)" x-text="opt.label"></button>
              </template>
            </div>
          </div>
          <!-- Filter summary pills -->
          <div id="monitor-summary" class="summary" aria-label="Agent status summary">
            <button class="pill pill-filter" :class="{ active: $store.dashboard.filter === 'all' }" x-on:click.stop="setFilter('all')">All</button>
            <button class="pill pill-filter" :class="{ active: $store.dashboard.filter === 'implementing' }" x-on:click.stop="setFilter('implementing')" x-text="computedSummary.implementing + ' implementing'"></button>
            <button class="pill pill-filter waiting" :class="{ active: $store.dashboard.filter === 'waiting' }" x-on:click.stop="setFilter('waiting')" x-text="computedSummary.waiting + ' waiting'"></button>
            <button class="pill pill-filter" :class="{ active: $store.dashboard.filter === 'submitted' }" x-on:click.stop="setFilter('submitted')" x-text="computedSummary.submitted + ' submitted'"></button>
            <button class="pill pill-filter" :class="{ active: $store.dashboard.filter === 'error' }" x-on:click.stop="setFilter('error')" x-text="computedSummary.error + ' error'"></button>
          </div>
          <!-- Repos grid -->
          <div :class="'repos' + ($store.dashboard.selectedRepo !== 'all' ? ' single-repo' : '')">
            <div class="empty" x-show="!!emptyMessage" x-text="emptyMessage"></div>
            <template x-for="repo in visibleRepos" :key="repo.path">
              <section :class="'repo' + (isCollapsed(repo.path) ? ' collapsed' : '')" x-show="getTotalItems(repo) > 0">
                <div class="repo-h" x-on:click.stop="toggleCollapse(repo.path)">
                  <strong x-text="repo.name || repo.displayPath"></strong>
                  <span x-html="repoSummaryText(repo)"></span>
                  <span x-html="buildMainDevServerHtml(repo)" x-on:click.stop></span>
                  <span x-html="buildAskAgentHtml(repo.path)" x-on:click.stop="handleAskClick($event)"></span>
                </div>
                <div class="repo-b" x-show="!isCollapsed(repo.path)">
                  <!-- Feature cards -->
                  <template x-for="feature in getFeatures(repo)" :key="'f-' + feature.id + '-' + feature.name">
                    <article class="card feature-card"
                             :class="{ 'waiting': feature.agents.some(a => a.status === 'waiting'), 'evaluating': feature.stage === 'in-evaluation' }"
                             :style="feature.specPath ? 'cursor:pointer' : ''"
                             x-on:click="openFeatureSpec($event, feature)">
                      <div class="card-h">
                        <span class="feature" x-html="featureTitle(feature)"></span>
                        <span class="head-actions" x-html="buildNextActionHtml(feature, repo.path)"></span>
                      </div>
                      <div class="rows">
                        <template x-for="agent in sortedAgents(feature.agents)" :key="agent.id">
                          <div class="row" :class="[agent.status, 'agent-' + agent.id]">
                            <span class="agent" x-text="agentDisplayName(agent)"></span>
                            <span x-html="buildAgentStatusSpan(agent, { showDevLink: true })"></span>
                            <span class="stamp" :data-updated="agent.updatedAt" x-text="relTimeProxy(agent.updatedAt)"></span>
                            <span class="row-actions">
                              <button x-show="!!agent.slashCommand" class="btn" x-on:click.stop="copyCmd(agent.slashCommand)">Copy cmd</button>
                              <span x-html="buildAgentOverflowHtml(agent, feature, repo.path)"></span>
                            </span>
                          </div>
                        </template>
                        <template x-for="rs in (feature.reviewSessions || [])" :key="rs.session">
                          <div class="row" :class="rs.running ? 'reviewing' : 'submitted'">
                            <span class="agent">Review</span>
                            <span :class="rs.running ? 'kcard-agent-status status-reviewing' : 'kcard-agent-status status-review-done'"
                                  x-text="(rs.running ? '● ' : '✓ ') + (AGENT_DISPLAY_NAMES[rs.agent] || rs.agent) + ' — ' + (rs.running ? 'Reviewing' : 'Review complete')"></span>
                          </div>
                        </template>
                      </div>
                    </article>
                  </template>
                  <!-- Research cards -->
                  <template x-for="item in getResearch(repo)" :key="'r-' + item.id + '-' + item.name">
                    <article class="card research"
                             :class="{ 'waiting': item.agents.some(a => a.status === 'waiting') }"
                             :style="item.specPath ? 'cursor:pointer' : ''"
                             x-on:click="openSpecItem($event, item, 'R#')">
                      <div class="card-h">
                        <span class="feature" x-html="researchTitle(item)"></span>
                        <span class="head-actions" x-html="researchEvalBtn(item)"></span>
                      </div>
                      <div class="rows">
                        <template x-for="agent in sortedAgents(item.agents)" :key="agent.id">
                          <div class="row" :class="[agent.status, 'agent-' + agent.id]">
                            <span class="agent" x-text="AGENT_DISPLAY_NAMES[agent.id] || agent.id"></span>
                            <span x-html="buildAgentStatusSpan(agent, { showDevLink: true })"></span>
                            <span class="stamp" :data-updated="agent.updatedAt" x-text="relTimeProxy(agent.updatedAt)"></span>
                            <span class="row-actions">
                              <button x-show="!!agent.findingsPath" class="btn" x-on:click.stop="openResearchFindingsPeek(agent.findingsPath, 'R#' + item.id + ' ' + (AGENT_DISPLAY_NAMES[agent.id] || agent.id) + ' Findings')">View</button>
                              <button x-show="!!agent.slashCommand" class="btn" x-on:click.stop="copyCmd(agent.slashCommand)">Copy cmd</button>
                              <span x-html="buildAgentOverflowHtml(agent, item, repo.path)"></span>
                            </span>
                          </div>
                        </template>
                      </div>
                    </article>
                  </template>
                  <!-- Feedback cards -->
                  <template x-for="item in getFeedback(repo)" :key="'fb-' + item.id + '-' + item.name">
                    <article class="card"
                             :class="{ 'waiting': (item.agents || []).some(a => a.status === 'waiting') }"
                             :style="item.specPath ? 'cursor:pointer' : ''"
                             x-on:click="openSpecItem($event, item, 'FB#')">
                      <div class="card-h">
                        <span class="feature" x-html="feedbackTitle(item)"></span>
                      </div>
                      <div class="rows">
                        <template x-for="agent in sortedAgents(item.agents || [])" :key="agent.id">
                          <div class="row" :class="[agent.status, 'agent-' + agent.id]">
                            <span class="agent" x-text="AGENT_DISPLAY_NAMES[agent.id] || agent.id"></span>
                            <span x-html="buildAgentStatusSpan(agent, { showDevLink: true })"></span>
                            <span class="stamp" :data-updated="agent.updatedAt" x-text="relTimeProxy(agent.updatedAt)"></span>
                            <span class="row-actions">
                              <button x-show="!!agent.slashCommand" class="btn" x-on:click.stop="copyCmd(agent.slashCommand)">Copy cmd</button>
                              <span x-html="buildAgentOverflowHtml(agent, item, repo.path)"></span>
                            </span>
                          </div>
                        </template>
                      </div>
                    </article>
                  </template>
                </div>
              </section>
            </template>
          </div>
        </div>

        <!-- ── Pipeline view — Alpine component ─────────────────────────────── -->
        <div id="pipeline-view" x-data="pipelineView()" x-cloak x-show="$store.dashboard.view === 'pipeline'">
          <!-- Pipeline type toggle -->
          <div class="pipeline-toolbar">
            <div class="pipeline-type-toggle">
              <template x-for="opt in pipelineTypeOpts" :key="opt.key">
                <button class="toggle-btn" :class="{ active: $store.dashboard.pipelineType === opt.key }" x-on:click="setPipelineType(opt.key)" x-text="opt.label"></button>
              </template>
            </div>
            <button class="btn btn-sm pipeline-paused-toggle"
                    x-show="$store.dashboard.pipelineType === 'features'"
                    x-on:click="togglePaused()"
                    x-text="showPaused ? 'Hide Paused' : 'Show Paused'"
                    :style="showPaused ? 'opacity:1' : 'opacity:0.5'"></button>
          </div>
          <!-- Empty state -->
          <div class="empty" x-show="visibleRepos.length === 0" x-text="emptyMessage"></div>
          <!-- Kanban boards per repo -->
          <template x-for="repo in visibleRepos" :key="repo.path">
            <div>
              <div x-show="$store.dashboard.selectedRepo === 'all' && visibleRepos.length > 1"
                   style="display:flex;align-items:center;gap:8px;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-tertiary);margin:10px 0 6px;font-weight:600">
                <span x-text="repo.displayPath || repo.name"></span>
                <span x-html="buildMainDevServerHtml(repo)" style="text-transform:none;letter-spacing:0;font-weight:400" x-on:click.stop></span>
                <span x-html="buildAskAgentHtml(repo.path)" style="text-transform:none;letter-spacing:0;font-weight:400"></span>
              </div>
              <div class="kanban" :style="'--kanban-cols:' + currentStages.length">
                <template x-for="stage in currentStages" :key="stage">
                  <div class="kanban-col" :data-stage="stage" :data-repo-path="repo.path"
                       x-on:dragover.prevent="onDragOver($event, stage)"
                       x-on:dragleave="onDragLeave($event)"
                       x-on:drop.prevent="onDrop($event, stage, repo.path)">
                    <div class="col-h">
                      <span class="col-title" x-text="STAGE_LABELS[stage]"></span>
                      <span style="display:flex;align-items:center;gap:8px">
                        <span class="col-count" x-text="getStageDisplayCount(repo, stage)"></span>
                        <button class="btn btn-primary col-new-feature-btn"
                                x-show="$store.dashboard.pipelineType === 'features' && stage === 'inbox'"
                                x-on:click.stop="createNewSpec(repo.path)">+ New Feature</button>
                      </span>
                    </div>
                    <div class="col-body" x-effect="renderKanbanColCards($el, repo, stage)"></div>
                  </div>
                </template>
              </div>
            </div>
          </template>
        </div>

        <!-- Settings view — vanilla JS writes here -->
        <div id="settings-view" class="repos" x-ignore style="display:none"></div>
        <div id="empty" class="empty" x-ignore style="display:none"></div>
        <div id="sessions-view" x-ignore style="display:none;padding:0 0 28px"></div>
        <div id="statistics-view" x-ignore style="display:none"></div>
        <div id="insights-view" x-ignore style="display:none;padding:0 0 28px"></div>
        <div id="all-items-view" x-ignore style="display:none;padding:0 0 28px"></div>
        <div id="logs-view" x-ignore style="display:none"></div>
      </div>
    </div>
  </div>
  <div id="toasts" class="toast-wrap" aria-live="polite"></div>
  <!-- Agent picker modal -->
  <div id="agent-picker" class="modal-backdrop" x-ignore style="display:none" role="dialog" aria-modal="true" aria-labelledby="agent-picker-title">
    <div class="modal-box">
      <h3 id="agent-picker-title">Select Agents</h3>
      <p class="modal-desc" id="agent-picker-desc"></p>
      <div class="agent-checks">
        <label class="agent-check-row"><input type="checkbox" value="cc"><span class="agent-check-label">cc</span><span class="agent-check-hint">Claude Code</span></label>
        <label class="agent-check-row"><input type="checkbox" value="cx"><span class="agent-check-label">cx</span><span class="agent-check-hint">Codex</span></label>
        <label class="agent-check-row"><input type="checkbox" value="gg"><span class="agent-check-label">gg</span><span class="agent-check-hint">Gemini</span></label>
<label class="agent-check-row"><input type="checkbox" value="cu"><span class="agent-check-label">cu</span><span class="agent-check-hint">Cursor</span></label>
      </div>
      <div class="modal-actions">
        <button class="btn" id="agent-picker-cancel">Cancel</button>
        <button class="btn btn-primary" id="agent-picker-submit">Setup</button>
      </div>
    </div>
  </div>
  <!-- Close & Merge modal (fleet features with winner + adoption) -->
  <div id="close-modal" class="modal-backdrop" x-ignore style="display:none" role="dialog" aria-modal="true" aria-labelledby="close-modal-title">
    <div class="modal-box">
      <h3 id="close-modal-title">Close & Merge</h3>
      <p class="modal-desc" id="close-modal-desc"></p>
      <div style="margin-bottom:12px">
        <label style="display:block;font-size:12px;color:var(--text-secondary);margin-bottom:6px;font-weight:600">Winner</label>
        <div class="agent-checks" id="close-modal-winners"></div>
      </div>
      <div id="close-modal-adopt-section" style="margin-bottom:12px">
        <label style="display:block;font-size:12px;color:var(--text-secondary);margin-bottom:6px;font-weight:600">Adopt changes from</label>
        <div class="agent-checks" id="close-modal-adopt"></div>
      </div>
      <div class="modal-actions">
        <button class="btn" id="close-modal-cancel">Cancel</button>
        <button class="btn btn-primary" id="close-modal-submit">Close & Merge</button>
      </div>
    </div>
  </div>
  <!-- Start autonomously modal -->
  <div id="autonomous-modal" class="modal-backdrop" x-ignore style="display:none" role="dialog" aria-modal="true" aria-labelledby="autonomous-modal-title">
    <div class="modal-box">
      <h3 id="autonomous-modal-title">Start Autonomously</h3>
      <p class="modal-desc" id="autonomous-modal-desc"></p>
      <div style="margin-bottom:12px">
        <label style="display:block;font-size:12px;color:var(--text-secondary);margin-bottom:6px;font-weight:600">Workflow</label>
        <select id="autonomous-workflow-select" class="create-input" style="padding:8px 10px"></select>
      </div>
      <div style="margin-bottom:12px">
        <label style="display:block;font-size:12px;color:var(--text-secondary);margin-bottom:6px;font-weight:600">Implementation agents</label>
        <div class="agent-checks" id="autonomous-agent-checks"></div>
      </div>
      <div id="autonomous-eval-wrap" style="margin-bottom:12px">
        <label style="display:block;font-size:12px;color:var(--text-secondary);margin-bottom:6px;font-weight:600">Evaluator</label>
        <select id="autonomous-eval-agent" class="create-input" style="padding:8px 10px"></select>
      </div>
      <div id="autonomous-review-wrap" style="margin-bottom:12px;display:none">
        <label style="display:block;font-size:12px;color:var(--text-secondary);margin-bottom:6px;font-weight:600">Reviewer</label>
        <select id="autonomous-review-agent" class="create-input" style="padding:8px 10px"></select>
      </div>
      <div style="margin-bottom:12px">
        <label style="display:block;font-size:12px;color:var(--text-secondary);margin-bottom:6px;font-weight:600">Stop after</label>
        <select id="autonomous-stop-after" class="create-input" style="padding:8px 10px">
          <option value="close">close (default)</option>
          <option value="eval">eval</option>
          <option value="review">review</option>
          <option value="implement">implement</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn" id="autonomous-save-workflow" type="button">Save as workflow</button>
        <button class="btn" id="autonomous-modal-cancel">Cancel</button>
        <button class="btn btn-primary" id="autonomous-modal-submit">Start Autonomously</button>
      </div>
    </div>
  </div>
  <!-- Create feature modal -->
  <div id="create-modal" class="modal-backdrop" x-ignore style="display:none" role="dialog" aria-modal="true" aria-labelledby="create-modal-title">
    <div class="modal-box create-modal-box">
      <h3 id="create-modal-title">New Feature</h3>
      <div id="create-modal-repo-picker" style="display:none;margin-bottom:14px">
        <label style="display:block;font-size:12px;color:var(--text-secondary);margin-bottom:6px">Repository</label>
        <select id="create-modal-repo" class="create-input" style="padding:8px 10px"></select>
      </div>
      <label style="display:block;font-size:12px;color:var(--text-secondary);margin-bottom:6px">Name</label>
      <input type="text" id="create-modal-name" class="create-input" placeholder="e.g. dark mode toggle" maxlength="80" autofocus />
      <label style="display:block;font-size:12px;color:var(--text-secondary);margin:12px 0 6px">Description (optional)</label>
      <textarea id="create-modal-description" class="create-input create-textarea" rows="4" placeholder="What should this feature do? Any technical ideas or constraints?"></textarea>
      <label style="display:block;font-size:12px;color:var(--text-secondary);margin:12px 0 6px">Refine with agent</label>
      <div class="create-agent-picks" id="create-modal-agent">
        <label class="create-agent-opt"><input type="radio" name="create-agent" value="cc" checked><span>cc</span></label>
        <label class="create-agent-opt"><input type="radio" name="create-agent" value="gg"><span>gg</span></label>
        <label class="create-agent-opt"><input type="radio" name="create-agent" value="cx"><span>cx</span></label>
        <label class="create-agent-opt"><input type="radio" name="create-agent" value=""><span>None</span></label>
      </div>
      <p id="create-modal-error" class="modal-error" style="display:none"></p>
      <div class="modal-actions" style="margin-top:16px">
        <button class="btn" id="create-modal-cancel">Cancel</button>
        <button class="btn btn-primary" id="create-modal-submit">Create</button>
      </div>
    </div>
  </div>
  <!-- Notification dropdown -->
  <div id="notif-overlay" class="notif-overlay" x-ignore></div>
  <aside id="notif-dropdown" class="notif-dropdown" x-ignore role="dialog" aria-modal="true" aria-label="Notifications">
    <div class="notif-dropdown-header">
      <span class="notif-dropdown-title">Notifications</span>
      <button class="notif-close-btn" id="notif-close-btn" aria-label="Close notifications">&times;</button>
    </div>
    <div class="notif-list" id="notif-list">
      <div class="notif-empty">No notifications yet</div>
    </div>
  </aside>
  <!-- Peek panel — streaming tmux output viewer -->
  <div id="peek-panel-overlay" class="drawer-overlay" x-ignore></div>
  <aside id="peek-panel" class="terminal-panel" x-ignore role="dialog" aria-modal="true" aria-label="Peek">
    <div class="drawer-header">
      <span class="panel-status-dot running" id="peek-status-dot"></span>
      <span class="drawer-title" id="peek-title">Peek</span>
      <div class="drawer-actions">
        <button class="btn" id="peek-fullscreen" title="Toggle fullscreen">⤢</button>
        <button class="btn" id="peek-close">Close</button>
      </div>
    </div>
    <div id="peek-output" style="flex:1;overflow:auto;background:#0a0a0b;padding:8px 12px;font-family:var(--mono);font-size:12px;color:#ededef;white-space:pre-wrap;word-break:break-all;line-height:1.5"></div>
    <div class="panel-footer" style="flex-direction:column;gap:6px;padding:8px 12px">
      <form id="peek-input-form" style="display:flex;gap:6px;width:100%">
        <input id="peek-input" type="text" placeholder="Send command…" autocomplete="off" spellcheck="false"
          style="flex:1;background:#18181b;border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:#ededef;font-family:var(--mono);font-size:12px;outline:none">
        <button type="submit" class="btn btn-primary" style="font-size:11px;padding:4px 12px">Send</button>
      </form>
      <div style="display:flex;justify-content:space-between;align-items:center;width:100%">
        <span id="peek-session-name" style="font-family:var(--mono);font-size:11px;color:var(--text-tertiary)"></span>
        <span id="peek-bytes" style="font-size:11px;color:var(--text-tertiary)"></span>
      </div>
    </div>
  </aside>
  <!-- Terminal panel -->
  <div id="terminal-panel-overlay" class="drawer-overlay" x-ignore></div>
  <aside id="terminal-panel" class="terminal-panel" x-ignore role="dialog" aria-modal="true" aria-label="Terminal">
    <div class="drawer-header">
      <span class="panel-status-dot" id="panel-status-dot"></span>
      <span class="drawer-title" id="panel-title">Terminal</span>
      <div class="drawer-actions" id="panel-actions-normal">
        <button class="btn" id="panel-back" style="display:none" title="Close both panels and return to dashboard">← Dashboard</button>
        <button class="btn" id="panel-view-spec" style="display:none" title="View the spec file alongside the terminal">View Spec</button>
        <button class="btn" id="panel-fullscreen" title="Toggle fullscreen (Cmd+Shift+F)">⤢</button>

    <div class="drawer-body" id="drawer-body">
