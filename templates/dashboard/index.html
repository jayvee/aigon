<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aigon Dashboard</title>
  <style>
    :root{color-scheme:dark;-webkit-font-smoothing:antialiased;--bg-root:#0a0a0b;--bg-surface:#111113;--bg-elevated:#1a1a1f;--bg-hover:#222228;--border-subtle:rgba(255,255,255,.06);--border-default:rgba(255,255,255,.1);--text-primary:#ededef;--text-secondary:#a0a0a8;--text-tertiary:#6b6b76;--accent:#3b82f6;--success:#22c55e;--warning:#f59e0b;--error:#ef4444;--radius:12px;--mono:"SF Mono","Cascadia Code",ui-monospace,monospace}
    *{box-sizing:border-box}html,body{margin:0;background:var(--bg-root);color:var(--text-primary);font:13px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
    body{padding:20px 16px 28px}
    .wrap{max-width:1400px;margin:0 auto}
    .top{display:flex;justify-content:space-between;align-items:flex-end;gap:12px;margin-bottom:10px}
    h1{margin:0;font-size:24px;letter-spacing:-.02em}
    .meta{display:flex;gap:10px;color:var(--text-secondary)}
    .health{display:flex;align-items:center;gap:6px}
    /* View tabs */
    .view-tabs{display:flex;gap:4px;margin:10px 0 14px;border-bottom:1px solid var(--border-subtle);padding-bottom:0}
    .view-tab{background:transparent;border:none;border-bottom:2px solid transparent;color:var(--text-secondary);padding:8px 16px;cursor:pointer;font-size:13px;margin-bottom:-1px;transition:color .12s ease,border-color .12s ease}
    .view-tab:hover{color:var(--text-primary)}
    .view-tab.active{color:var(--text-primary);border-bottom-color:var(--accent)}
    /* Monitor view */
    .summary{display:flex;gap:8px;margin:0 0 14px;flex-wrap:wrap}
    .pill{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:999px;padding:5px 10px}
    .pill.waiting{border-color:rgba(245,158,11,.4);color:#f8c060}
    .pill-filter{cursor:pointer;transition:border-color .12s ease,background .12s ease,color .12s ease}
    .pill-filter:hover{border-color:var(--border-default);background:var(--bg-elevated)}
    .pill-filter.active{border-color:rgba(59,130,246,.7);background:rgba(59,130,246,.15);color:#dbeafe}
    .pill-filter.waiting.active{border-color:rgba(245,158,11,.55);background:rgba(245,158,11,.15);color:#f8c060}
    .repos{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    @media (max-width: 1120px){.repos{grid-template-columns:1fr}}
    .repo{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius);overflow:hidden}
    .repo-h{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-bottom:1px solid var(--border-subtle);cursor:pointer}
    .repo-h strong{font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--text-secondary)}
    .repo-b{padding:10px;display:grid;gap:10px}
    .card{border:1px solid var(--border-subtle);border-radius:10px;background:rgba(255,255,255,.01);transition:background .12s ease,border-color .12s ease}
    .card:hover{background:var(--bg-elevated);border-color:var(--border-default)}
    .card.waiting{border-left:2px solid var(--warning)}
    .card.evaluating{border-left:2px solid #a78bfa}
    .card.research{border-left:2px solid #06b6d4}
    .research-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:999px;background:rgba(6,182,212,.12);border:1px solid rgba(6,182,212,.35);color:#67e8f9;margin-left:6px;flex-shrink:0}
    .research-badge.all-submitted{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.35);color:#86efac}
    .eval-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:999px;background:rgba(167,139,250,.15);border:1px solid rgba(167,139,250,.35);color:#c4b5fd;margin-left:6px;flex-shrink:0}
    .eval-badge.pick-winner{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.35);color:#86efac}
    .card-h{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:10px 10px 6px}
    .card-h .feature{letter-spacing:-.02em;font-weight:600;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .head-actions{display:flex;align-items:center;justify-content:flex-end;flex:0 0 auto}
    .rows{padding:0 8px 8px;display:grid;gap:6px}
    .row{display:grid;grid-template-columns:56px minmax(130px,1fr) 90px auto;align-items:center;gap:10px;padding:6px 4px;border-radius:8px}
    .agent,.cmd{font-family:var(--mono)}
    .stamp{color:var(--text-tertiary);white-space:nowrap}
    .status{display:inline-flex;align-items:center;gap:8px}
    .dot{width:8px;height:8px;border-radius:50%}
    .implementing .dot{background:var(--accent);box-shadow:0 0 0 0 rgba(59,130,246,.6);animation:pulse 1.5s infinite}
    .waiting .dot{background:var(--warning);box-shadow:0 0 8px rgba(245,158,11,.5)}
    .submitted .dot{background:transparent;position:relative}
    .submitted .dot::before{content:"";position:absolute;left:1px;top:0;width:6px;height:10px;border:solid var(--success);border-width:0 2px 2px 0;transform:rotate(45deg)}
    .error .dot{background:var(--error);box-shadow:0 0 8px rgba(239,68,68,.45)}
    .btn{background:transparent;border:1px solid var(--border-default);border-radius:8px;color:var(--text-secondary);padding:4px 10px;cursor:pointer;line-height:1;font-size:12px;white-space:nowrap}
    .btn:hover{color:var(--text-primary);border-color:var(--accent)}
    .btn:disabled{opacity:.45;cursor:not-allowed;pointer-events:none}
    .btn-primary{background:rgba(59,130,246,.14);border-color:rgba(59,130,246,.45);color:#bdd7ff}
    .btn-primary:hover{background:rgba(59,130,246,.2);border-color:rgba(59,130,246,.7);color:#e2eeff}
    .btn-success{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.4);color:#86efac}
    .btn-success:hover{background:rgba(34,197,94,.18);border-color:rgba(34,197,94,.65);color:#bbf7d0}
    .btn-warn{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.4);color:#fcd34d}
    .btn-warn:hover{background:rgba(245,158,11,.18);border-color:rgba(245,158,11,.65);color:#fde68a}
    .next-copy{font-size:11px}
    .row-actions{display:flex;align-items:center;justify-content:flex-end;gap:6px;flex-wrap:nowrap;min-width:0}
    .empty{padding:18px;color:var(--text-secondary);background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius)}
    .toast-wrap{position:fixed;right:12px;bottom:12px;display:grid;gap:8px;z-index:50}
    .toast{background:var(--bg-surface);border:1px solid var(--border-default);padding:10px 12px;border-radius:10px;min-width:260px}
    .toast button{margin-left:8px;background:transparent;border:1px solid var(--border-default);border-radius:6px;color:var(--text-primary)}
    .repo.collapsed .repo-b{display:none}
    @keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(2.2);opacity:.05}}
    @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
    /* Pipeline / Kanban */
    .kanban{display:grid;grid-template-columns:repeat(5,minmax(200px,1fr));gap:10px;align-items:start;overflow-x:auto;padding-bottom:8px}
    .kanban-col{background:var(--bg-surface);border:1px solid var(--border-subtle);border-radius:var(--radius);overflow:hidden;min-height:120px}
    .kanban-col.drag-over{border-color:rgba(59,130,246,.6);background:rgba(59,130,246,.06)}
    .kanban-col.drag-blocked{border-color:rgba(239,68,68,.4)}
    .col-h{padding:9px 12px;border-bottom:1px solid var(--border-subtle);display:flex;justify-content:space-between;align-items:center}
    .col-title{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--text-secondary)}
    .col-count{font-size:11px;color:var(--text-tertiary)}
    .col-body{padding:8px;display:grid;gap:6px;min-height:60px}
    .kcard{border:1px solid var(--border-subtle);border-radius:8px;background:rgba(255,255,255,.01);padding:8px 10px;cursor:grab;transition:background .12s ease,border-color .12s ease,box-shadow .12s ease}
    .kcard:hover{background:var(--bg-elevated);border-color:var(--border-default)}
    .kcard.dragging{opacity:.4;cursor:grabbing}
    .kcard-id{font-size:11px;color:var(--text-tertiary);font-family:var(--mono)}
    .kcard-name{font-size:12px;font-weight:500;margin:2px 0 6px;line-height:1.3;color:var(--text-primary);word-break:break-word}
    .kcard-agents{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px}
    .agent-badge{font-size:10px;font-family:var(--mono);padding:1px 6px;border-radius:999px;background:var(--bg-elevated);border:1px solid var(--border-subtle);color:var(--text-secondary)}
    .agent-badge.implementing{border-color:rgba(59,130,246,.4);color:#93c5fd}
    .agent-badge.waiting{border-color:rgba(245,158,11,.4);color:#fcd34d}
    .agent-badge.submitted{border-color:rgba(34,197,94,.4);color:#86efac}
    .agent-badge.error{border-color:rgba(239,68,68,.4);color:#fca5a5}
    .kcard-actions{display:flex;gap:5px;flex-wrap:wrap}
    .kcard-actions .btn{font-size:11px;padding:3px 8px}
    .col-empty{padding:12px 8px;color:var(--text-tertiary);font-size:12px;text-align:center}
    /* Agent picker modal */
    .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:center;justify-content:center}
    .modal-box{background:var(--bg-surface);border:1px solid var(--border-default);border-radius:var(--radius);padding:20px 24px;min-width:280px;max-width:400px;width:100%}
    .modal-box h3{margin:0 0 14px;font-size:15px;letter-spacing:-.01em}
    .modal-desc{color:var(--text-secondary);font-size:12px;margin:0 0 14px}
    .agent-checks{display:grid;gap:8px;margin-bottom:18px}
    .agent-check-row{display:flex;align-items:center;gap:10px;padding:7px 10px;border:1px solid var(--border-subtle);border-radius:8px;cursor:pointer;transition:background .1s ease,border-color .1s ease}
    .agent-check-row:hover{background:var(--bg-elevated);border-color:var(--border-default)}
    .agent-check-row input{cursor:pointer;accent-color:var(--accent)}
    .agent-check-label{font-family:var(--mono);font-size:13px;flex:1}
    .agent-check-hint{font-size:11px;color:var(--text-tertiary)}
    .modal-actions{display:flex;gap:8px;justify-content:flex-end}
    .modal-actions .btn{padding:6px 16px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <h1>Aigon Dashboard</h1>
      <div class="meta">
        <span class="health" aria-live="polite"><span class="dot" id="health-dot"></span><span id="health-text">Connected</span></span>
        <span id="updated-text">Updated just now</span>
        <button class="btn" id="refresh-btn" title="Force refresh status">Refresh</button>
      </div>
    </div>
    <nav class="view-tabs" aria-label="Dashboard views">
      <button class="view-tab" id="tab-monitor" data-view="monitor">Monitor</button>
      <button class="view-tab" id="tab-pipeline" data-view="pipeline">Pipeline</button>
    </nav>
    <div id="monitor-summary" class="summary" aria-label="Agent status summary"></div>
    <div id="repos" class="repos"></div>
    <div id="empty" class="empty" style="display:none"></div>
  </div>
  <div id="toasts" class="toast-wrap" aria-live="polite"></div>
  <!-- Agent picker modal -->
  <div id="agent-picker" class="modal-backdrop" style="display:none" role="dialog" aria-modal="true" aria-labelledby="agent-picker-title">
    <div class="modal-box">
      <h3 id="agent-picker-title">Select Agents</h3>
      <p class="modal-desc" id="agent-picker-desc"></p>
      <div class="agent-checks">
        <label class="agent-check-row"><input type="checkbox" value="cc"><span class="agent-check-label">cc</span><span class="agent-check-hint">Claude Code</span></label>
        <label class="agent-check-row"><input type="checkbox" value="cx"><span class="agent-check-label">cx</span><span class="agent-check-hint">Cursor</span></label>
        <label class="agent-check-row"><input type="checkbox" value="gg"><span class="agent-check-label">gg</span><span class="agent-check-hint">Gemini</span></label>
        <label class="agent-check-row"><input type="checkbox" value="cu"><span class="agent-check-label">cu</span><span class="agent-check-hint">Cursor (IDE)</span></label>
      </div>
      <div class="modal-actions">
        <button class="btn" id="agent-picker-cancel">Cancel</button>
        <button class="btn btn-primary" id="agent-picker-submit">Setup</button>
      </div>
    </div>
  </div>
  <script>
    const POLL_MS = 10000;
    const TS_MS = 30000;
    const INITIAL_DATA = ${INITIAL_DATA};
    const state = {
      data: INITIAL_DATA,
      failures: 0,
      lastStatuses: new Map(),
      collapsed: JSON.parse(localStorage.getItem('aigon.dashboard.collapsed') || '{}'),
      filter: localStorage.getItem('aigon.dashboard.filter') || 'all',
      view: localStorage.getItem('aigon.dashboard.view') || 'monitor',
      pendingActions: new Set()
    };

    // ── Utilities ─────────────────────────────────────────────────────────────

    function relTime(iso) {
      const diff = Math.max(0, Math.floor((Date.now() - new Date(iso).getTime()) / 1000));
      if (diff < 10) return 'just now';
      if (diff < 60) return diff + 's ago';
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      return Math.floor(diff / 3600) + 'h ago';
    }

    function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function statusRank(s){ return s === 'waiting' ? 0 : s === 'implementing' ? 1 : s === 'error' ? 2 : 3; }
    function featureRank(feature){ return feature.agents && feature.agents.length > 0 ? Math.min(...feature.agents.map(a => statusRank(a.status))) : 99; }

    function showToast(text, actionLabel, actionFn){
      const wrap = document.getElementById('toasts');
      const n = document.createElement('div');
      n.className = 'toast';
      n.textContent = text;
      if (actionLabel && actionFn) {
        const b = document.createElement('button');
        b.textContent = actionLabel;
        b.onclick = actionFn;
        n.appendChild(b);
      }
      wrap.prepend(n);
      while (wrap.children.length > 3) wrap.removeChild(wrap.lastChild);
      setTimeout(() => n.remove(), 5000);
    }

    async function copyText(text){
      try { await navigator.clipboard.writeText(text); return true; } catch (e) {}
      const ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta); ta.select();
      const ok = document.execCommand('copy'); ta.remove(); return ok;
    }

    // ── API helpers ───────────────────────────────────────────────────────────

    async function requestAttach(repoPath, featureId, agentId, tmuxSession){
      try {
        const res = await fetch('/api/attach', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ repoPath, featureId, agentId, tmuxSession })
        });
        const payload = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(payload.error || ('HTTP ' + res.status));
        showToast(payload.message || 'Attach opened in terminal');
      } catch (e) {
        showToast('Attach failed: ' + e.message);
      }
    }

    async function requestRefresh() {
      const btn = document.getElementById('refresh-btn');
      if (btn) btn.disabled = true;
      try {
        const res = await fetch('/api/refresh', { method: 'POST', cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const next = await res.json();
        state.failures = 0;
        state.data = next;
        render();
      } catch (e) {
        state.failures += 1;
        setHealth();
        showToast('Refresh failed: ' + e.message);
      } finally {
        if (btn) btn.disabled = false;
      }
    }

    async function requestAction(action, args, repoPath, btn) {
      const key = action + ':' + (args || []).join(':');
      if (state.pendingActions.has(key)) return;
      state.pendingActions.add(key);
      if (btn) { btn.disabled = true; btn.textContent = '...'; }
      try {
        const body = { action, args: args || [] };
        if (repoPath) body.repoPath = repoPath;
        const res = await fetch('/api/action', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify(body)
        });
        const payload = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(payload.error || ('HTTP ' + res.status));
        showToast('Done: ' + (payload.command || action));
        await requestRefresh();
      } catch (e) {
        showToast('Action failed: ' + e.message);
        if (btn) { btn.disabled = false; btn.textContent = btn._origText || action; }
      } finally {
        state.pendingActions.delete(key);
      }
    }

    async function requestWorktreeOpen(featureId, agentId, repoPath, btn) {
      if (btn) { btn.disabled = true; btn.textContent = '...'; }
      try {
        const body = { featureId, agentId };
        if (repoPath) body.repoPath = repoPath;
        const res = await fetch('/api/worktree-open', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify(body)
        });
        const payload = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(payload.error || ('HTTP ' + res.status));
        showToast(payload.message || 'Worktree opened');
      } catch (e) {
        showToast('Open worktree failed: ' + e.message);
      } finally {
        if (btn) { btn.disabled = false; btn.textContent = btn._origText || 'Open'; }
      }
    }

    // ── Agent picker ──────────────────────────────────────────────────────────

    let pickerResolve = null;

    function showAgentPicker(featureId, featureName) {
      return new Promise((resolve) => {
        pickerResolve = resolve;
        document.getElementById('agent-picker-desc').textContent = '#' + featureId + ' ' + featureName;
        document.querySelectorAll('#agent-picker input[type=checkbox]').forEach(cb => { cb.checked = false; });
        document.getElementById('agent-picker').style.display = 'flex';
        document.getElementById('agent-picker-submit').focus();
      });
    }

    function hideAgentPicker(result) {
      document.getElementById('agent-picker').style.display = 'none';
      if (pickerResolve) { pickerResolve(result); pickerResolve = null; }
    }

    document.getElementById('agent-picker-cancel').onclick = () => hideAgentPicker(null);
    document.getElementById('agent-picker').onclick = (e) => { if (e.target === e.currentTarget) hideAgentPicker(null); };
    document.getElementById('agent-picker-submit').onclick = () => {
      const selected = [...document.querySelectorAll('#agent-picker input[type=checkbox]:checked')].map(cb => cb.value);
      if (selected.length === 0) { showToast('Select at least one agent'); return; }
      hideAgentPicker(selected);
    };

    // ── Shared render helpers ─────────────────────────────────────────────────

    function updateTitleAndFavicon(waiting){
      document.title = waiting > 0 ? '(' + waiting + ') Aigon Dashboard' : 'Aigon Dashboard';
      const link = document.querySelector('link[rel="icon"]') || (() => { const x = document.createElement('link'); x.rel = 'icon'; document.head.appendChild(x); return x; })();
      if (!waiting) { link.href = 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2232%22 height=%2232%22></svg>'; return; }
      const c = document.createElement('canvas'); c.width = 32; c.height = 32;
      const ctx = c.getContext('2d');
      ctx.fillStyle = '#111113'; ctx.fillRect(0,0,32,32);
      ctx.fillStyle = '#f59e0b'; ctx.beginPath(); ctx.arc(16,16,13,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff'; ctx.font = 'bold 16px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(String(waiting > 99 ? '99+' : waiting), 16, 16);
      link.href = c.toDataURL('image/png');
    }

    function setHealth() {
      const dot = document.getElementById('health-dot');
      const text = document.getElementById('health-text');
      if (state.failures === 0) { dot.style.background = '#22c55e'; text.textContent = 'Connected'; return; }
      if (state.failures < 3) { dot.style.background = '#f59e0b'; text.textContent = 'Reconnecting...'; return; }
      dot.style.background = '#ef4444'; text.textContent = 'Disconnected';
    }

    function updateViewTabs() {
      document.querySelectorAll('.view-tab').forEach(tab => {
        tab.classList.toggle('active', tab.getAttribute('data-view') === state.view);
      });
    }

    // ── Monitor view ──────────────────────────────────────────────────────────

    function renderMonitor() {
      document.getElementById('monitor-summary').style.display = '';
      const data = state.data || { repos: [], summary: { implementing: 0, waiting: 0, submitted: 0, error: 0 } };
      const summary = data.summary || { implementing: 0, waiting: 0, submitted: 0, error: 0 };
      document.getElementById('monitor-summary').innerHTML =
        '<button class="pill pill-filter' + (state.filter === 'all' ? ' active' : '') + '" data-filter="all">All</button>' +
        '<button class="pill pill-filter' + (state.filter === 'implementing' ? ' active' : '') + '" data-filter="implementing">' + summary.implementing + ' implementing</button>' +
        '<button class="pill pill-filter waiting' + (state.filter === 'waiting' ? ' active' : '') + '" data-filter="waiting">' + summary.waiting + ' waiting</button>' +
        '<button class="pill pill-filter' + (state.filter === 'submitted' ? ' active' : '') + '" data-filter="submitted">' + summary.submitted + ' submitted</button>' +
        '<button class="pill pill-filter' + (state.filter === 'error' ? ' active' : '') + '" data-filter="error">' + summary.error + ' error</button>';
      updateTitleAndFavicon(summary.waiting || 0);
      setHealth();
      document.getElementById('updated-text').textContent = 'Updated ' + relTime(data.generatedAt || new Date().toISOString());

      const reposRoot = document.getElementById('repos');
      const empty = document.getElementById('empty');
      reposRoot.className = 'repos';
      reposRoot.innerHTML = '';

      if (!data.repos || data.repos.length === 0) {
        empty.style.display = '';
        empty.textContent = 'No repos registered. Run: aigon conductor add';
        return;
      }

      empty.style.display = 'none';
      let visibleItemCount = 0;
      data.repos.forEach(repo => {
        const section = document.createElement('section');
        section.className = 'repo' + (state.collapsed[repo.path] ? ' collapsed' : '');
        // Only show in-progress/in-evaluation features in monitor
        const rawFeatures = [...(repo.features || [])].filter(f => f.stage === 'in-progress' || f.stage === 'in-evaluation').sort((a, b) => featureRank(a) - featureRank(b) || Number(a.id) - Number(b.id));
        const features = rawFeatures.filter(f => state.filter === 'all' || f.agents.some(a => a.status === state.filter));
        const rawResearch = [...(repo.research || [])].sort((a, b) => featureRank(a) - featureRank(b) || Number(a.id) - Number(b.id));
        const research = rawResearch.filter(r => state.filter === 'all' || r.agents.some(a => a.status === state.filter));
        const totalItems = features.length + research.length;
        visibleItemCount += totalItems;
        const waitingCards = features.filter(f => f.agents.some(a => a.status === 'waiting')).length + research.filter(r => r.agents.some(a => a.status === 'waiting')).length;
        const headerParts = [];
        if (features.length > 0) headerParts.push(features.length + ' feature' + (features.length === 1 ? '' : 's'));
        if (research.length > 0) headerParts.push(research.length + ' research');
        const headerText = headerParts.join(', ') || '0 items';
        section.innerHTML = '<div class="repo-h"><strong>' + escHtml(repo.displayPath) + '</strong><span>' + headerText + (waitingCards ? ' • ' + waitingCards + ' waiting' : '') + ' <span aria-label="Toggle">' + (state.collapsed[repo.path] ? '[+]' : '[-]') + '</span></span></div><div class="repo-b"></div>';
        section.querySelector('.repo-h').onclick = () => {
          state.collapsed[repo.path] = !state.collapsed[repo.path];
          localStorage.setItem('aigon.dashboard.collapsed', JSON.stringify(state.collapsed));
          render();
        };
        const body = section.querySelector('.repo-b');
        if (totalItems === 0) {
          body.innerHTML = '<div class="empty">No features or research in progress.</div>';
        } else {
          features.forEach(feature => {
            const hasWaiting = feature.agents.some(a => a.status === 'waiting');
            const isEval = feature.stage === 'in-evaluation';
            const card = document.createElement('article');
            card.className = 'card' + (hasWaiting ? ' waiting' : '') + (isEval ? ' evaluating' : '');
            const rows = [...feature.agents].sort((a, b) => statusRank(a.status) - statusRank(b.status) || a.id.localeCompare(b.id));
            const nextCmd = feature.nextAction && feature.nextAction.command ? feature.nextAction.command : null;
            const nextReason = feature.nextAction && feature.nextAction.reason ? escHtml(feature.nextAction.reason) : '';
            const nextBtn = nextCmd ? '<button class="copy btn btn-primary next-copy" data-copy="' + escHtml(nextCmd) + '" title="' + nextReason + '">Copy next</button>' : '';
            const evalBadge = isEval ? '<span class="eval-badge' + (feature.evalStatus === 'pick winner' ? ' pick-winner' : '') + '">' + escHtml(feature.evalStatus || 'evaluating') + '</span>' : '';
            card.innerHTML = '<div class="card-h"><span class="feature">#' + escHtml(feature.id) + ' ' + escHtml(feature.name) + evalBadge + '</span><span class="head-actions">' + nextBtn + '</span></div><div class="rows"></div>';
            const rowsEl = card.querySelector('.rows');
            rows.forEach(agent => {
              const row = document.createElement('div');
              row.className = 'row ' + agent.status;
              const waitingCmd = agent.slashCommand
                ? '<button class="copy btn" data-copy="' + escHtml(agent.slashCommand) + '">Copy cmd</button>'
                : '';
              const attachBtn = agent.tmuxRunning
                ? '<button class="attach btn btn-primary" data-repo="' + escHtml(repo.path) + '" data-feature="' + escHtml(feature.id) + '" data-agent="' + escHtml(agent.id) + '" data-session="' + escHtml(agent.tmuxSession || '') + '">Attach</button>'
                : '';
              row.innerHTML = '<span class="agent">' + escHtml(agent.id) + '</span><span class="status ' + escHtml(agent.status) + '"><span class="dot"></span>' + escHtml(agent.status) + '</span><span class="stamp" data-updated="' + escHtml(agent.updatedAt) + '">' + relTime(agent.updatedAt) + '</span><span class="row-actions">' + waitingCmd + attachBtn + '</span>';
              rowsEl.appendChild(row);
            });
            body.appendChild(card);
          });
          research.forEach(item => {
            const hasWaiting = item.agents.some(a => a.status === 'waiting');
            const allSubmitted = item.agents.length > 0 && item.agents.every(a => a.status === 'submitted');
            const card = document.createElement('article');
            card.className = 'card research' + (hasWaiting ? ' waiting' : '');
            const rows = [...item.agents].sort((a, b) => statusRank(a.status) - statusRank(b.status) || a.id.localeCompare(b.id));
            const synthBadge = allSubmitted ? '<span class="research-badge all-submitted">ready to synthesize</span>' : '<span class="research-badge">research</span>';
            const synthCmd = allSubmitted ? '/ars ' + String(item.id).padStart(2, '0') : null;
            const synthBtn = synthCmd ? '<button class="copy btn btn-primary next-copy" data-copy="' + escHtml(synthCmd) + '" title="All agents submitted — synthesize findings">Copy next</button>' : '';
            card.innerHTML = '<div class="card-h"><span class="feature">R#' + escHtml(item.id) + ' ' + escHtml(item.name) + synthBadge + '</span><span class="head-actions">' + synthBtn + '</span></div><div class="rows"></div>';
            const rowsEl = card.querySelector('.rows');
            rows.forEach(agent => {
              const row = document.createElement('div');
              row.className = 'row ' + agent.status;
              const waitingCmd = agent.slashCommand
                ? '<button class="copy btn" data-copy="' + escHtml(agent.slashCommand) + '">Copy cmd</button>'
                : '';
              const attachBtn = agent.tmuxRunning
                ? '<button class="attach btn btn-primary" data-repo="' + escHtml(repo.path) + '" data-feature="' + escHtml(item.id) + '" data-agent="' + escHtml(agent.id) + '">Attach</button>'
                : '';
              row.innerHTML = '<span class="agent">' + escHtml(agent.id) + '</span><span class="status ' + escHtml(agent.status) + '"><span class="dot"></span>' + escHtml(agent.status) + '</span><span class="stamp" data-updated="' + escHtml(agent.updatedAt) + '">' + relTime(agent.updatedAt) + '</span><span class="row-actions">' + waitingCmd + attachBtn + '</span>';
              rowsEl.appendChild(row);
            });
            body.appendChild(card);
          });
        }
        reposRoot.appendChild(section);
      });

      if (visibleItemCount === 0) {
        empty.style.display = '';
        empty.textContent = state.filter === 'all'
          ? 'No features or research in progress.'
          : 'No items match filter: ' + state.filter;
      }

      reposRoot.querySelectorAll('button.copy').forEach(btn => {
        btn.onclick = async (e) => {
          e.stopPropagation();
          const text = btn.getAttribute('data-copy') || '';
          if (!text) return;
          const ok = await copyText(text);
          showToast(ok ? 'Copied: ' + text : 'Copy failed');
        };
      });

      reposRoot.querySelectorAll('button.attach').forEach(btn => {
        btn.onclick = async (e) => {
          e.stopPropagation();
          const repoPath = btn.getAttribute('data-repo') || '';
          const featureId = btn.getAttribute('data-feature') || '';
          const agentId = btn.getAttribute('data-agent') || '';
          const tmuxSession = btn.getAttribute('data-session') || '';
          if (!repoPath || !featureId || !agentId) return;
          await requestAttach(repoPath, featureId, agentId, tmuxSession);
        };
      });

      document.querySelectorAll('button.pill-filter').forEach(btn => {
        btn.onclick = (e) => {
          e.stopPropagation();
          const next = btn.getAttribute('data-filter') || 'all';
          state.filter = next;
          localStorage.setItem('aigon.dashboard.filter', next);
          render();
        };
      });
    }

    // ── Pipeline / Kanban view ─────────────────────────────────────────────────

    const STAGE_ORDER = ['inbox', 'backlog', 'in-progress', 'in-evaluation', 'done'];
    const STAGE_LABELS = { inbox: 'Inbox', backlog: 'Backlog', 'in-progress': 'In-Progress', 'in-evaluation': 'Evaluation', done: 'Done' };
    const ALLOWED_TRANSITIONS = {
      'inbox': 'backlog',
      'backlog': 'in-progress',
      'in-progress': 'in-evaluation',
      'in-evaluation': 'done'
    };

    let dragState = null; // { featureId, featureName, fromStage, repoPath }

    function buildAgentBadgesHtml(agents) {
      if (!agents || agents.length === 0) return '';
      return agents.map(a => '<span class="agent-badge ' + escHtml(a.status || '') + '">' + escHtml(a.id) + '</span>').join('');
    }

    function buildKanbanCard(feature, repoPath) {
      const card = document.createElement('div');
      card.className = 'kcard';
      card.draggable = true;
      card.dataset.featureId = feature.id;
      card.dataset.featureName = feature.name;
      card.dataset.stage = feature.stage;
      card.dataset.repoPath = repoPath || '';

      const agentBadgesHtml = buildAgentBadgesHtml(feature.agents);

      // Build stage-specific action buttons
      let actionsHtml = '';
      const stage = feature.stage;

      if (stage === 'inbox') {
        actionsHtml = '<button class="btn btn-primary kcard-btn-prioritise">Prioritise</button>';
      } else if (stage === 'backlog') {
        actionsHtml = '<button class="btn btn-primary kcard-btn-setup">Setup</button>';
      } else if (stage === 'in-progress') {
        const worktreeBtns = (feature.agents || []).filter(a => a.id !== 'solo').map(a =>
          '<button class="btn kcard-btn-worktree" data-agent="' + escHtml(a.id) + '">Open ' + escHtml(a.id) + '</button>'
        ).join('');
        const allSubmitted = feature.agents && feature.agents.length > 0 && feature.agents.every(a => a.status === 'submitted');
        const evalBtn = allSubmitted ? '<button class="btn btn-success kcard-btn-eval">Evaluate</button>' : '';
        actionsHtml = worktreeBtns + evalBtn;
      } else if (stage === 'in-evaluation') {
        const evalStatusHtml = feature.evalStatus
          ? '<span class="eval-badge' + (feature.evalStatus === 'pick winner' ? ' pick-winner' : '') + '">' + escHtml(feature.evalStatus) + '</span>'
          : '';
        actionsHtml = evalStatusHtml + '<button class="btn btn-warn kcard-btn-close">Close</button>';
      }

      card.innerHTML =
        '<div class="kcard-id">#' + escHtml(feature.id) + '</div>' +
        '<div class="kcard-name">' + escHtml(feature.name.replace(/-/g, ' ')) + '</div>' +
        (agentBadgesHtml ? '<div class="kcard-agents">' + agentBadgesHtml + '</div>' : '') +
        (actionsHtml ? '<div class="kcard-actions">' + actionsHtml + '</div>' : '');

      // Drag events
      card.addEventListener('dragstart', (e) => {
        card.classList.add('dragging');
        dragState = { featureId: feature.id, featureName: feature.name, fromStage: feature.stage, repoPath };
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', feature.id);
      });
      card.addEventListener('dragend', () => {
        card.classList.remove('dragging');
        dragState = null;
        document.querySelectorAll('.kanban-col').forEach(col => col.classList.remove('drag-over', 'drag-blocked'));
      });

      // Action button handlers
      const prioritiseBtn = card.querySelector('.kcard-btn-prioritise');
      if (prioritiseBtn) {
        prioritiseBtn._origText = 'Prioritise';
        prioritiseBtn.onclick = async (e) => {
          e.stopPropagation();
          await requestAction('feature-prioritise', [feature.name], repoPath, prioritiseBtn);
        };
      }

      const setupBtn = card.querySelector('.kcard-btn-setup');
      if (setupBtn) {
        setupBtn._origText = 'Setup';
        setupBtn.onclick = async (e) => {
          e.stopPropagation();
          const agents = await showAgentPicker(feature.id, feature.name);
          if (!agents) return;
          await requestAction('feature-setup', [feature.id, ...agents], repoPath, setupBtn);
        };
      }

      card.querySelectorAll('.kcard-btn-worktree').forEach(btn => {
        const agentId = btn.getAttribute('data-agent');
        btn._origText = 'Open ' + agentId;
        btn.onclick = async (e) => {
          e.stopPropagation();
          await requestWorktreeOpen(feature.id, agentId, repoPath, btn);
        };
      });

      const evalBtn = card.querySelector('.kcard-btn-eval');
      if (evalBtn) {
        evalBtn._origText = 'Evaluate';
        evalBtn.onclick = async (e) => {
          e.stopPropagation();
          await requestAction('feature-eval', [feature.id], repoPath, evalBtn);
        };
      }

      const closeBtn = card.querySelector('.kcard-btn-close');
      if (closeBtn) {
        closeBtn._origText = 'Close';
        closeBtn.onclick = async (e) => {
          e.stopPropagation();
          await requestAction('feature-close', [feature.id], repoPath, closeBtn);
        };
      }

      return card;
    }

    function renderPipeline() {
      document.getElementById('monitor-summary').style.display = 'none';
      const data = state.data || { repos: [] };
      setHealth();
      document.getElementById('updated-text').textContent = 'Updated ' + relTime(data.generatedAt || new Date().toISOString());
      const empty = document.getElementById('empty');
      const reposRoot = document.getElementById('repos');
      reposRoot.className = '';
      reposRoot.innerHTML = '';

      if (!data.repos || data.repos.length === 0) {
        empty.style.display = '';
        empty.textContent = 'No repos registered. Run: aigon conductor add';
        return;
      }
      empty.style.display = 'none';

      data.repos.forEach(repo => {
        // Group features by stage
        const byStage = {};
        STAGE_ORDER.forEach(s => { byStage[s] = []; });
        (repo.features || []).forEach(f => {
          if (byStage[f.stage]) byStage[f.stage].push(f);
        });

        const repoSection = document.createElement('div');
        reposRoot.appendChild(repoSection);

        if (data.repos.length > 1) {
          const repoLabel = document.createElement('div');
          repoLabel.style.cssText = 'font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-tertiary);margin:10px 0 6px;font-weight:600';
          repoLabel.textContent = repo.displayPath || repo.name;
          repoSection.appendChild(repoLabel);
        }

        const kanban = document.createElement('div');
        kanban.className = 'kanban';
        repoSection.appendChild(kanban);

        STAGE_ORDER.forEach(stage => {
          const cards = byStage[stage] || [];
          const col = document.createElement('div');
          col.className = 'kanban-col';
          col.dataset.stage = stage;
          col.dataset.repoPath = repo.path || '';

          col.innerHTML =
            '<div class="col-h"><span class="col-title">' + escHtml(STAGE_LABELS[stage]) + '</span><span class="col-count">' + cards.length + '</span></div>' +
            '<div class="col-body"></div>';

          const colBody = col.querySelector('.col-body');

          if (cards.length === 0) {
            const emp = document.createElement('div');
            emp.className = 'col-empty';
            emp.textContent = 'Empty';
            colBody.appendChild(emp);
          } else {
            cards.forEach(feature => {
              colBody.appendChild(buildKanbanCard(feature, repo.path));
            });
          }

          // Drop target handlers
          col.addEventListener('dragover', (e) => {
            if (!dragState) return;
            const allowed = ALLOWED_TRANSITIONS[dragState.fromStage] === stage;
            e.preventDefault();
            e.dataTransfer.dropEffect = allowed ? 'move' : 'none';
            document.querySelectorAll('.kanban-col').forEach(c => c.classList.remove('drag-over', 'drag-blocked'));
            col.classList.add(allowed ? 'drag-over' : 'drag-blocked');
          });

          col.addEventListener('dragleave', (e) => {
            if (!col.contains(e.relatedTarget)) {
              col.classList.remove('drag-over', 'drag-blocked');
            }
          });

          col.addEventListener('drop', async (e) => {
            e.preventDefault();
            col.classList.remove('drag-over', 'drag-blocked');
            if (!dragState) return;
            const { featureId, featureName, fromStage, repoPath } = dragState;
            dragState = null;
            if (ALLOWED_TRANSITIONS[fromStage] !== stage) return;

            if (fromStage === 'inbox' && stage === 'backlog') {
              await requestAction('feature-prioritise', [featureName], repoPath);
            } else if (fromStage === 'backlog' && stage === 'in-progress') {
              const agents = await showAgentPicker(featureId, featureName);
              if (!agents) return;
              await requestAction('feature-setup', [featureId, ...agents], repoPath);
            } else if (fromStage === 'in-progress' && stage === 'in-evaluation') {
              await requestAction('feature-eval', [featureId], repoPath);
            } else if (fromStage === 'in-evaluation' && stage === 'done') {
              await requestAction('feature-close', [featureId], repoPath);
            }
          });

          kanban.appendChild(col);
        });
      });
    }

    // ── Main render dispatch ───────────────────────────────────────────────────

    function render() {
      updateViewTabs();
      if (state.view === 'pipeline') {
        renderPipeline();
      } else {
        renderMonitor();
      }
    }

    function refreshTimestamps() {
      document.querySelectorAll('[data-updated]').forEach(n => { n.textContent = relTime(n.getAttribute('data-updated')); });
      const generatedAt = (state.data && state.data.generatedAt) ? state.data.generatedAt : new Date().toISOString();
      document.getElementById('updated-text').textContent = 'Updated ' + relTime(generatedAt);
    }

    function flattenStatuses(data) {
      const map = new Map();
      (data.repos || []).forEach(repo => {
        (repo.features || []).forEach(feature => {
          (feature.agents || []).forEach(agent => {
            map.set(repo.path + ':' + feature.id + ':' + agent.id, { status: agent.status, cmd: agent.slashCommand });
          });
        });
      });
      return map;
    }

    async function poll() {
      const previous = flattenStatuses(state.data || {});
      try {
        const res = await fetch('/api/status', { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const next = await res.json();
        state.failures = 0;
        const current = flattenStatuses(next);
        current.forEach((v, k) => {
          const prev = previous.get(k);
          if (!prev) return;
          if (prev.status !== 'waiting' && v.status === 'waiting') {
            showToast('Agent is waiting', v.cmd ? 'Copy command' : null, v.cmd ? () => copyText(v.cmd).then(() => showToast('Copied: ' + v.cmd)) : null);
          }
          if (prev.status !== 'error' && v.status === 'error') showToast('Agent entered error state');
        });
        state.data = next;
        render();
      } catch (e) {
        state.failures += 1;
        setHealth();
      }
    }

    // ── Init ──────────────────────────────────────────────────────────────────

    render();
    document.getElementById('refresh-btn').onclick = requestRefresh;
    setInterval(refreshTimestamps, TS_MS);
    setInterval(poll, POLL_MS);
    setTimeout(poll, 400);

    document.querySelectorAll('.view-tab').forEach(tab => {
      tab.onclick = () => {
        state.view = tab.getAttribute('data-view');
        localStorage.setItem('aigon.dashboard.view', state.view);
        render();
      };
    });
  </script>
</body>
</html>`;
