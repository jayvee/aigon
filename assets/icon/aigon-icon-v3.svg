<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Aigon">
  <!-- Option 3: Colosseum from above — circular arena floor plan -->
  <rect x="0" y="0" width="64" height="64" rx="12" fill="#0a0a0b"/>

  <!-- Outer wall -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="white" stroke-width="4"/>
  <!-- Arena floor -->
  <circle cx="32" cy="32" r="11" fill="none" stroke="white" stroke-width="3.5"/>

  <!-- Four entry tunnels (radial spokes between wall and floor) -->
  <line x1="32" y1="6"  x2="32" y2="21" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="32" y1="43" x2="32" y2="58" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="6"  y1="32" x2="21" y2="32" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="43" y1="32" x2="58" y2="32" stroke="white" stroke-width="3" stroke-linecap="round"/>
</svg>
