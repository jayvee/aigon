<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Aigon">
  <!-- Option 2: Amphitheatre cross-section — tiered seating, front view -->
  <rect x="0" y="0" width="64" height="64" rx="12" fill="#0a0a0b"/>

  <!-- Three concentric tiers of seating -->
  <path d="M 6,50 A 26,26 0 0 1 58,50" fill="none" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
  <path d="M 16,50 A 16,16 0 0 1 48,50" fill="none" stroke="white" stroke-width="4"   stroke-linecap="round"/>
  <path d="M 25,50 A  7, 7 0 0 1 39,50" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Arena floor baseline -->
  <line x1="3" y1="50" x2="61" y2="50" stroke="white" stroke-width="3" stroke-linecap="round"/>
</svg>
