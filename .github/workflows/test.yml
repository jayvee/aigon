name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  core:
    name: Core (${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x, 22.x, 24.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: |
          node -c aigon-cli.js
          node -c lib/utils.js
          node -c lib/dashboard-server.js

      - name: Core suite (lint + diagrams + integration + workflow)
        run: npm run test:core

      - name: Test budget under ceiling
        run: bash scripts/check-test-budget.sh

  browser-smoke:
    name: Browser smoke (PR gate)
    runs-on: ubuntu-latest
    # F556: critical-action browser smoke runs on every PR (and on push) so a
    # basic dashboard action like Start Autonomously cannot be broken by an
    # internal refactor without CI catching it. Pinned to a single Node version
    # to control runtime; the full E2E tier stays push-only below.

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Critical-action browser smoke
        run: npm run test:browser:smoke

  browser:
    name: Browser E2E (deploy gate)
    runs-on: ubuntu-latest
    # Only run the slow full browser tier on push to main, not on every PR.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Browser E2E suite
        run: npm run test:browser
