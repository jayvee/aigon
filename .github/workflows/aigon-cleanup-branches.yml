name: Cleanup stale aigon fleet branches
on:
  schedule:
    - cron: '0 3 * * 0'  # Weekly, Sunday 3am UTC
  workflow_dispatch: {}   # Manual trigger from GitHub UI

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const MAX_AGE_DAYS = 7;
            const cutoff = Date.now() - (MAX_AGE_DAYS * 24 * 60 * 60 * 1000);
            // Only delete branches matching aigon fleet naming: feature-{id}-{agent}-{desc}
            const FLEET_PATTERN = /^feature-\d+-[a-z]{2}-.+$/;

            const branches = await github.paginate(github.rest.repos.listBranches, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            let deleted = 0;
            for (const branch of branches) {
              if (!FLEET_PATTERN.test(branch.name)) continue;

              const commit = await github.rest.repos.getCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: branch.commit.sha,
              });

              const commitDate = new Date(commit.data.commit.committer.date).getTime();
              if (commitDate < cutoff) {
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `heads/${branch.name}`,
                });
                console.log(`Deleted: ${branch.name} (last commit: ${commit.data.commit.committer.date})`);
                deleted++;
              }
            }

            console.log(`\nDone: ${deleted} branch(es) deleted, ${branches.filter(b => FLEET_PATTERN.test(b.name)).length - deleted} fleet branch(es) kept (< ${MAX_AGE_DAYS} days old)`);
