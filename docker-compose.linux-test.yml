services:
  aigon-linux:
    build:
      context: .
      dockerfile: Dockerfile.linux-test
    container_name: aigon-linux
    hostname: aigon-linux
    stdin_open: true
    tty: true
    ports:
      - "4100-4210:4100-4210"
      - "3000-3010:3000-3010"
    working_dir: /home/dev
    command: bash
