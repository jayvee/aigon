        - link "Guides" [ref=e189] [cursor=pointer]:
          - /url: /docs/guides
        - img [ref=e190]
        - generic "Fleet Mode" [ref=e192]
      - main [ref=e193]:
        - paragraph [ref=e194]: Fleet mode runs multiple agents in parallel on the same feature spec. Each agent works in an isolated Git worktree. Aigon’s CLI sets up and launches the implementer sessions for you, then you compare the results and merge the winner.
        - heading "When to use" [level=2] [ref=e195]: "When to use #"
        - list [ref=e196]:
          - listitem [ref=e197]: You want multiple perspectives on a non-trivial problem
          - listitem [ref=e198]: The feature is important enough to warrant comparison
          - listitem [ref=e199]: You want to discover the best approach through competition
        - heading "How it works" [level=2] [ref=e200]: "How it works #"
        - img [ref=e202]:
          - generic [ref=e204]: feature-start 108 cc gg cx
          - generic [ref=e209]: Claude
          - generic [ref=e210]: feature-do
          - generic [ref=e212]: Gemini
          - generic [ref=e213]: feature-do
          - generic [ref=e215]: Codex
          - generic [ref=e216]: feature-do
          - generic [ref=e217]: isolated worktrees
          - generic [ref=e222]: feature-eval 108
          - generic [ref=e223]: compare
          - generic [ref=e226]: feature-close 108 cx
          - generic [ref=e227]: merge winner
        - heading "Full workflow" [level=2] [ref=e228]: "Full workflow #"
        - paragraph [ref=e229]:
          - text: All commands below work as both CLI (
          - code [ref=e230]: aigon feature-start ...
          - text: ) and agent commands (
          - code [ref=e231]: /aigon:feature-start ...
          - text: ","
          - code [ref=e232]: $aigon-feature-start ...
          - text: ", etc.). We show CLI form here because Fleet orchestration is usually driven from the shell in the main repo."
        - heading "1. Create and prioritise" [level=3] [ref=e233]: "1. Create and prioritise #"
        - code [ref=e236]:
          - generic [ref=e237]: aigon feature-create dark-mode
          - generic [ref=e238]: "# → Describe the feature: dark/light mode toggle, CSS custom properties,"
          - generic [ref=e239]: "# system preference detection, localStorage persistence..."
          - generic [ref=e241]: "aigon feature-prioritise dark-mode # Assigns ID, e.g. #108"
        - heading "2. Start Fleet" [level=3] [ref=e242]: "2. Start Fleet #"
        - code [ref=e245]:
          - generic [ref=e246]: aigon feature-start 108 cc gg cx
        - paragraph [ref=e247]: "This does everything in one step:"
        - list [ref=e248]:
          - listitem [ref=e249]:
            - text: Creates three isolated worktrees (
            - code [ref=e250]: ../<repo>-worktrees/feature-108-cc-dark-mode
            - text: ", etc.)"
          - listitem [ref=e251]:
            - text: Creates a tmux session for each agent (
            - code [ref=e252]: aigon-f108-cc
            - text: ","
            - code [ref=e253]: aigon-f108-gg
            - text: ","
            - code [ref=e254]: aigon-f108-cx
            - text: )
          - listitem [ref=e255]:
            - text: Opens terminal windows and launches each implementer with
            - code [ref=e256]: feature-do
            - text: via the CLI
          - listitem [ref=e257]: Each agent reads the same spec but builds independently in their own worktree
        - paragraph [ref=e258]: "The agents start implementing immediately. You can monitor progress in the dashboard or attach to any session:"
        - code [ref=e261]:
          - generic [ref=e262]: "tmux attach -t aigon-f108-cc # Attach to Claude's session"
        - paragraph [ref=e263]: "If a session ends or crashes, re-open it:"
        - code [ref=e266]:
          - generic [ref=e267]: "aigon feature-open 108 cc # Restart a specific agent"
        - heading "3. Cross-agent review (optional)" [level=3] [ref=e268]: "3. Cross-agent review (optional) #"
        - paragraph [ref=e269]: "In each worktree, open a session with a different agent to review the code:"
        - code [ref=e272]:
          - generic [ref=e273]: aigon feature-review 108
        - heading "4. Evaluate" [level=3] [ref=e274]: "4. Evaluate #"
        - paragraph [ref=e275]:
          - text: Back in the main repo, choose which agent should perform the evaluation and run
          - code [ref=e276]: feature-eval
          - text: "in that agent’s session or from the CLI:"
        - code [ref=e279]:
          - generic [ref=e280]: aigon feature-eval 108
        - paragraph [ref=e281]: "Examples:"
        - code [ref=e284]:
          - generic [ref=e285]: /aigon:feature-eval 108
          - generic [ref=e286]: $aigon-feature-eval 108
        - paragraph [ref=e287]:
          - text: This moves the feature to
          - code [ref=e288]: 04-in-evaluation/
          - text: and creates a comparison template. Any agent can act as the evaluator; choose the one you want judging the implementations. Aigon warns if the evaluator shares a provider family with an implementer (use
          - code [ref=e289]: "--allow-same-model-judge"
          - text: to suppress).
        - heading "5. Merge the winner" [level=3] [ref=e290]: "5. Merge the winner #"
        - code [ref=e293]:
          - generic [ref=e294]: "aigon feature-close 108 cx # Merge Codex's implementation"
          - generic [ref=e295]: "aigon feature-close 108 cx --adopt all # Merge + review diffs from losers"
        - paragraph [ref=e296]:
          - text: The
          - code [ref=e297]: "--adopt"
          - text: flag prints diffs from losing agents after merging, so you can cherry-pick valuable improvements (extra tests, error handling, edge cases).
        - heading "6. Clean up" [level=3] [ref=e298]: "6. Clean up #"
        - code [ref=e301]:
          - generic [ref=e302]: "aigon feature-cleanup 108 # Remove losing worktrees and branches"
          - generic [ref=e303]: "aigon feature-cleanup 108 --push # Push branches to origin first"
        - heading "Mismatch protection" [level=2] [ref=e304]: "Mismatch protection #"
        - paragraph [ref=e305]:
          - text: If
          - code [ref=e306]: "--agent=gg"
          - text: is specified inside a
          - code [ref=e307]: feature-108-cc-*
          - text: worktree, Aigon exits with an error instead of launching the wrong agent.
