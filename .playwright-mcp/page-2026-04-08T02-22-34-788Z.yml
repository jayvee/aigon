          - /url: /docs/guides
        - img [ref=e190]
        - generic "Drive Mode" [ref=e192]
      - main [ref=e193]:
        - paragraph [ref=e194]: Drive mode is the most common way to use Aigon. You work with one agent, guiding the implementation step by step. Think of it as pair programming where the agent writes the code while you steer direction, review decisions, and set the pace.
        - paragraph [ref=e195]:
          - text: This is the default mode — if you run
          - code [ref=e196]: feature-start
          - text: without specifying multiple agents, you’re in Drive mode. It’s the right choice for most features and the best way to learn the Aigon workflow.
        - paragraph [ref=e197]:
          - strong [ref=e198]: "What happens in Drive mode:"
        - list [ref=e199]:
          - listitem [ref=e200]: You describe a feature in natural language
          - listitem [ref=e201]: The agent writes a spec with acceptance criteria
          - listitem [ref=e202]:
            - text: You start the feature, then run
            - code [ref=e203]: feature-do
            - text: to begin implementation
          - listitem [ref=e204]: You review, give feedback, and the agent iterates
          - listitem [ref=e205]: When you’re happy, you close and merge
        - paragraph [ref=e206]: "Every step produces a paper trail: the spec, the implementation log, and the git history. Nothing is lost."
        - heading "When to use" [level=2] [ref=e207]: "When to use #"
        - list [ref=e208]:
          - listitem [ref=e209]:
            - strong [ref=e210]: Most features
            - text: — Drive is the default for a reason
          - listitem [ref=e211]:
            - strong [ref=e212]: You want control
            - text: — you guide each step and review before merging
          - listitem [ref=e213]:
            - strong [ref=e214]: Learning Aigon
            - text: — the simplest mode to understand the full lifecycle
          - listitem [ref=e215]:
            - strong [ref=e216]: Solo work
            - text: — one agent, one branch, straightforward
        - paragraph [ref=e217]:
          - text: For important features where you want multiple perspectives, use
          - link "Fleet mode" [ref=e218] [cursor=pointer]:
            - /url: /docs/guides/fleet-mode
          - text: instead.
        - heading "Workspace styles" [level=2] [ref=e219]: "Workspace styles #"
        - paragraph [ref=e220]: "Drive mode supports two workspace styles:"
        - table [ref=e221]:
          - rowgroup [ref=e222]:
            - row "Style Command Where code lives Best for" [ref=e223]:
              - columnheader "Style" [ref=e224]
              - columnheader "Command" [ref=e225]
              - columnheader "Where code lives" [ref=e226]
              - columnheader "Best for" [ref=e227]
          - rowgroup [ref=e228]:
            - row "Branch aigon feature-start 07 Current repo, new branch Simple features, quick work" [ref=e229]:
              - cell "Branch" [ref=e230]:
                - strong [ref=e231]: Branch
              - cell "aigon feature-start 07" [ref=e232]:
                - code [ref=e233]: aigon feature-start 07
              - cell "Current repo, new branch" [ref=e234]
              - cell "Simple features, quick work" [ref=e235]
            - row "Worktree aigon feature-start 07 cc Isolated directory at ../<repo>-worktrees/ Parallel features, isolation" [ref=e236]:
              - cell "Worktree" [ref=e237]:
                - strong [ref=e238]: Worktree
              - cell "aigon feature-start 07 cc" [ref=e239]:
                - code [ref=e240]: aigon feature-start 07 cc
              - cell "Isolated directory at ../<repo>-worktrees/" [ref=e241]:
                - text: Isolated directory at
                - code [ref=e242]: ../<repo>-worktrees/
              - cell "Parallel features, isolation" [ref=e243]
        - paragraph [ref=e244]:
          - text: Use
          - strong [ref=e245]: branch
          - text: when you’re working on one thing at a time. Use
          - strong [ref=e246]: worktree
          - text: when you want to run multiple features in parallel — each gets its own directory, its own tmux session, and its own agent.
        - heading "Full workflow" [level=2] [ref=e247]: "Full workflow #"
        - paragraph [ref=e248]:
          - text: All commands below work as both CLI (
          - code [ref=e249]: aigon feature-start ...
          - text: ) and slash commands (
          - code [ref=e250]: /aigon:feature-start ...
          - text: ). We show both forms.
        - heading "1. Create a feature" [level=3] [ref=e251]: "1. Create a feature #"
        - code [ref=e254]:
          - generic [ref=e255]: aigon feature-create dark-mode
          - generic [ref=e256]: "# or: /aigon:feature-create dark-mode"
          - generic [ref=e257]: "# Describe what you want:"
          - generic [ref=e258]: "# Add a dark/light mode toggle to the site header."
          - generic [ref=e259]: "# Use CSS custom properties. Default to system preference."
        - paragraph [ref=e260]:
          - text: This is a conversation — you describe the feature, the agent asks clarifying questions, explores your codebase, and writes a detailed spec with acceptance criteria. The spec lands in
          - code [ref=e261]: docs/specs/features/01-inbox/
          - text: .
        - heading "2. Prioritise" [level=3] [ref=e262]: "2. Prioritise #"
        - code [ref=e265]:
          - generic [ref=e266]: "aigon feature-prioritise dark-mode # Assigns ID, e.g. #108"
        - paragraph [ref=e267]:
          - text: Moves the spec to
          - code [ref=e268]: 02-backlog/
          - text: and assigns a global ID.
        - heading "3. Start" [level=3] [ref=e269]: "3. Start #"
        - code [ref=e272]:
          - generic [ref=e273]: "aigon feature-start 108 # Branch mode"
          - generic [ref=e274]: "aigon feature-start 108 cc # Worktree mode (isolated)"
        - paragraph [ref=e275]:
          - code [ref=e276]: feature-start
          - text: "sets up the workspace, but what happens next depends on the style:"
        - list [ref=e277]:
          - listitem [ref=e278]:
            - strong [ref=e279]: Branch mode
            - text: (
            - code [ref=e280]: aigon feature-start 108
            - text: "): creates the branch and moves the spec to in-progress. You must then run"
            - code [ref=e281]: aigon feature-do 108
            - text: yourself to start implementation.
          - listitem [ref=e282]:
            - strong [ref=e283]: Worktree mode
            - text: (
            - code [ref=e284]: aigon feature-start 108 cc
            - text: "): creates the isolated worktree, opens the agent session, and launches"
            - code [ref=e285]: feature-do
            - text: there.
        - heading "4. Work" [level=3] [ref=e286]: "4. Work #"
        - paragraph [ref=e287]: "In branch mode, start implementation explicitly:"
        - code [ref=e290]:
          - generic [ref=e291]: aigon feature-do 108
        - paragraph [ref=e292]: "Then the agent implements the feature. You can:"
        - list [ref=e293]:
          - listitem [ref=e294]:
            - strong [ref=e295]: Watch
            - text: — attach to the tmux session and observe
          - listitem [ref=e296]:
            - strong [ref=e297]: Guide
            - text: — jump in and give feedback, redirect, or refine
          - listitem [ref=e298]:
            - strong [ref=e299]: Wait
            - text: — let the agent work and check back when it signals
            - code [ref=e300]: submitted
        - heading "5. Review (optional)" [level=3] [ref=e301]: "5. Review (optional) #"
        - paragraph [ref=e302]: "Open a session with a different agent for a cross-agent code review:"
        - code [ref=e305]:
          - generic [ref=e306]: aigon feature-review 108
        - paragraph [ref=e307]:
          - text: The reviewing agent reads the spec, reviews
          - code [ref=e308]: git diff main...HEAD
          - text: ", and commits targeted fixes with"
          - code [ref=e309]: "fix(review):"
          - text: prefix.
        - heading "6. Close" [level=3] [ref=e310]: "6. Close #"
        - code [ref=e313]:
          - generic [ref=e314]: aigon feature-close 108
        - paragraph [ref=e315]:
          - text: Merges the branch to main, moves the spec to
          - code [ref=e316]: 05-done/
          - text: ", and archives the implementation log. For worktree mode, the agent is auto-detected and the worktree is cleaned up."
        - heading "Fast-track" [level=2] [ref=e317]: "Fast-track #"
        - paragraph [ref=e318]: "Skip the full loop when you know exactly what you want:"
        - code [ref=e321]:
          - generic [ref=e322]: aigon feature-now dark-mode
          - generic [ref=e323]: "# Describe the feature..."
        - paragraph [ref=e324]: Creates the spec, prioritises, sets up the workspace, and starts implementation — all in one command. The agent still writes a full spec, but the lifecycle is compressed.
