            - text: http://localhost:4100
            - img [ref=e565]
          - text: in your browser. You’ll see the feature in the Pipeline view with the agent status updating in real-time.
        - blockquote [ref=e568]:
          - paragraph [ref=e569]:
            - strong [ref=e570]:
              - text: What
              - code [ref=e571]: "--persistent"
              - text: "does:"
            - text: On macOS it installs a launchd agent; on Linux a systemd user service. The server survives terminal closes, Mac restarts, and process crashes — launchd/systemd will always bring it back. Logs are written to
            - code [ref=e572]: ~/.aigon/logs/server-*.log
            - text: .
          - paragraph [ref=e573]:
            - text: You can also run
            - code [ref=e574]: aigon server start
            - text: (without
            - code [ref=e575]: "--persistent"
            - text: ) if you prefer a foreground process that stops when you close the terminal.
          - paragraph [ref=e576]:
            - text: The server auto-restarts when you run
            - code [ref=e577]: aigon update
            - text: . You only need to manually restart (
            - code [ref=e578]: aigon server restart
            - text: ) if you’re developing Aigon itself and editing
            - code [ref=e579]: lib/*.js
            - text: files.
