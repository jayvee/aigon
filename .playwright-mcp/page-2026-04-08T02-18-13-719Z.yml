        - heading "Try it end-to-end" [level=2] [ref=e524]: "Try it end-to-end #"
        - paragraph [ref=e525]: Want to verify your installation works before using Aigon on a real project? Clone the seed repo — a small Next.js app with features already in the pipeline — and run a complete feature loop.
        - heading "1. Set up the seed repo" [level=3] [ref=e526]: "1. Set up the seed repo #"
