        - heading "3. Start the server" [level=3] [ref=e556]: "3. Start the server #"
        - paragraph [ref=e557]: "The Aigon server provides the dashboard UI, agent supervisor, and WebSocket status updates. Install it as a persistent service so it starts automatically on login and restarts on crash:"
        - code [ref=e560]:
          - generic [ref=e561]: "aigon server start --persistent # One-time: install as system service"
          - generic [ref=e562]: "aigon server add ~/src/brewboard # Register the seed repo"
        - paragraph [ref=e563]:
          - text: Then open
          - link "http://localhost:4100" [ref=e564] [cursor=pointer]:
